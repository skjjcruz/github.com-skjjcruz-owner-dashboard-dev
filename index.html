<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dynasty HQ War Room</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Dynasty HQ">
    <meta name="theme-color" content="#D4AF37">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;600;700&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --dark-gold: #B8941E;
            /* Page bg is pinned to --page-bg below. --black now represents the
               card elevation tone, so surfaces using `background: var(--black)`
               automatically contrast against the page backdrop. */
            --page-bg: #08080B;
            --black: #121217;
            --off-black: #1B1B22;
            --charcoal: #27262E;
            --silver: #BDB8AD;
            --white: #F5F2EA;
            --text-primary: var(--white);
            --text-secondary: var(--silver);
            --text-muted: #8D887E;
            --text-faint: rgba(189,184,173,0.62);
            --surface-0: var(--page-bg);
            --surface-1: var(--black);
            --surface-2: var(--off-black);
            --surface-3: var(--charcoal);
            --good: #2ECC71;
            --warn: #F0A500;
            --bad: #E74C3C;
            --info: #5DADE2;
            --purple: #9B8AFB;
            --win-green: var(--good);
            --loss-red: var(--bad);

            /* Spacing scale */
            --space-xs: 4px;
            --space-sm: 8px;
            --space-md: 12px;
            --space-lg: 16px;
            --space-xl: 24px;

            /* Card system — aligned to Sharp-Terminal mockup rhythm.
               Anything reading these tokens gets the polished spacing for free.
               Bumped defaults to 16×18 / 14px gap for a touch more breathing room
               vs the first pass, which was reading a hair tight against the mock. */
            --card-pad: 16px 18px;
            --card-pad-sm: 10px 12px;  /* inner sub-cards / list rows */
            --card-pad-lg: 18px 22px;  /* primary hero cards */
            --card-gap: 14px;
            --card-radius: 10px;
            --card-radius-sm: 6px;
            --card-border: 1px solid rgba(212,175,55,0.2);

            /* Typography scale */
            --text-hero: 2rem;       /* 32px — page titles (Rajdhani 700) */
            --text-title: 1.125rem;  /* 18px — section headers (Rajdhani 600) */
            --text-heading: 1rem;    /* 16px — card titles (DM Sans 600) */
            --text-body: 0.9375rem;  /* 15px — body text (DM Sans 400) */
            --text-label: 0.75rem;   /* 12px — labels/micro (DM Sans 500) */
            --text-micro: 0.6875rem; /* 11px — micro UI (DM Sans 500) */

            /* Font stacks */
            --font-title: 'Rajdhani', sans-serif;
            --font-display: var(--font-title);
            --font-body: 'DM Sans', sans-serif;
            --font-ui: var(--font-body);
            --font-mono: 'JetBrains Mono', monospace;

            /* Row heights */
            --row-height: 32px;
            --row-compact: 24px;
            --row-relaxed: 40px;
        }

    .fwpm-career-row{display:grid;align-items:center;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);gap:3px;font-size:13px}
    .fwpm-career-row:last-child{border-bottom:none}
    .fwpm-career-hdr{font-size:13px;font-weight:700;color:var(--text-muted);text-transform:uppercase}

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    html {
        color-scheme: dark;
    }

    body {
        font-family: var(--font-body);
        background: var(--page-bg);
        color: var(--text-primary);
        overflow-x: hidden;
        overflow-y: auto;
        min-height: 100vh;
        position: relative;
        -webkit-overflow-scrolling: touch;
        font-size: 15px;
        line-height: 1.55;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        letter-spacing: 0;
    }

    .wr-module-strip {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        min-width: 0;
        margin: 0 0 12px;
        padding: 8px 10px;
        border: 1px solid rgba(212,175,55,0.14);
        border-radius: 8px;
        background: rgba(255,255,255,0.024);
    }
    .wr-module-context {
        display: flex;
        align-items: baseline;
        gap: 8px;
        min-width: 0;
    }
    .wr-module-context span {
        color: var(--gold);
        font-size: 0.62rem;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        white-space: nowrap;
    }
    .wr-module-context strong {
        color: var(--white);
        font-family: var(--font-title);
        font-size: 1rem;
        font-weight: 700;
        line-height: 1;
        white-space: nowrap;
    }
    .wr-module-context em {
        color: var(--text-faint);
        font-size: 0.72rem;
        font-style: normal;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }
    .wr-module-actions {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 6px;
        flex-wrap: wrap;
        min-width: 0;
    }
    .wr-module-nav {
        display: flex;
        align-items: center;
        align-content: flex-start;
        flex-wrap: wrap;
        gap: 4px;
        max-width: 100%;
        min-width: 0;
        padding: 3px;
        border: 1px solid rgba(212,175,55,0.16);
        border-radius: 8px;
        background: rgba(0,0,0,0.18);
    }
    .wr-module-nav button,
    .wr-module-nav-item {
        border: 1px solid transparent;
        border-radius: 6px;
        background: transparent;
        color: var(--text-faint);
        cursor: pointer;
        font-family: var(--font-body);
        font-size: 0.7rem;
        font-weight: 800;
        letter-spacing: 0.055em;
        line-height: 1;
        padding: 6px 10px;
        text-transform: uppercase;
        white-space: nowrap;
        transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    }
    .wr-module-nav button:hover,
    .wr-module-nav-item:hover {
        border-color: rgba(212,175,55,0.28);
        color: var(--gold);
        background: rgba(212,175,55,0.06);
    }
    .wr-module-nav button.is-active,
    .wr-module-nav-item.is-active {
        border-color: var(--gold);
        background: var(--gold);
        color: var(--black);
        box-shadow: 0 0 0 1px rgba(212,175,55,0.12);
    }
    .wr-module-nav button.is-purple.is-active,
    .wr-module-nav-item.is-purple.is-active {
        border-color: var(--purple);
        background: rgba(155,138,251,0.18);
        color: #d8d0ff;
    }
    .wr-module-nav button span {
        font-family: var(--font-mono);
        font-size: 0.6rem;
        font-weight: 700;
        letter-spacing: 0;
        margin-left: 6px;
        opacity: 0.62;
        text-transform: none;
    }
    .wr-module-nav button.is-active span {
        opacity: 0.75;
    }
    .wr-module-select {
        min-height: 30px;
        max-width: 320px;
        border: 1px solid rgba(212,175,55,0.18);
        border-radius: 7px;
        background: rgba(255,255,255,0.035);
        color: var(--white);
        font-family: var(--font-body);
        font-size: 0.74rem;
        padding: 5px 9px;
    }
    .wr-module-toolbar {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 7px;
        margin-bottom: 10px;
    }
    .wr-module-toolbar-label {
        color: var(--text-faint);
        font-size: 0.66rem;
        font-weight: 800;
        letter-spacing: 0.09em;
        text-transform: uppercase;
    }
    .wr-module-pill {
        color: var(--gold);
        background: rgba(212,175,55,0.08);
        border: 1px solid rgba(212,175,55,0.24);
        border-radius: 999px;
        padding: 4px 9px;
        font-family: var(--font-mono);
        font-size: 0.64rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        white-space: nowrap;
    }
    @media(max-width:1120px){
        .wr-module-strip {
            align-items: flex-start;
            flex-direction: column;
        }
        .wr-module-context {
            align-items: flex-start;
            flex-direction: column;
            gap: 3px;
        }
        .wr-module-actions {
            justify-content: flex-start;
            width: 100%;
        }
        .wr-module-nav {
            width: 100%;
        }
        .wr-module-select {
            max-width: 100%;
            width: 100%;
        }
    }

    button,
    input,
    select,
    textarea {
        font-family: var(--font-body);
    }

    input,
    select,
    textarea {
        color: var(--text-primary);
    }

    input::placeholder,
    textarea::placeholder {
        color: var(--text-muted);
        opacity: 0.75;
    }

    h1,
    h2,
    h3,
    h4,
    .page-title,
    .section-title,
    .modal-title {
        font-family: var(--font-title);
    }

    /* Subdued logo background */
    body::before {
        content: '';
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: clamp(400px, 60vw, 1000px);
        height: clamp(400px, 60vw, 1000px);
        background-image: url('icon-192.png');
        background-size: contain;
        background-position: center;
        background-repeat: no-repeat;
        opacity: 0.05;
        z-index: 0;
        pointer-events: none;
        filter: brightness(1.2);
    }

    .app-container {
        position: relative;
        z-index: 1;
        max-width: 100%;
        margin: 0 auto;
    }

    /* Header — compact brand bar */
    .header {
        background: linear-gradient(135deg, var(--black) 0%, var(--off-black) 100%);
        padding: 0.75rem 1.5rem;
        border-bottom: 2px solid var(--gold);
        box-shadow: 0 2px 12px rgba(212, 175, 55, 0.15);
        display: flex;
        align-items: center;
        gap: 1rem;
        position: relative;
    }

    .header-brand {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        flex: 1;
        justify-content: center;
    }

    .owner-logo-small {
        width: 48px;
        height: 48px;
        flex-shrink: 0;
        filter: drop-shadow(0 0 8px rgba(212, 175, 55, 0.4));
    }

    .header-text {
        text-align: center;
    }

    .owner-name {
        font-family: 'DM Sans', sans-serif;
        font-size: clamp(1.2rem, 3.5vw, 1.8rem);
        background: linear-gradient(135deg, var(--gold) 0%, var(--white) 50%, var(--gold) 100%);
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: 0.08em;
        animation: shimmer 3s linear infinite;
        line-height: 1.1;
    }

    .header-subtitle {
        font-family: 'DM Sans', sans-serif;
        font-style: italic;
        font-size: 0.8rem;
        color: var(--silver);
        opacity: 0.7;
        margin-top: 2px;
    }

    @keyframes shimmer {
        0% { background-position: 0% center; }
        100% { background-position: 200% center; }
    }

    .settings-icon {
        position: absolute;
        top: 50%;
        right: 1rem;
        transform: translateY(-50%);
        width: 22px;
        height: 22px;
        cursor: pointer;
        opacity: 0.5;
        transition: all 0.3s ease;
    }

    .settings-icon:hover {
        opacity: 1;
        transform: translateY(-50%) rotate(90deg);
    }

    /* Session Strip */
    .session-strip {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        padding: 0.5rem 1.5rem;
        background: rgba(212, 175, 55, 0.04);
        border-bottom: 1px solid rgba(212, 175, 55, 0.1);
        font-size: 0.78rem;
        flex-wrap: wrap;
    }
    .session-strip-label {
        color: var(--silver);
        opacity: 0.7;
    }
    .session-strip-league {
        color: var(--white);
        font-weight: 700;
    }
    .session-strip-btn {
        padding: 4px 12px;
        font-family: 'DM Sans', sans-serif;
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.03em;
        border-radius: 4px;
        cursor: pointer;
        transition: all 0.15s;
        border: none;
    }
    .session-strip-btn.primary {
        background: var(--gold);
        color: var(--black);
    }
    .session-strip-btn.primary:hover { filter: brightness(1.1); }
    .session-strip-btn.secondary {
        background: transparent;
        color: var(--gold);
        border: 1px solid rgba(212,175,55,0.3);
    }
    .session-strip-btn.secondary:hover {
        border-color: var(--gold);
        background: rgba(212,175,55,0.08);
    }

    /* Hub Layout — two equal cards */
    .hub-layout {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1.25rem;
        padding: 1.25rem;
        max-width: 1100px;
        margin: 0 auto;
    }

    @media (min-width: 768px) {
        .hub-layout {
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            padding: 2rem;
            align-items: start;
        }
    }

    /* Product Card — shared base for both pillars */
    .product-card {
        background: var(--black);
        border: 2px solid rgba(212, 175, 55, 0.15);
        border-radius: 14px;
        padding: 0;
        display: flex;
        flex-direction: column;
        transition: border-color 0.25s, box-shadow 0.25s;
        overflow: hidden;
        animation: hubFadeIn 0.5s ease both;
    }
    .product-card:nth-child(2) { animation-delay: 0.1s; }

    .product-card:hover {
        border-color: rgba(212, 175, 55, 0.35);
        box-shadow: 0 4px 24px rgba(212, 175, 55, 0.1);
    }
    .product-card.accent-scout {
        border-color: rgba(212, 175, 55, 0.2);
    }
    .product-card.accent-scout:hover {
        border-color: rgba(212, 175, 55, 0.45);
        box-shadow: 0 4px 24px rgba(212, 175, 55, 0.12);
    }

    @keyframes hubFadeIn {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .product-card-header {
        padding: 1.25rem 1.25rem 0.75rem;
        display: flex;
        align-items: center;
        gap: 0.75rem;
    }

    .product-card-icon {
        width: 44px;
        height: 44px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
    }
    .product-card-icon.gold {
        background: linear-gradient(135deg, var(--gold), var(--dark-gold));
        box-shadow: 0 3px 12px rgba(212, 175, 55, 0.25);
    }
    .product-card-icon.scout {
        background: linear-gradient(135deg, var(--gold), var(--dark-gold));
        box-shadow: 0 3px 12px rgba(212, 175, 55, 0.25);
    }

    .product-card-title {
        font-family: 'DM Sans', sans-serif;
        font-size: 1.4rem;
        color: var(--white);
        letter-spacing: 0.06em;
        line-height: 1.1;
    }
    .product-card-subtitle {
        font-size: 0.78rem;
        color: var(--silver);
        opacity: 0.7;
        margin-top: 2px;
        line-height: 1.4;
    }

    .product-card-body {
        padding: 0 1.25rem 1.25rem;
        flex: 1;
        display: flex;
        flex-direction: column;
    }

    /* League selector shared between both cards */
    .hub-league-selector {
        margin-bottom: 1rem;
    }
    .hub-league-selector label {
        display: block;
        font-size: 0.68rem;
        font-family: 'DM Sans', sans-serif;
        font-weight: 700;
        color: var(--gold);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 0.35rem;
    }
    .hub-league-list {
        display: flex;
        flex-direction: column;
        gap: 6px;
        max-height: 220px;
        overflow-y: auto;
        overflow-x: hidden;
    }
    .hub-league-list::-webkit-scrollbar { width: 4px; }
    .hub-league-list::-webkit-scrollbar-track { background: rgba(255,255,255,0.03); border-radius: 2px; }
    .hub-league-list::-webkit-scrollbar-thumb { background: rgba(212,175,55,0.3); border-radius: 2px; }
    .hub-league-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        background: rgba(255,255,255,0.02);
        border: 1px solid rgba(212,175,55,0.15);
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.15s;
    }
    .accent-scout .hub-league-item {
        border-color: rgba(212,175,55,0.15);
    }

    .hub-year-row {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin-bottom: 0.5rem;
    }
    .hub-year-select {
        background: var(--charcoal);
        border: 1px solid rgba(212,175,55,0.3);
        border-radius: 4px;
        color: var(--white);
        font-family: 'DM Sans', sans-serif;
        font-weight: 700;
        font-size: 0.72rem;
        padding: 3px 8px;
        cursor: pointer;
        outline: none;
    }
    .hub-year-label {
        font-size: 0.68rem;
        color: var(--silver);
        opacity: 0.6;
        font-family: 'DM Sans', sans-serif;
    }

    /* CTA buttons inside cards */
    .hub-cta {
        width: 100%;
        padding: 12px;
        font-family: 'DM Sans', sans-serif;
        font-size: 1.1rem;
        letter-spacing: 0.05em;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s;
        text-decoration: none;
        display: block;
        text-align: center;
    }
    .hub-cta.gold {
        background: var(--gold);
        color: var(--black);
    }
    .hub-cta.gold:hover { filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(212,175,55,0.25); }
    .hub-cta.scout {
        background: linear-gradient(135deg, var(--gold), var(--dark-gold));
        color: var(--black);
    }
    .hub-cta.scout:hover { filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(212,175,55,0.3); }
    .hub-cta.ghost {
        background: transparent;
        color: var(--gold);
        border: 1px solid rgba(212,175,55,0.3);
        font-size: 0.85rem;
        padding: 8px;
        font-family: 'DM Sans', sans-serif;
        font-weight: 600;
    }
    .hub-cta.ghost:hover { border-color: var(--gold); background: rgba(212,175,55,0.06); }
    .hub-cta.ghost-scout {
        background: transparent;
        color: var(--gold);
        border: 1px solid rgba(212,175,55,0.3);
        font-size: 0.85rem;
        padding: 8px;
        font-family: 'DM Sans', sans-serif;
        font-weight: 600;
    }
    .hub-cta.ghost-scout:hover { border-color: var(--gold); background: rgba(212,175,55,0.06); }

    .hub-cta-row {
        display: flex;
        gap: 0.5rem;
        margin-top: 0.5rem;
    }
    .hub-cta-row > * { flex: 1; }

    /* Connect card (pre-auth) */
    .hub-connect-card {
        text-align: center;
        padding: 1rem 0;
    }
    .hub-connect-card input {
        width: 100%;
        padding: 12px 16px;
        background: var(--off-black);
        border: 1px solid rgba(212,175,55,0.25);
        border-radius: 8px;
        color: var(--white);
        font-family: 'DM Sans', sans-serif;
        font-size: 0.9rem;
        text-align: center;
        margin-bottom: 8px;
        outline: none;
        transition: border-color 0.2s;
    }
    .hub-connect-card input:focus {
        border-color: var(--gold);
        box-shadow: 0 0 0 2px rgba(212,175,55,0.15);
    }
    .hub-connect-card input::placeholder { color: var(--silver); opacity: 0.4; }

    /* League list items (unchanged functionality) */
    .league-item {
        padding: 0.75rem;
        margin-bottom: 0.5rem;
        background: rgba(212, 175, 55, 0.05);
        border-left: 3px solid transparent;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .league-item:hover, .league-item.active {
        background: rgba(212, 175, 55, 0.15);
        border-left-color: var(--gold);
    }

    .league-item-name {
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--white);
        margin-bottom: 0.25rem;
    }

    .league-item-record {
        font-size: 0.75rem;
        color: var(--silver);
    }



    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* Key Events */
    .key-events {
        background: var(--black);
        border: 2px solid rgba(212, 175, 55, 0.2);
        border-radius: 12px;
        padding: 1.5rem;
        overflow-x: hidden;
        animation: fadeInUp 0.6s ease 0.4s both;
    }

    @media (min-width: 768px) {
        .key-events {
            max-height: 600px;
            display: flex;
            flex-direction: column;
        }
    }

    .key-events-scroll {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
        min-height: 0;
        touch-action: pan-y;
    }

    .key-events-scroll::-webkit-scrollbar {
        width: 6px;
    }

    .key-events-scroll::-webkit-scrollbar-track {
        background: rgba(212, 175, 55, 0.1);
        border-radius: 3px;
    }

    .key-events-scroll::-webkit-scrollbar-thumb {
        background: var(--gold);
        border-radius: 3px;

    /* ── Loading Skeletons ───────────────────────────────── */
    @keyframes skeletonShimmer { 0%{background-position:-400px 0} 100%{background-position:400px 0} }
    .skel { background:linear-gradient(90deg,rgba(212,175,55,0.04) 25%,rgba(212,175,55,0.10) 50%,rgba(212,175,55,0.04) 75%);background-size:800px 100%;animation:skeletonShimmer 1.8s ease infinite;border-radius:6px }
    .skel-line { height:12px;margin-bottom:8px;border-radius:4px }
    .skel-block { height:80px;margin-bottom:12px }
    .skel-card { background:rgba(212,175,55,0.04);border:1px solid rgba(212,175,55,0.12);border-radius:10px;padding:16px;margin-bottom:12px }
    .skel-row { display:flex;gap:12px;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.03) }
    .skel-circle { width:32px;height:32px;border-radius:50%;flex-shrink:0 }

    /* ── Tooltips ─────────────────────────────────────────── */
    .wr-tip-icon { display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:rgba(212,175,55,0.12);color:var(--gold);font-size:13px;font-weight:700;cursor:pointer;margin-left:4px;transition:all .15s;flex-shrink:0;vertical-align:middle;line-height:1;border:1px solid rgba(212,175,55,0.25) }
    .wr-tip-icon:hover { background:var(--gold);color:var(--black) }
    .wr-tip-box { display:none;background:var(--off-black);border:1px solid rgba(212,175,55,0.25);border-radius:8px;padding:10px 12px;font-size:0.78rem;color:var(--silver);line-height:1.6;margin-top:6px;animation:wrTipIn .2s ease }
    .wr-tip-box.show { display:block }
    @keyframes wrTipIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:translateY(0)} }
    .wr-tip-box strong { color:var(--white);font-weight:600 }

    /* ── Section Header (global) ─────────────────────────── */
    .wr-section-hdr { font-family: var(--font-body);font-size:1rem;color:var(--gold);letter-spacing:0.08em;margin-bottom:8px }

    /* ── App shell rhythm ─────────────────────────────────── */
    .wr-main-content { min-height:100vh; background:var(--page-bg); transition:margin-left .18s ease; }
    .wr-content-frame { width:100%; max-width:1760px; box-sizing:border-box; margin:0 auto; padding:14px clamp(12px, 1.2vw, 20px) 48px; }
    .wr-content-frame > * { max-width:100%; }
    .wr-sidebar { color:var(--silver); }
    .wr-sidebar-label { min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .wr-sidebar-icon { width:18px; height:18px; display:inline-flex; align-items:center; justify-content:center; color:currentColor; }
    .wr-sidebar-toggle { border:1px solid rgba(212,175,55,0.18); background:rgba(255,255,255,0.035); color:var(--gold); border-radius:7px; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; transition:background .15s,border-color .15s,color .15s; }
    .wr-sidebar-toggle:hover { border-color:rgba(212,175,55,0.42); background:rgba(212,175,55,0.08); }
    .wr-sidebar.is-collapsed .wr-sidebar-label,
    .wr-sidebar.is-collapsed .wr-sidebar-wordmark,
    .wr-sidebar.is-collapsed .wr-sidebar-search,
    .wr-sidebar.is-collapsed .wr-sidebar-extra,
    .wr-sidebar.is-collapsed .wr-sidebar-new-badge { display:none !important; }
    .wr-sidebar.is-collapsed .wr-sidebar-brand { justify-content:center !important; padding-left:0 !important; padding-right:0 !important; }
    .wr-sidebar.is-collapsed .wr-sidebar-toggle { width:34px !important; height:30px !important; margin:0 auto 12px !important; }
    .wr-sidebar:not(.is-collapsed) .wr-sidebar-icon { display:none; }

    .wr-sidebar.is-collapsed .wr-sidebar-divider { margin-left:18px !important; margin-right:18px !important; }
    .gm-office-shell { width:100%; display:flex; flex-direction:column; gap:14px; }
    .gm-office-kpi-grid { display:grid; grid-template-columns:repeat(4, minmax(0, 1fr)); gap:12px; margin-bottom:22px; }
    .gm-office-section-head { display:flex; align-items:baseline; gap:10px; margin:0 0 12px; flex-wrap:wrap; }

    /* ── Micro-animations ────────────────────────────────── */
    @keyframes wrFadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
    .wr-fade-in { animation:wrFadeIn 0.25s ease both }
    .wr-fade-in-delay { animation:wrFadeIn 0.3s ease 0.1s both }
    .wr-pulse { box-shadow:0 0 0 2px rgba(212,175,55,0.15) }

    /* ── Annotation callout ──────────────────────────────── */
    .wr-annotation { font-size:0.72rem;font-family: var(--font-body);font-weight:600;letter-spacing:0.02em;padding:3px 8px;border-radius:4px;border-left:2px solid var(--gold);background:rgba(212,175,55,0.06);color:var(--silver);line-height:1.4;margin-top:6px }

    /* ── Tactical glass cards ─────────────────────────────── */
    .wr-glass{background:rgba(10,10,15,0.7);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(212,175,55,0.12);transition:transform .2s,box-shadow .2s}
    .wr-glass:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.4),0 0 0 1px rgba(212,175,55,0.15)}

    /* ── AI scanline effect ───────────────────────────────── */
    .wr-scanline{position:relative;overflow:hidden}
    .wr-scanline::after{content:'';position:absolute;top:-100%;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(212,175,55,0.15),transparent);animation:wrScan 5s linear infinite}
    @keyframes wrScan{0%{top:-2px}100%{top:100%}}

    /* ── Accent classes (static, no animation) ──────────────── */
    .wr-pulse-gold{box-shadow:0 0 0 2px rgba(212,175,55,0.25)}
    .wr-pulse-red{box-shadow:0 0 0 2px rgba(231,76,60,0.25)}

    /* ── Corner brackets (targeting reticle) ──────────────── */
    .wr-brackets{position:relative;padding:12px 16px}
    .wr-brackets::before,.wr-brackets::after{content:'';position:absolute;width:12px;height:12px;border-color:#D4AF37;border-style:solid;border-width:0}
    .wr-brackets::before{top:0;left:0;border-top-width:2px;border-left-width:2px}
    .wr-brackets::after{top:0;right:0;border-top-width:2px;border-right-width:2px}
    .wr-brackets-bottom{position:relative}
    .wr-brackets-bottom::before,.wr-brackets-bottom::after{content:'';position:absolute;width:12px;height:12px;border-color:#D4AF37;border-style:solid;border-width:0}
    .wr-brackets-bottom::before{bottom:0;left:0;border-bottom-width:2px;border-left-width:2px}
    .wr-brackets-bottom::after{bottom:0;right:0;border-bottom-width:2px;border-right-width:2px}

    /* ── User row identity glow in tables ─────────────────── */
    .wr-my-row{background:rgba(212,175,55,0.06) !important;box-shadow:inset 0 0 0 1px rgba(212,175,55,0.2)}

<script>
// PWA Install Prompt
let _deferredPrompt = null;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  _deferredPrompt = e;
  // Don't show immediately — wait 30 seconds
  setTimeout(() => {
    const banner = document.getElementById('pwa-install');
    if (banner && _deferredPrompt) banner.style.display = 'block';
  }, 30000);
});

document.getElementById('pwa-install-btn')?.addEventListener('click', async () => {
  if (!_deferredPrompt) return;
  _deferredPrompt.prompt();
  const result = await _deferredPrompt.userChoice;
  _deferredPrompt = null;
  document.getElementById('pwa-install').style.display = 'none';
});

document.getElementById('pwa-install-dismiss')?.addEventListener('click', () => {
  document.getElementById('pwa-install').style.display = 'none';
  _deferredPrompt = null;
  localStorage.setItem('pwa_install_dismissed', Date.now());
});

// Don't show if recently dismissed
if (localStorage.getItem('pwa_install_dismissed')) {
  const dismissed = parseInt(localStorage.getItem('pwa_install_dismissed'));
  if (Date.now() - dismissed < 7 * 24 * 60 * 60 * 1000) _deferredPrompt = null; // 7 day cooldown
}

window.addEventListener('appinstalled', () => {
  document.getElementById('pwa-install').style.display = 'none';
  _deferredPrompt = null;
});
</script>
