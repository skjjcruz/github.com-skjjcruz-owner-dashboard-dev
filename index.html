<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Owner Dashboard</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Owner Dashboard">
    <meta name="theme-color" content="#D4AF37">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@300;400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --dark-gold: #B8941E;
            --black: #0A0A0A;
            --off-black: #1A1A1A;
            --charcoal: #2A2A2A;
            --silver: #C0C0C0;
            --white: #FFFFFF;
            --win-green: #2ECC71;
            --loss-red: #E74C3C;
        }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

        body {
        font-family: 'Oswald', sans-serif;
        background: var(--black);
        color: var(--white);
        overflow-x: hidden;
        overflow-y: auto;
        min-height: 100vh;
        position: relative;
        -webkit-overflow-scrolling: touch;
    }

    /* Subdued logo background */
    body::before {
        content: '';
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: clamp(400px, 60vw, 1000px);
        height: clamp(400px, 60vw, 1000px);
        background-image: url('icon-192.png');
        background-size: contain;
        background-position: center;
        background-repeat: no-repeat;
        opacity: 0.05;
        z-index: 0;
        pointer-events: none;
        filter: brightness(1.2);
    }

    .app-container {
        position: relative;
        z-index: 1;
        max-width: 100%;
        margin: 0 auto;
    }

    /* Header */
    .header {
        background: linear-gradient(135deg, var(--black) 0%, var(--off-black) 100%);
        padding: 1rem;
        border-bottom: 3px solid var(--gold);
        box-shadow: 0 4px 20px rgba(212, 175, 55, 0.2);
    }

    .header-title {
        font-family: 'Bebas Neue', cursive;
        font-size: 1rem;
        text-align: center;
        color: var(--gold);
        letter-spacing: 0.15em;
        margin-bottom: 0.5rem;
    }

    .owner-name {
        font-family: 'Bebas Neue', cursive;
        font-size: clamp(1.5rem, 5vw, 2.5rem);
        text-align: center;
        background: linear-gradient(135deg, var(--gold) 0%, var(--white) 50%, var(--gold) 100%);
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: 0.1em;
        animation: shimmer 3s linear infinite;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 1rem;
    }

    .owner-logo-small {
        width: clamp(70px, 12vw, 100px);
        height: clamp(70px, 12vw, 100px);
        flex-shrink: 0;
        filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.5));
    }

    @keyframes shimmer {
        0% { background-position: 0% center; }
        100% { background-position: 200% center; }
    }

    .quote {
        text-align: center;
        margin-top: 0.75rem;
        padding: 0.75rem;
        font-family: 'Crimson Text', serif;
        font-style: italic;
        font-size: clamp(0.8rem, 2vw, 1rem);
        color: var(--silver);
        border-top: 1px solid rgba(212, 175, 55, 0.2);
    }

    .quote-author {
        font-size: 0.75rem;
        color: var(--gold);
        margin-top: 0.25rem;
        font-style: normal;
    }

    .settings-icon {
        position: absolute;
        top: 1rem;
        right: 1rem;
        width: 24px;
        height: 24px;
        cursor: pointer;
        opacity: 0.7;
        transition: all 0.3s ease;
    }

    .settings-icon:hover {
        opacity: 1;
        transform: rotate(90deg);
    }

    /* Main Layout */
    .main-layout {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1rem;
        padding: 1rem;
        padding-bottom: 50px;
        min-height: calc(100vh - 200px);
    }

    /* Desktop/Tablet 3-column layout */
    @media (min-width: 768px) {
        .main-layout {
            grid-template-columns: 280px 1fr 80px;
            gap: 1.5rem;
            padding: 1.5rem;
        }
    }

    @media (min-width: 1200px) {
        .main-layout {
            grid-template-columns: 320px 1fr 100px;
            padding: 2rem;
            max-width: 1600px;
            margin: 0 auto;
        }
    }

    .left-column, .center-column {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        overflow-x: hidden;
    }

   @media (min-width: 768px) {
        .left-column, .center-column {
            max-height: calc(100vh - 220px);
            overflow-y: auto;
            overflow-x: hidden;
            overscroll-behavior: contain;
            scroll-behavior: smooth;
        }

        .right-column {
            box-sizing: content-box;
            max-height: calc(100vh - 180px);
            overflow-y: auto;
            overflow-x: hidden;
            align-self: start;
            overscroll-behavior: contain;
            scroll-behavior: smooth;
            padding-bottom: 2rem;
        }

        .left-column::-webkit-scrollbar,
        .center-column::-webkit-scrollbar,
        .right-column::-webkit-scrollbar {
            width: 6px;
        }
        .left-column::-webkit-scrollbar-track,
        .center-column::-webkit-scrollbar-track,
        .right-column::-webkit-scrollbar-track {
            background: rgba(212, 175, 55, 0.1);
            border-radius: 3px;
        }
        .left-column::-webkit-scrollbar-thumb,
        .center-column::-webkit-scrollbar-thumb,
        .right-column::-webkit-scrollbar-thumb {
            background: var(--gold);
            border-radius: 3px;
        }
    }

    .league-window {
        background: var(--black);
        border: 2px solid rgba(212, 175, 55, 0.2);
        border-radius: 12px;
        padding: 1rem;
        overflow-x: hidden;
        animation: fadeInLeft 0.6s ease both;
    }

    @media (min-width: 768px) {
        .league-window {
            max-height: 400px;
            display: flex;
            flex-direction: column;
        }
    }

    @keyframes fadeInLeft {
        from {
            opacity: 0;
            transform: translateX(-20px);
        }
        to {
            opacity: 1;
            transform: translateX(0);
        }
    }

    .league-window-scroll {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
        min-height: 0;
        touch-action: pan-y;
    }

    .league-window-scroll::-webkit-scrollbar {
        width: 6px;
    }

    .league-window-scroll::-webkit-scrollbar-track {
        background: rgba(212, 175, 55, 0.1);
        border-radius: 3px;
    }

    .league-window-scroll::-webkit-scrollbar-thumb {
        background: var(--gold);
        border-radius: 3px;
    }

    .league-window-header {
        font-family: 'Bebas Neue', cursive;
        font-size: 1.2rem;
        color: var(--gold);
        margin-bottom: 0.75rem;
        letter-spacing: 0.1em;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding-bottom: 0.5rem;
        border-bottom: 1px solid rgba(212, 175, 55, 0.3);
        flex-shrink: 0;
    }

    .league-item {
        padding: 0.75rem;
        margin-bottom: 0.5rem;
        background: rgba(212, 175, 55, 0.05);
        border-left: 3px solid transparent;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .league-item:hover, .league-item.active {
        background: rgba(212, 175, 55, 0.15);
        border-left-color: var(--gold);
    }

    .league-item-name {
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--white);
        margin-bottom: 0.25rem;
    }

    .league-item-record {
        font-size: 0.75rem;
        color: var(--silver);
    }

    .top-row {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1rem;
    }

    @media (min-width: 768px) {
        .top-row {
            grid-template-columns: 2fr 1fr;
        }
    }

    /* Trophy Case */
    .trophy-case {
        background: var(--black);
        border: 2px solid rgba(212, 175, 55, 0.2);
        border-radius: 12px;
        padding: 1.5rem;
        animation: fadeInUp 0.6s ease 0.2s both;
    }

    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .trophy-case-title {
        font-family: 'Bebas Neue', cursive;
        font-size: 1.5rem;
        color: var(--gold);
        text-align: center;
        margin-bottom: 1rem;
        letter-spacing: 0.15em;
    }

    .trophies {
        display: flex;
        justify-content: center;
        gap: 1.5rem;
        flex-wrap: wrap;
    }

    .trophy {
        text-align: center;
    }

    .trophy-icon {
        font-size: 2.5rem;
        filter: drop-shadow(0 4px 8px rgba(212, 175, 55, 0.4));
        transition: transform 0.3s ease;
    }

    .trophy:hover .trophy-icon {
        transform: scale(1.1) rotateY(15deg);
    }

    .trophy-label {
        font-size: 0.7rem;
        color: var(--silver);
        font-weight: 300;
        line-height: 1.3;
        margin-top: 0.5rem;
    }

    .trophy-year {
        font-size: 0.8rem;
        color: var(--gold);
        font-weight: 600;
    }

    /* Earnings Box */
    .earnings-box {
        background: var(--black);
        border: 2px solid rgba(212, 175, 55, 0.2);
        border-radius: 12px;
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        animation: fadeInUp 0.6s ease 0.3s both;
    }

    .earnings-title {
        font-family: 'Bebas Neue', cursive;
        font-size: 1.5rem;
        color: var(--gold);
        letter-spacing: 0.15em;
        margin-bottom: 1rem;
    }

    .earnings-amount {
        font-family: 'Bebas Neue', cursive;
        font-size: 3rem;
        color: var(--win-green);
        letter-spacing: 0.05em;
        text-shadow: 0 0 20px rgba(46, 204, 113, 0.5);
    }

    .earnings-label {
        font-size: 0.75rem;
        color: var(--silver);
        margin-top: 0.5rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
    }

    .earnings-box {
        cursor: pointer;
        transition: border-color 0.2s;
    }
    .earnings-box:hover {
        border-color: rgba(212, 175, 55, 0.5);
    }
    .earnings-edit-hint {
        font-size: 0.68rem;
        color: var(--gold);
        opacity: 0.6;
        margin-top: 0.35rem;
        letter-spacing: 0.05em;
    }

    /* Earnings Modal */
    .earnings-modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.75);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        padding: 1rem;
    }
    .earnings-modal {
        background: var(--charcoal);
        border: 1px solid rgba(212,175,55,0.3);
        border-radius: 12px;
        width: 100%;
        max-width: 520px;
        max-height: 85vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }
    .earnings-modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1.25rem 1.5rem;
        border-bottom: 1px solid rgba(212,175,55,0.15);
    }
    .earnings-modal-title {
        font-family: 'Bebas Neue', cursive;
        font-size: 1.4rem;
        color: var(--gold);
        letter-spacing: 0.15em;
    }
    .earnings-modal-body {
        flex: 1;
        overflow-y: auto;
        padding: 1.25rem 1.5rem;
    }
    .earnings-entry-row {
        display: grid;
        grid-template-columns: 3rem 1fr 1fr auto;
        gap: 0.5rem;
        align-items: center;
        padding: 0.6rem 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        font-size: 0.85rem;
    }
    .earnings-entry-year {
        color: var(--gold);
        font-weight: 700;
        font-family: 'Oswald', sans-serif;
    }
    .earnings-entry-league {
        color: var(--white);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    .earnings-entry-desc {
        color: var(--silver);
        font-size: 0.78rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    .earnings-entry-amount {
        color: var(--win-green);
        font-weight: 700;
        font-family: 'Oswald', sans-serif;
        text-align: right;
        white-space: nowrap;
    }
    .earnings-total-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1rem 0 0.25rem;
        margin-top: 0.5rem;
        border-top: 2px solid rgba(212,175,55,0.25);
    }
    .earnings-add-form {
        border-top: 1px solid rgba(212,175,55,0.15);
        padding: 1.25rem 1.5rem;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.6rem;
    }
    .earnings-input {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(212,175,55,0.2);
        border-radius: 6px;
        color: var(--white);
        padding: 0.45rem 0.65rem;
        font-size: 0.82rem;
        font-family: 'Oswald', sans-serif;
        width: 100%;
        box-sizing: border-box;
    }
    .earnings-input:focus {
        outline: none;
        border-color: rgba(212,175,55,0.55);
    }
    .earnings-input::placeholder { color: rgba(255,255,255,0.3); }

    /* Key Events */
    .key-events {
        background: var(--black);
        border: 2px solid rgba(212, 175, 55, 0.2);
        border-radius: 12px;
        padding: 1.5rem;
        overflow-x: hidden;
        animation: fadeInUp 0.6s ease 0.4s both;
    }

    @media (min-width: 768px) {
        .key-events {
            max-height: 600px;
            display: flex;
            flex-direction: column;
        }
    }

    .key-events-scroll {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
        min-height: 0;
        touch-action: pan-y;
    }

    .key-events-scroll::-webkit-scrollbar {
        width: 6px;
    }

    .key-events-scroll::-webkit-scrollbar-track {
        background: rgba(212, 175, 55, 0.1);
        border-radius: 3px;
    }

    .key-events-scroll::-webkit-scrollbar-thumb {
        background: var(--gold);
        border-radius: 3px;
    }

    .key-events-title {
        font-family: 'Bebas Neue', cursive;
        font-size: 1.3rem;
        color: var(--gold);
        margin-bottom: 1rem;
        letter-spacing: 0.15em;
        flex-shrink: 0;
    }

    .event-item {
        background: rgba(212, 175, 55, 0.05);
        border-left: 3px solid var(--gold);
        padding: 1rem;
        margin-bottom: 0.75rem;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .event-item:hover {
        background: rgba(212, 175, 55, 0.15);
        box-shadow: -4px 4px 12px rgba(212, 175, 55, 0.2);
    }

    .event-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 0.5rem;
    }

    .event-title {
        font-size: 1rem;
        font-weight: 600;
        color: var(--white);
    }

    .event-date {
        font-size: 0.85rem;
        color: var(--gold);
        font-weight: 600;
    }

    .event-league {
        font-size: 0.75rem;
        color: var(--silver);
        opacity: 0.8;
    }

    /* Right Column - Icon Buttons */
    .right-column {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        animation: fadeInRight 0.6s ease 0.5s both;
    }

    @keyframes fadeInRight {
        from {
            opacity: 0;
            transform: translateX(20px);
        }
        to {
            opacity: 1;
            transform: translateX(0);
        }
    }

    .icon-button {
        background: var(--black);
        border: 2px solid var(--gold);
        border-radius: 6px;
        padding: 0.75rem 0.5rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow:
            0 0 0 1px rgba(212, 175, 55, 0.3),
            0 3px 9px rgba(0, 0, 0, 0.5),
            inset 0 1px 0 rgba(212, 175, 55, 0.2);
        min-height: 71px;
        flex-shrink: 0;
        position: relative;
        overflow: visible;
    }

    /* Ornate corner decorations */
    .icon-button::before,
    .icon-button::after {
        content: '';
        position: absolute;
        width: 9px;
        height: 9px;
        border: 2px solid var(--gold);
        opacity: 0.6;
    }

    .icon-button::before {
        top: -2px;
        left: -2px;
        border-right: none;
        border-bottom: none;
    }

    .icon-button::after {
        bottom: -2px;
        right: -2px;
        border-left: none;
        border-top: none;
    }

    .icon-button:hover {
        transform: translateY(-4px);
        border-color: var(--white);
        box-shadow: 
            0 0 0 1px var(--gold),
            0 0 20px rgba(212, 175, 55, 0.4),
            0 8px 24px rgba(0, 0, 0, 0.6),
            inset 0 1px 0 rgba(212, 175, 55, 0.4);
    }

    .icon-button:hover::before,
    .icon-button:hover::after {
        border-color: var(--white);
        opacity: 1;
    }

    .icon-button:active {
        transform: translateY(-2px);
    }

    .icon-button-icon-container {
        width: 32px;
        height: 32px;
        background: linear-gradient(135deg, var(--gold) 0%, var(--dark-gold) 100%);
        border-radius: 5px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 
            0 2px 8px rgba(212, 175, 55, 0.3),
            inset 0 1px 0 rgba(255, 255, 255, 0.2);
        position: relative;
    }

    .icon-button-icon-container::before {
        content: '';
        position: absolute;
        inset: 2px;
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, transparent 100%);
        border-radius: 4px;
        pointer-events: none;
    }

    .icon-button-icon {
        width: 18px;
        height: 18px;
        color: var(--black);
        position: relative;
        z-index: 1;
    }

    .icon-button-label {
        font-size: 0.49rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--white);
        text-align: center;
        line-height: 1.3;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
    }

    /* News Ticker */
    .news-ticker-container {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: var(--black);
        border-top: 3px solid var(--gold);
        height: 50px;
        overflow: hidden;
        z-index: 200;
        box-shadow: 0 -4px 20px rgba(212, 175, 55, 0.2);
    }

    .news-ticker {
        display: flex;
        align-items: center;
        height: 100%;
        white-space: nowrap;
        animation: scroll-ticker 15s linear infinite;
        will-change: transform;
    }

    .news-ticker-container:hover .news-ticker {
        animation-play-state: paused;
    }

    @keyframes scroll-ticker {
        0% {
            transform: translateX(100%);
        }
        100% {
            transform: translateX(-100%);
        }
    }

    .news-ticker-label {
        background: var(--gold);
        color: var(--black);
        padding: 0.65rem 1.25rem;
        font-weight: 700;
        font-size: 0.85rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        flex-shrink: 0;
        margin-right: 1.5rem;
    }

    .news-item {
        display: inline-flex;
        align-items: center;
        margin-right: 3rem;
        font-size: 0.95rem;
        color: var(--white);
    }

    .news-item-link {
        text-decoration: none;
        color: var(--white);
        transition: color 0.2s;
    }

    .news-item-link:hover {
        color: var(--gold);
    }

    .news-separator {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: var(--gold);
        border-radius: 50%;
        margin: 0 1.5rem;
        flex-shrink: 0;
    }

    /* Hide mobile-earnings panel on tablet/desktop */
    .mobile-earnings { display: none; }

    /* Mobile 3-column layout (iPhone) */
    @media (max-width: 767px) {
        .main-layout {
            display: grid;
            grid-template-columns: 120px 1fr 70px;
            grid-template-rows: calc(100vh - 200px);
            gap: 0.4rem;
            padding: 0.45rem;
            overflow: hidden;
        }

        .left-column,
        .center-column {
            overflow-y: hidden;
            overflow-x: hidden;
            height: 100%;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .right-column {
            overflow-y: scroll;
            overflow-x: hidden;
            overscroll-behavior: contain;
            -webkit-overflow-scrolling: touch;
            touch-action: pan-y;
            height: 100%;
            position: static;
            flex-direction: column;
            flex-wrap: nowrap;
            background: none;
            padding: 0;
            gap: 0.35rem;
            z-index: auto;
            justify-content: flex-start;
            align-items: stretch;
        }

        /* Key events: fill left column, title fixed, dates scroll */
        .key-events {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
            height: 100%;
        }
        .key-events-scroll {
            flex: 1;
            overflow-y: scroll;
            overflow-x: hidden;
            min-height: 0;
            -webkit-overflow-scrolling: touch;
            touch-action: pan-y;
        }

        /* League window: fill center column remainder, header fixed, leagues scroll */
        .league-window {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;

            overflow-y: scroll;
            overflow-x: hidden;
            min-height: 0;

        /* Show mobile earnings in right column — stays pinned at top */
        .mobile-earnings {

        .mobile-earnings:hover { border-color: rgba(212, 175, 55, 0.5); }
        .mobile-earnings .earnings-title  { font-size: 0.58rem; margin-bottom: 0.2rem; letter-spacing: 0.08em; }
        .mobile-earnings .earnings-amount { font-size: 0.85rem; text-shadow: none; }

        .event-date  { font-size: 0.58rem; }

        /* Icon buttons — compact vertical column */
        .icon-button {
            min-width: unset;
            min-height: 40px;
            padding: 0.3rem 0.25rem;
            flex-shrink: 0;
            width: 100%;
            gap: 0.2rem;
        }
        .icon-button-icon-container { width: 24px; height: 24px; }
        .icon-button-icon { width: 13px; height: 13px; }
        .icon-button-label { font-size: 0.48rem; }
    }
</style>

</head>
<body>
    <div id="root"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase-client.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
    // ===== AUTHENTICATION CHECK =====
    const AUTH_KEY = 'od_auth_v1';
    
    const authData = localStorage.getItem(AUTH_KEY);
    if (!authData) {
        window.location.href = 'login.html';
    }

    let sleeperUsername = '';
    try {
        const credentials = JSON.parse(authData);
        sleeperUsername = credentials.username || '';
        // Sync username to Team Comps page localStorage key so it auto-logs in
        if (sleeperUsername) {
            localStorage.setItem('od_locked_username_v2', sleeperUsername);
        }
    } catch (e) {
        localStorage.removeItem(AUTH_KEY);
        window.location.href = 'login.html';
    }

    const { useState, useEffect } = React;

    function handleLogout() {
        if (confirm('Are you sure you want to logout?')) {
            localStorage.removeItem(AUTH_KEY);
            window.location.href = 'login.html';
        }
    }

    // ===== CALENDAR DATA LAYER =====
    // Persistence handled by supabase-client.js (window.OD.*) with localStorage fallback.

    const DEFAULT_EVENTS = [
        { id: 'default-1', title: 'Dynasty Draft', date: '2026-08-15', time: '8:00 PM', league: 'Owner Dynasty', details: 'Round 1 starts at 8 PM EST' },
        { id: 'default-2', title: 'League Dues', date: '2026-08-20', time: '', league: 'All Leagues', details: '$500 total across all leagues' },
        { id: 'default-3', title: 'Redraft Draft', date: '2026-08-28', time: '', league: 'Redraft League', details: 'Snake draft, 12 teams' },
        { id: 'default-4', title: 'Season Kickoff', date: '2026-09-05', time: '', league: 'All Leagues', details: 'Week 1 begins!' },
        { id: 'default-5', title: 'Trade Deadline', date: '2026-11-04', time: '', league: 'All Leagues', details: 'Last day to make trades' },
        { id: 'default-6', title: 'Playoffs Start', date: '2026-12-14', time: '', league: 'All Leagues', details: 'Championship run begins' }
    ];

    // Sync wrapper — returns cached localStorage value instantly so React state
    // initialises without a flash, then the async cloud load triggers a re-render.
    function loadCalendarEvents() {
        try {
            const raw = localStorage.getItem('od_calendar_events');
            if (raw) {
                const saved = JSON.parse(raw);
                const savedIds = new Set(saved.map(e => e.id));
                const missing = DEFAULT_EVENTS.filter(d => !savedIds.has(d.id));
                return missing.length > 0 ? [...saved, ...missing] : saved;
            }
        } catch {}
        return DEFAULT_EVENTS;
    }

    function saveCalendarEvents(events) {
        window.OD.saveCalendarEvents(events);
    }

    // ===== EARNINGS DATA LAYER =====
    // Persistence handled by supabase-client.js (window.OD.*) with localStorage fallback.

    function loadEarnings() {
        try {
            const raw = localStorage.getItem('od_earnings_entries');
            return raw ? JSON.parse(raw) : [];
        } catch { return []; }
    }

    function saveEarnings(entries) {
        window.OD.saveEarnings(entries);
    }

    function exportCalendarEvents(events) {
        const payload = { version: 1, exported: new Date().toISOString(), events };
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'owner-dashboard-calendar.json';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    function getUpcomingEvents(events) {
        const now = new Date();
        now.setHours(0, 0, 0, 0);
        return events
            .filter(e => new Date(e.date) >= now)
            .sort((a, b) => new Date(a.date) - new Date(b.date));
    }

    function formatDateDisplay(dateStr) {
        const d = new Date(dateStr + 'T00:00:00');
        return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    // ===== EVENT DETAIL POPUP =====
    function EventDetailPopup({ event, onClose, onEdit, onDelete }) {
        return (
            <div style={{
                position: 'fixed', top: 0, left: 0, right: 0, bottom: 0,
                background: 'rgba(0,0,0,0.7)', display: 'flex', alignItems: 'center',
                justifyContent: 'center', zIndex: 1100, padding: '1rem'
            }} onClick={onClose}>
                <div style={{
                    background: 'linear-gradient(135deg, var(--off-black) 0%, var(--charcoal) 100%)',
                    border: '2px solid var(--gold)', borderRadius: '12px', padding: '1.5rem',
                    maxWidth: '380px', width: '100%', boxShadow: '0 8px 32px rgba(0,0,0,0.8)'
                }} onClick={e => e.stopPropagation()}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '1rem' }}>
                        <h3 style={{ color: 'var(--gold)', fontFamily: 'Bebas Neue, cursive', fontSize: '1.3rem', letterSpacing: '0.08em', margin: 0 }}>{event.title}</h3>
                        <span onClick={onClose} style={{ color: 'var(--silver)', cursor: 'pointer', fontSize: '1.2rem', lineHeight: 1 }}>&times;</span>
                    </div>
                    <div style={{ color: 'var(--gold)', fontSize: '0.9rem', fontWeight: '600', marginBottom: '0.5rem' }}>
                        {formatDateDisplay(event.date)}{event.time ? ` · ${event.time}` : ''}
                    </div>
                    <div style={{ color: 'var(--silver)', fontSize: '0.8rem', marginBottom: '0.75rem', opacity: 0.8 }}>{event.league}</div>
                    {event.details && (
                        <div style={{ color: 'var(--white)', fontSize: '0.85rem', lineHeight: 1.5, padding: '0.75rem', background: 'rgba(212,175,55,0.06)', borderRadius: '6px', borderLeft: '3px solid var(--gold)', marginBottom: '1rem' }}>
                            {event.details}
                        </div>
                    )}
                    <div style={{ display: 'flex', gap: '0.5rem' }}>
                        <button onClick={onEdit} style={{ flex: 1, padding: '0.6rem', background: 'var(--black)', border: '1.5px solid var(--gold)', borderRadius: '6px', color: 'var(--gold)', fontFamily: 'Oswald, sans-serif', fontSize: '0.8rem', fontWeight: '700', cursor: 'pointer', textTransform: 'uppercase', letterSpacing: '0.05em' }}>Edit</button>
                        <button onClick={onDelete} style={{ flex: 1, padding: '0.6rem', background: 'var(--black)', border: '1.5px solid #E74C3C', borderRadius: '6px', color: '#E74C3C', fontFamily: 'Oswald, sans-serif', fontSize: '0.8rem', fontWeight: '700', cursor: 'pointer', textTransform: 'uppercase', letterSpacing: '0.05em' }}>Delete</button>
                    </div>
                </div>
            </div>
        );
    }

    // ===== EVENT FORM MODAL =====
    function EventFormModal({ event, onSave, onClose }) {
        const [title, setTitle] = useState(event?.title || '');
        const [date, setDate] = useState(event?.date || '');
        const [time, setTime] = useState(event?.time || '');
        const [league, setLeague] = useState(event?.league || '');
        const [details, setDetails] = useState(event?.details || '');

        const inputStyle = {
            width: '100%', padding: '0.65rem 0.75rem', background: 'var(--black)',
            border: '1.5px solid rgba(212,175,55,0.3)', borderRadius: '6px',
            color: 'var(--white)', fontFamily: 'Oswald, sans-serif', fontSize: '0.9rem'
        };
        const labelStyle = { display: 'block', color: 'var(--gold)', fontSize: '0.75rem', fontWeight: '700', marginBottom: '0.3rem', textTransform: 'uppercase', letterSpacing: '0.05em' };

        function handleSubmit(e) {
            e.preventDefault();
            if (!title.trim() || !date) return;
            onSave({ id: event?.id || Date.now().toString(), title: title.trim(), date, time: time || '', league: league.trim() || 'All Leagues', details: details.trim() });
        }

        return (
            <div style={{
                position: 'fixed', top: 0, left: 0, right: 0, bottom: 0,
                background: 'rgba(0,0,0,0.8)', display: 'flex', alignItems: 'center',
                justifyContent: 'center', zIndex: 1200, padding: '1rem'
            }} onClick={onClose}>
                <div style={{
                    background: 'linear-gradient(135deg, var(--off-black) 0%, var(--charcoal) 100%)',
                    border: '3px solid var(--gold)', borderRadius: '12px', padding: '1.5rem',
                    maxWidth: '420px', width: '100%', boxShadow: '0 8px 32px rgba(0,0,0,0.8)'
                }} onClick={e => e.stopPropagation()}>
                    <h3 style={{ color: 'var(--gold)', fontFamily: 'Bebas Neue, cursive', fontSize: '1.3rem', letterSpacing: '0.1em', textAlign: 'center', marginBottom: '1.25rem' }}>
                        {event?.id ? 'EDIT EVENT' : 'ADD EVENT'}
                    </h3>
                    <form onSubmit={handleSubmit}>
                        <div style={{ marginBottom: '0.75rem' }}>
                            <label style={labelStyle}>Event Title *</label>
                            <input value={title} onChange={e => setTitle(e.target.value)} placeholder="e.g. Dynasty Draft" style={inputStyle} required />
                        </div>
                        <div style={{ display: 'flex', gap: '0.75rem', marginBottom: '0.75rem' }}>
                            <div style={{ flex: 1 }}>
                                <label style={labelStyle}>Date *</label>
                                <input type="date" value={date} onChange={e => setDate(e.target.value)} style={{ ...inputStyle, colorScheme: 'dark' }} required />
                            </div>
                            <div style={{ flex: 1 }}>
                                <label style={labelStyle}>Time</label>
                                <input type="time" value={time} onChange={e => setTime(e.target.value)} style={{ ...inputStyle, colorScheme: 'dark' }} />
                            </div>
                        </div>
                        <div style={{ marginBottom: '0.75rem' }}>
                            <label style={labelStyle}>League</label>
                            <input value={league} onChange={e => setLeague(e.target.value)} placeholder="e.g. Dynasty League" style={inputStyle} />
                        </div>
                        <div style={{ marginBottom: '1rem' }}>
                            <label style={labelStyle}>Details</label>
                            <textarea value={details} onChange={e => setDetails(e.target.value)} placeholder="Additional notes..." rows="3" style={{ ...inputStyle, resize: 'vertical', minHeight: '60px' }} />
                        </div>
                        <div style={{ display: 'flex', gap: '0.5rem' }}>
                            <button type="button" onClick={onClose} style={{ flex: 1, padding: '0.65rem', background: 'var(--black)', border: '1.5px solid var(--gold)', borderRadius: '6px', color: 'var(--gold)', fontFamily: 'Oswald, sans-serif', fontSize: '0.85rem', fontWeight: '700', cursor: 'pointer', textTransform: 'uppercase' }}>Cancel</button>
                            <button type="submit" style={{ flex: 1, padding: '0.65rem', background: 'linear-gradient(135deg, var(--gold) 0%, #B8941E 100%)', border: 'none', borderRadius: '6px', color: 'var(--black)', fontFamily: 'Oswald, sans-serif', fontSize: '0.85rem', fontWeight: '700', cursor: 'pointer', textTransform: 'uppercase' }}>Save</button>
                        </div>
                    </form>
                </div>
            </div>
        );
    }

    // ===== CALENDAR MODAL =====
    function CalendarModal({ events, onClose, onAddEvent, onEditEvent, onDeleteEvent, onExport, onImportFile }) {
        const today = new Date();
        const [viewYear, setViewYear] = useState(today.getFullYear());
        const [viewMonth, setViewMonth] = useState(today.getMonth());

        const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
        const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

        const firstDay = new Date(viewYear, viewMonth, 1).getDay();
        const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
        const prevMonthDays = new Date(viewYear, viewMonth, 0).getDate();

        function prevMonth() {
            if (viewMonth === 0) { setViewMonth(11); setViewYear(viewYear - 1); }
            else setViewMonth(viewMonth - 1);
        }
        function nextMonth() {
            if (viewMonth === 11) { setViewMonth(0); setViewYear(viewYear + 1); }
            else setViewMonth(viewMonth + 1);
        }
        function goToday() { setViewYear(today.getFullYear()); setViewMonth(today.getMonth()); }

        // Build calendar grid cells
        const cells = [];
        // Previous month fill
        for (let i = firstDay - 1; i >= 0; i--) {
            cells.push({ day: prevMonthDays - i, current: false, dateStr: null });
        }
        // Current month
        for (let d = 1; d <= daysInMonth; d++) {
            const dateStr = `${viewYear}-${String(viewMonth + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            cells.push({ day: d, current: true, dateStr });
        }
        // Next month fill
        const remaining = 7 - (cells.length % 7);
        if (remaining < 7) {
            for (let i = 1; i <= remaining; i++) {
                cells.push({ day: i, current: false, dateStr: null });
            }
        }

        function eventsOnDate(dateStr) {
            return events.filter(e => e.date === dateStr);
        }

        const todayStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;

        return (
            <div style={{
                position: 'fixed', top: 0, left: 0, right: 0, bottom: 0,
                background: 'rgba(0,0,0,0.85)', display: 'flex', alignItems: 'flex-start',
                justifyContent: 'center', zIndex: 1000, padding: '1rem',
                overflowY: 'auto', overflowX: 'hidden', WebkitOverflowScrolling: 'touch'
            }} onClick={onClose}>
                <div style={{
                    background: 'linear-gradient(135deg, var(--off-black) 0%, var(--charcoal) 100%)',
                    border: '3px solid var(--gold)', borderRadius: '12px',
                    padding: '1.5rem', maxWidth: '520px', width: '100%',
                    boxShadow: '0 8px 32px rgba(0,0,0,0.8)', margin: '1rem 0',
                    flexShrink: 0
                }} onClick={e => e.stopPropagation()}>
                    {/* Header */}
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem' }}>
                        <h2 style={{ color: 'var(--gold)', fontFamily: 'Bebas Neue, cursive', fontSize: '1.4rem', letterSpacing: '0.1em', margin: 0 }}>EVENT CALENDAR</h2>
                        <span onClick={onClose} style={{ color: 'var(--silver)', cursor: 'pointer', fontSize: '1.4rem', lineHeight: 1 }}>&times;</span>
                    </div>

                    {/* Month nav */}
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem' }}>
                        <span onClick={prevMonth} style={{ color: 'var(--gold)', cursor: 'pointer', fontSize: '1.2rem', padding: '0.25rem 0.5rem', userSelect: 'none' }}>&lsaquo;</span>
                        <div style={{ textAlign: 'center' }}>
                            <div style={{ color: 'var(--white)', fontFamily: 'Bebas Neue, cursive', fontSize: '1.2rem', letterSpacing: '0.08em' }}>{monthNames[viewMonth]} {viewYear}</div>
                            <div onClick={goToday} style={{ color: 'var(--gold)', fontSize: '0.65rem', cursor: 'pointer', opacity: 0.7, textTransform: 'uppercase', letterSpacing: '0.1em' }}>Today</div>
                        </div>
                        <span onClick={nextMonth} style={{ color: 'var(--gold)', cursor: 'pointer', fontSize: '1.2rem', padding: '0.25rem 0.5rem', userSelect: 'none' }}>&rsaquo;</span>
                    </div>

                    {/* Day headers */}
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: '2px', marginBottom: '2px' }}>
                        {dayNames.map(d => (
                            <div key={d} style={{ textAlign: 'center', color: 'var(--gold)', fontSize: '0.65rem', fontWeight: '700', padding: '0.3rem 0', letterSpacing: '0.05em' }}>{d}</div>
                        ))}
                    </div>

                    {/* Calendar grid */}
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: '2px', marginBottom: '1rem' }}>
                        {cells.map((cell, i) => {
                            const dayEvents = cell.dateStr ? eventsOnDate(cell.dateStr) : [];
                            const isToday = cell.dateStr === todayStr;
                            return (
                                <div key={i} onClick={() => {
                                    if (cell.current && cell.dateStr) onAddEvent(cell.dateStr);
                                }} style={{
                                    minHeight: '48px', padding: '0.2rem', borderRadius: '4px',
                                    background: isToday ? 'rgba(212,175,55,0.15)' : cell.current ? 'rgba(255,255,255,0.03)' : 'transparent',
                                    border: isToday ? '1.5px solid var(--gold)' : '1px solid rgba(255,255,255,0.05)',
                                    cursor: cell.current ? 'pointer' : 'default', transition: 'background 0.2s'
                                }}>
                                    <div style={{
                                        fontSize: '0.7rem', fontWeight: isToday ? '700' : '400',
                                        color: !cell.current ? 'rgba(255,255,255,0.2)' : isToday ? 'var(--gold)' : 'var(--silver)',
                                        textAlign: 'right', padding: '0 0.15rem'
                                    }}>{cell.day}</div>
                                    {dayEvents.map(ev => (
                                        <div key={ev.id} onClick={e => { e.stopPropagation(); onEditEvent(ev); }} style={{
                                            fontSize: '0.55rem', color: 'var(--black)', background: 'var(--gold)',
                                            borderRadius: '2px', padding: '1px 3px', marginTop: '1px',
                                            overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap',
                                            fontWeight: '700', cursor: 'pointer', lineHeight: 1.3
                                        }}>{ev.title}</div>
                                    ))}
                                </div>
                            );
                        })}
                    </div>

                    {/* Add event button */}
                    <button onClick={() => onAddEvent('')} style={{
                        width: '100%', padding: '0.7rem',
                        background: 'linear-gradient(135deg, var(--gold) 0%, #B8941E 100%)',
                        border: 'none', borderRadius: '6px', color: 'var(--black)',
                        fontFamily: 'Oswald, sans-serif', fontSize: '0.9rem', fontWeight: '700',
                        cursor: 'pointer', textTransform: 'uppercase', letterSpacing: '0.08em'
                    }}>+ Add Event</button>

                    {/* Backup / Restore */}
                    <div style={{ display: 'flex', gap: '0.5rem', marginTop: '0.5rem' }}>
                        <button onClick={onExport} style={{
                            flex: 1, padding: '0.5rem',
                            background: 'transparent',
                            border: '1px solid rgba(212,175,55,0.4)', borderRadius: '6px',
                            color: 'var(--gold)', fontFamily: 'Oswald, sans-serif',
                            fontSize: '0.75rem', fontWeight: '600', cursor: 'pointer',
                            textTransform: 'uppercase', letterSpacing: '0.06em'
                        }}>&#11015; Export Backup</button>
                        <label style={{
                            flex: 1, padding: '0.5rem', textAlign: 'center',
                            background: 'transparent',
                            border: '1px solid rgba(212,175,55,0.4)', borderRadius: '6px',
                            color: 'var(--gold)', fontFamily: 'Oswald, sans-serif',
                            fontSize: '0.75rem', fontWeight: '600', cursor: 'pointer',
                            textTransform: 'uppercase', letterSpacing: '0.06em'
                        }}>
                            &#11014; Import Backup
                            <input type="file" accept=".json" onChange={onImportFile} style={{ display: 'none' }} />
                        </label>
                    </div>
                </div>
            </div>
        );
    }

    // ===== SLEEPER API =====
    const SLEEPER_BASE_URL = 'https://api.sleeper.app/v1';

    async function fetchJSON(url) {
        const response = await fetch(url);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return response.json();
    }

    async function fetchSleeperUser(username) {
        return await fetchJSON(`${SLEEPER_BASE_URL}/user/${encodeURIComponent(username)}`);
    }

    async function fetchUserLeagues(userId, season) {
        return await fetchJSON(`${SLEEPER_BASE_URL}/user/${userId}/leagues/nfl/${season}`);
    }

    async function fetchLeagueRosters(leagueId) {
        return await fetchJSON(`${SLEEPER_BASE_URL}/league/${leagueId}/rosters`);
    }

    async function fetchLeagueUsers(leagueId) {
        return await fetchJSON(`${SLEEPER_BASE_URL}/league/${leagueId}/users`);
    }

    async function fetchLeagueInfo(leagueId) {
        return await fetchJSON(`${SLEEPER_BASE_URL}/league/${leagueId}`);
    }

    async function fetchWinnersBracket(leagueId) {
        try {
            return await fetchJSON(`${SLEEPER_BASE_URL}/league/${leagueId}/winners_bracket`);
        } catch (e) {
            return [];
        }
    }

    let _playersCache = null;
    async function fetchAllPlayers() {
        if (_playersCache) return _playersCache;
        _playersCache = await fetchJSON(`${SLEEPER_BASE_URL}/players/nfl`);

    // ===== NFL NEWS FEED =====
    const NFL_NEWS_CACHE_KEY = 'od_nfl_news';
    const NFL_NEWS_TTL = 10 * 60 * 1000; // 10 minutes

    async function fetchNFLNews() {
        // Check cache first
        try {
            const cached = JSON.parse(localStorage.getItem(NFL_NEWS_CACHE_KEY) || 'null');
            if (cached && Date.now() - cached.ts < NFL_NEWS_TTL) return cached.items;
        } catch (e) {}

        const RSS_FEEDS = [
            'https://www.espn.com/espn/rss/nfl/news',
            'https://api.foxsports.com/v2/content/optimized-rss?partnerKey=MB0Wehpmuj2lUhuRhQaafhBjAJqaPU244mlTDK1i&size=30&tags=fs/nfl',
        ];

        for (const feedUrl of RSS_FEEDS) {
            try {
                const proxyUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feedUrl)}`;
                const resp = await fetch(proxyUrl);
                if (!resp.ok) continue;
                const data = await resp.json();
                if (data.status === 'ok' && data.items && data.items.length > 0) {
                    const items = data.items.slice(0, 15).map(item => ({
                        title: item.title,
                        link: item.link,
                        pubDate: item.pubDate
                    }));
                    localStorage.setItem(NFL_NEWS_CACHE_KEY, JSON.stringify({ ts: Date.now(), items }));
                    return items;
                }
            } catch (e) {
                console.warn('RSS feed fetch failed:', e);
            }
        }
        return null; // All feeds failed
    }

                return !!auth.isGifted;
            } catch { return false; }
        }, []);

        function handleDisplayNameSave() {
            onDisplayNameSave(displayName);
        }

        async function handleChangePassword() {
            setPwMsg('');
            if (!currentPw || !newPw || !confirmPw) { setPwMsg('✗ Fill in all fields'); return; }
            if (newPw !== confirmPw) { setPwMsg('✗ New passwords do not match'); return; }
            if (newPw.length < 6) { setPwMsg('✗ Password must be at least 6 characters'); return; }
            try {
                // Verify current password against stored hash
                const AUTH_KEY = 'od_auth_v1';
                const auth = JSON.parse(localStorage.getItem(AUTH_KEY) || '{}');
                const encoder = new TextEncoder();
                const hashBuffer = await crypto.subtle.digest('SHA-256', encoder.encode(currentPw));
                const currentHash = Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2,'0')).join('');

                if (auth.passwordHash && auth.passwordHash !== currentHash) {
                    // Also try Supabase in case this is a gifted account
                    const result = await window.OD.verifySupabasePassword(sleeperUsername, currentPw);
                    if (!result || !result.match) {
                        setPwMsg('✗ Current password is incorrect');
                        return;
                    }
                }
                // Update Supabase
                await window.OD.updatePassword(sleeperUsername, newPw);
                // Update localStorage
                const newHashBuffer = await crypto.subtle.digest('SHA-256', encoder.encode(newPw));
                const newHash = Array.from(new Uint8Array(newHashBuffer)).map(b => b.toString(16).padStart(2,'0')).join('');
                localStorage.setItem(AUTH_KEY, JSON.stringify({ ...auth, passwordHash: newHash, isGifted: false }));
                setCurrentPw(''); setNewPw(''); setConfirmPw('');
                setPwMsg('✓ Password updated');
            } catch (e) {
                setPwMsg('✗ Failed to update password');
            }
        }

                        {isGiftedAccount && <span style={{ marginLeft: '0.5rem', fontSize: '0.7rem', color: 'var(--gold)', background: 'rgba(212,175,55,0.15)', padding: '0.1rem 0.4rem', borderRadius: '4px' }}>GIFTED — change your password below</span>}

    // DM Modal
    function DMModal({ onClose, currentUsername, leagueMates }) {
        const [messages, setMessages] = React.useState([]);
        const [thread, setThread] = React.useState(null);
        const [composing, setComposing] = React.useState(false);
        const [newMsg, setNewMsg] = React.useState('');
        const [sending, setSending] = React.useState(false);
        const [loading, setLoading] = React.useState(true);
        const [search, setSearch] = React.useState('');
        const threadEndRef = React.useRef(null);

        React.useEffect(() => { loadMessages(); }, []);

        // Poll for new messages while modal is open
        React.useEffect(() => {
            const poll = setInterval(async () => {
                try {
                    const fresh = await window.OD.loadDMs();
                    setMessages(prev => fresh.length !== prev.length || fresh.some((m, i) => m.id !== (prev[i]?.id)) ? fresh : prev);
                } catch {}
            }, 30000);
            return () => clearInterval(poll);
        }, []);

        React.useEffect(() => {
            if (threadEndRef.current) threadEndRef.current.scrollIntoView({ behavior: 'smooth' });
        }, [thread, messages.length]);

        async function loadMessages() {
            setLoading(true);
            try { setMessages(await window.OD.loadDMs()); } catch {}
            setLoading(false);
        }

        async function openThread(username) {
            setThread(username); setComposing(false); setSearch('');
            try {
                await window.OD.markDMsRead(username);
                setMessages(prev => prev.map(m =>
                    m.from_username === username && m.to_username === currentUsername ? { ...m, read: true } : m
                ));
            } catch {}
        }

        async function handleSend() {
            if (!newMsg.trim() || !thread || sending) return;
            setSending(true);
            try {
                await window.OD.sendDM(thread, newMsg.trim());
                setMessages(prev => [...prev, {
                    id: Date.now() + Math.random(), from_username: currentUsername,
                    to_username: thread, body: newMsg.trim(),
                    created_at: new Date().toISOString(), read: true
                }]);
                setNewMsg('');
            } catch (e) { alert('Send failed: ' + (e.message || e)); }
            setSending(false);
        }

        const conversations = React.useMemo(() => {
            const map = {};
            messages.forEach(m => {
                const other = m.from_username === currentUsername ? m.to_username : m.from_username;
                if (!map[other]) map[other] = { username: other, messages: [], unread: 0 };
                map[other].messages.push(m);
                if (m.to_username === currentUsername && !m.read) map[other].unread++;
            });
            return Object.values(map).sort((a, b) => {
                const aLast = a.messages[a.messages.length - 1]?.created_at || '';
                const bLast = b.messages[b.messages.length - 1]?.created_at || '';
                return bLast.localeCompare(aLast);
            });
        }, [messages]);

        const threadMessages = thread ? messages.filter(m =>
            (m.from_username === currentUsername && m.to_username === thread) ||
            (m.from_username === thread && m.to_username === currentUsername)

            const m = leagueMates.find(x => x.username === username);
            return m?.display_name || m?.username || username;
