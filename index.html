    <!-- Early auth gate: bounce signed-out visitors to the sign-in page BEFORE the
         React/Babel app (~80 modules, multi-second in-browser compile) loads, so
         they don't sit on the splash screen waiting only to be redirected. Mirrors
         the token check in js/components.js. Skips localhost so dev auto-login works. -->
    <script>
    (function () {
      try {
        if (['localhost', '127.0.0.1'].includes(window.location.hostname)) return;
        var sess = JSON.parse(localStorage.getItem('fw_session_v1') || 'null');
        var token = sess && sess.token;
        var ok = false;
        if (token && typeof token === 'string' && token.split('.').length === 3) {
          try {
            var part = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
            var padded = part.length % 4 ? part + '='.repeat(4 - (part.length % 4)) : part;
            var payload = JSON.parse(decodeURIComponent(window.atob(padded).split('').map(function (c) {
              return '%' + c.charCodeAt(0).toString(16).padStart(2, '0');
            }).join('')));
            ok = !payload.exp || Number(payload.exp) * 1000 > Date.now();
          } catch (e) { ok = false; }
        }
        if (!ok) {
          try { localStorage.removeItem('od_auth_v1'); } catch (e) {}
          if (sess && !ok) { try { localStorage.removeItem('fw_session_v1'); } catch (e) {} }
          window.location.replace('landing.html');
        }
      } catch (e) {}
    })();
    </script>

const _isLocalDev = !WR_IS_NATIVE_APP && ['localhost', '127.0.0.1'].includes(window.location.hostname || '');

    <style>
        :root {
            --gold: #D4AF37;
            --dark-gold: #B8941E;
            /* Page bg is pinned to --page-bg below. --black now represents the
               card elevation tone, so surfaces using `background: var(--black)`
               automatically contrast against the page backdrop. */
            --page-bg: #08080B;
            --black: #121217;
            --off-black: #1B1B22;
            --charcoal: #27262E;
            --silver: #BDB8AD;
            --white: #F5F2EA;
            --text-primary: var(--white);
            --text-secondary: var(--silver);
            --text-muted: #8D887E;
            --text-faint: rgba(189,184,173,0.62);
            --surface-0: var(--page-bg);
            --surface-1: var(--black);
            --surface-2: var(--off-black);
            --surface-3: var(--charcoal);
            --good: #2ECC71;
            --warn: #F0A500;
            --bad: #E74C3C;
            --info: #5DADE2;
            --purple: #9B8AFB;
            --win-green: var(--good);
            --loss-red: var(--bad);

            /* Spacing scale */
            --space-xs: 4px;
            --space-sm: 8px;
            --space-md: 12px;
            --space-lg: 16px;
            --space-xl: 24px;

            /* Card system — aligned to Sharp-Terminal mockup rhythm.
               Anything reading these tokens gets the polished spacing for free.
               Bumped defaults to 16×18 / 14px gap for a touch more breathing room
               vs the first pass, which was reading a hair tight against the mock. */
            --card-pad: 16px 18px;
            --card-pad-sm: 10px 12px;  /* inner sub-cards / list rows */
            --card-pad-lg: 18px 22px;  /* primary hero cards */
            --card-gap: 14px;
            --card-radius: 10px;
            --card-radius-sm: 6px;
            --card-radius-lg: 14px;  /* hero cards (product-card) */
            --card-border: 1px solid rgba(212,175,55,0.2);

            /* Typography scale — anchors: headline 32 / section 18 / body 16 / caption 12.
               The typescale codemod (scripts/typescale-codemod.cjs) migrates the app's
               hardcoded font literals onto these tokens, never shrinking, so the four
               named tiers actually render at their target sizes app-wide. */
            --text-hero: 2rem;       /* 32px — main headline (Rajdhani 700) */
            --text-title: 1.125rem;  /* 18px — section headers (Rajdhani 600) */
            --text-heading: 1rem;    /* 16px — card titles (DM Sans 600) */
            --text-body: 1rem;       /* 16px — body text (DM Sans 400) */
            --text-label: 0.75rem;   /* 12px — captions/metadata (DM Sans 500) */
            --text-micro: 0.6875rem; /* 11px — dense-data floor (DM Sans 500) */

            /* Font stacks */
            --font-title: 'Rajdhani', sans-serif;
            --font-display: var(--font-title);
            --font-body: 'DM Sans', sans-serif;
            --font-ui: var(--font-body);
            --font-mono: 'JetBrains Mono', monospace;

            /* Row heights */
            --row-height: 32px;
            --row-compact: 24px;
            --row-relaxed: 40px;

            /* Safe-area insets — iPhone notch / Dynamic Island / home indicator.
               viewport-fit=cover (meta above) + apple-mobile-web-app-status-bar-style
               black-translucent mean content draws under the status bar in the
               installed PWA; fixed/floating elements pad by these tokens.
               env() resolves to 0px on desktop, so global use is a no-op there. */
            --sat: env(safe-area-inset-top, 0px);
            --sar: env(safe-area-inset-right, 0px);
            --sab: env(safe-area-inset-bottom, 0px);
            --sal: env(safe-area-inset-left, 0px);

            /* Fixed-layer z-index registry (mobile plan D3) — the league
               shell's fixed/floating stack, low→high. New fixed elements
               should consume one of these instead of a fresh magic number.
               Observed inline values today: sidebar overlay 99 < sidebar +
               phone bottom dock 100 < chat panels 200 < hamburger/Alex FAB
               201 < corner toast 202 < GMMessage sheet 250 < DHQ bubble /
               PWA install / chat welcome 300 < player card 400 < confirm
               scrims 500–1000 < scout drawer 9000 < dropdown popover 9999. */
            --wr-z-nav-overlay: 99;
            --wr-z-nav: 100;      /* sidebar drawer + phone bottom dock */
            --wr-z-actionbar: 150; /* WR.ActionBar live-decision strip — above nav (100), below sheet (200) */
            --wr-z-sheet: 200;    /* chat panels / bottom sheets */
            --wr-z-fab: 201;
            --wr-z-toast: 202;
            --wr-z-banner: 300;   /* DHQ bubble, PWA install, chat welcome */
            --wr-z-card: 400;     /* player card scrim */
            --wr-z-modal: 1000;   /* settings/dashboard modal scrims */

            /* Bottom clearance for floating/fixed elements: phone bottom
               dock height + home indicator on phones, just the safe-area
               everywhere else. --wr-tab-bar-h flips to its real static
               height (56px; 48px landscape-compact) inside the ≤767 PHONE
               TIER block, so consuming this var is a no-op on
               tablet/desktop. */
            --wr-tab-bar-h: 0px;
            --wr-bottom-inset: calc(var(--wr-tab-bar-h) + var(--sab));

            /* Phone-tier horizontal gutter — ONE number every phone tab root
               pads its sides with (owner ask 2026-07-12: gutters ranged
               20-28px across tabs and read as drift when swiping). Inert on
               desktop: only ≤767 branches consume it. */
            --wr-phone-gutter: 12px;
        }

    /* Draft-surface readability floor. The global --text-micro (line 79) is an
       app-wide 11px dense-data floor; the draft War Room / Big Board / Command
       Center pack data tightly and read too small. Raise the floor to 12px ONLY
       inside the draft cockpit scope so the dense cells lift in lockstep without
       touching the other tabs. Scope class is applied to the DraftTab root
       (js/draft-room.js) and the Command Center cockpit roots (js/draft/command-center.js).
       If a fixed-width Big Board column clips at 12px, drop this to 0.72rem. */
    .draft-cc-scope { --text-micro: 0.75rem; }

    /* Header — compact brand bar. Top/side padding absorbs the safe-area
       insets so the hub header clears the status bar in installed-PWA mode
       (black-translucent draws content under it); 0px on desktop. The league
       header (league-detail.js) overrides paddingTop/Bottom inline and is
       offset by its own shell. */
    .header {
        background: linear-gradient(135deg, var(--black) 0%, var(--off-black) 100%);
        padding: calc(0.75rem + var(--sat)) calc(1.5rem + var(--sar)) 0.75rem calc(1.5rem + var(--sal));
        border-bottom: 2px solid var(--gold);
        box-shadow: 0 2px 12px rgba(212, 175, 55, 0.15);
        display: flex;
        align-items: center;
        gap: 1rem;
        position: relative;
    }

    .header-brand {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        flex: 1;
        justify-content: center;
    }

    .owner-logo-small {
        width: 48px;
        height: 48px;
        flex-shrink: 0;
        filter: drop-shadow(0 0 8px rgba(212, 175, 55, 0.4));
    }

        text-align: center;
    }

        font-size: clamp(1.2rem, 3.5vw, 1.8rem);
        background: linear-gradient(135deg, var(--gold) 0%, var(--white) 50%, var(--gold) 100%);
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: 0.08em;
        animation: shimmer 3s linear infinite;
        line-height: 1.1;

        font-style: italic;
        font-size: 0.8rem;
        color: var(--silver);

        100% { background-position: 200% center; }

    }

    /* Session Strip */
    .session-strip {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        padding: 0.5rem 1.5rem;
        background: rgba(212, 175, 55, 0.04);

        font-size: 0.78rem;
        flex-wrap: wrap;

    .session-strip-label {
        color: var(--silver);

    .session-strip-league {
        color: var(--white);

    .session-strip-btn {
        padding: 4px 12px;
        font-family: 'DM Sans', sans-serif;
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.03em;
        border-radius: 4px;
        cursor: pointer;
        transition: all 0.15s;
        border: none;

    .session-strip-btn.primary {
        background: var(--gold);
        color: var(--black);

    .session-strip-btn.secondary {
        background: transparent;
        color: var(--gold);
        border: 1px solid rgba(212,175,55,0.3);
    }
    .session-strip-btn.secondary:hover {
        border-color: var(--gold);
        background: rgba(212,175,55,0.08);

    /* Hub Layout — two equal cards */
    .hub-layout {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1.25rem;
        padding: 1.25rem;
        max-width: 1100px;
        margin: 0 auto;
    }

        .hub-layout {
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            padding: 2rem;
            align-items: start;
        }

    /* Hub welcome banner */
    .hub-welcome {
        max-width: 640px;

        text-align: center;

    .hub-welcome h2 {
        font-family: 'DM Sans', sans-serif;
        font-size: 1.5rem;

    .hub-welcome p {
        font-size: 0.82rem;
        color: var(--silver);
        opacity: 0.7;
        margin-top: 4px;
    }

    /* Platform grid — centers a single card, goes 2-up only with multiple */
    .hub-platform-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 14px;
        padding: 1rem 12px 2rem;
        max-width: 560px;
        margin: 0 auto;

        max-width: 1040px;
    }
    @media (min-width: 768px) {
        .hub-platform-grid.is-multi { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    /* Product Card — shared base for both pillars */
    .product-card {
        background: var(--black);
        border: 2px solid rgba(212, 175, 55, 0.15);
        border-radius: var(--card-radius-lg);
        padding: 0;
        display: flex;
        flex-direction: column;
        transition: border-color 0.25s, box-shadow 0.25s;

    .product-card:nth-child(2) { animation-delay: 0.1s; }

    .product-card:hover {
        border-color: rgba(212, 175, 55, 0.35);
        box-shadow: 0 4px 24px rgba(212, 175, 55, 0.1);
    }
    .product-card.accent-scout {
        border-color: rgba(212, 175, 55, 0.2);
    }
    .product-card.accent-scout:hover {
        border-color: rgba(212, 175, 55, 0.45);
        box-shadow: 0 4px 24px rgba(212, 175, 55, 0.12);
    }

    @keyframes hubFadeIn {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .product-card-header {
        padding: 1.25rem 1.25rem 0.75rem;
        display: flex;
        align-items: center;
        gap: 0.75rem;
    }

    .product-card-icon {

    .product-card-title {

    .product-card-subtitle {

    .product-card-body {
        padding: 0 1.25rem 1.25rem;

    /* League selector shared between both cards */
    .hub-league-selector {
        margin-bottom: 1rem;

    .hub-league-selector label {
        display: block;
        font-size: 0.68rem;
        font-family: 'DM Sans', sans-serif;

        color: var(--gold);

        letter-spacing: 0.08em;

    .hub-league-list {

    .hub-league-list::-webkit-scrollbar { width: 4px; }
    .hub-league-list::-webkit-scrollbar-track { background: rgba(255,255,255,0.03); border-radius: 2px; }
    .hub-league-list::-webkit-scrollbar-thumb { background: rgba(212,175,55,0.3); border-radius: 2px; }
    .hub-league-item {

        background: rgba(255,255,255,0.02);

    .hub-year-row {

        margin-bottom: 0.5rem;
    }
    .hub-year-select {
        background: var(--charcoal);
        border: 1px solid rgba(212,175,55,0.3);
        border-radius: 4px;
        color: var(--white);
        font-family: 'DM Sans', sans-serif;
        font-weight: 700;

    /* CTA buttons inside cards */

    .hub-cta.scout {
        background: linear-gradient(135deg, var(--gold), var(--dark-gold));

    }

    .hub-cta.ghost {
        background: transparent;
        color: var(--gold);
        border: 1px solid rgba(212,175,55,0.3);

        background: transparent;
        color: var(--gold);
        border: 1px solid rgba(212,175,55,0.3);
        font-size: 0.85rem;
        padding: 8px;
        font-family: 'DM Sans', sans-serif;
        font-weight: 600;

    .hub-cta.ghost-scout:hover { border-color: var(--gold); background: rgba(212,175,55,0.06); }

    .hub-cta-row {

    /* Connect card (pre-auth) */
    .hub-connect-card {
        text-align: center;

    .hub-connect-card input {
        width: 100%;

        background: var(--off-black);

        border-color: var(--gold);
        box-shadow: 0 0 0 2px rgba(212,175,55,0.15);

    .hub-connect-card input::placeholder { color: var(--silver); opacity: 0.4; }

    /* League list items (unchanged functionality) */
    .league-item {
        padding: 0.75rem;
        margin-bottom: 0.5rem;
        background: rgba(212, 175, 55, 0.05);
        border-left: 3px solid transparent;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.3s ease;

    .league-item:hover, .league-item.active {

    .league-item-name {
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--white);
        margin-bottom: 0.25rem;

    @keyframes fadeInUp {
        from {

            transform: translateY(0);

    }

    .key-events-scroll::-webkit-scrollbar {

    .key-events-scroll::-webkit-scrollbar-track {

    }

    .key-events-scroll::-webkit-scrollbar-thumb {

    }

    .key-events-title {
        font-family: 'DM Sans', sans-serif;
        font-size: 1.3rem;
        color: var(--gold);

    .event-item {
        background: rgba(212, 175, 55, 0.05);
        border-left: 3px solid var(--gold);

        margin-bottom: 0.75rem;

    .event-date {

    .event-league {

    @keyframes dhqSpin {

        .product-card-header { padding: 1rem 1rem 0.5rem; }

    /* ══════ TRADE CALCULATOR STYLES ══════ */
    .tc-team-grid { display: grid; grid-template-columns: 1fr; gap: 0.75rem; }
    @media(min-width:600px){ .tc-team-grid { grid-template-columns: 1fr 1fr; } }
    @media(min-width:900px){ .tc-team-grid { grid-template-columns: repeat(3,1fr); } }
    @media(min-width:1200px){ .tc-team-grid { grid-template-columns: repeat(4,1fr); } }

    .tc-team-card { background: var(--off-black); border: 1px solid rgba(212,175,55,0.2); border-radius: 8px; overflow: hidden; transition: border-color 0.2s; }
    .tc-team-card:hover { border-color: rgba(212,175,55,0.5); }
    .tc-team-card.tc-my-team { border-color: var(--gold); box-shadow: 0 0 12px rgba(212,175,55,0.15); }
    .tc-card-header { background: var(--charcoal); padding: 0.55rem 0.7rem; display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; }
    .tc-card-body { padding: 0.6rem 0.7rem; display: flex; flex-direction: column; gap: 0.5rem; }

    .tc-pos-grid { display: flex; flex-direction: column; gap: 0.22rem; }
    .tc-pos-row { display: flex; align-items: center; gap: 0.4rem; }
    .tc-pos-label { font-size: 0.76rem; font-weight: 700; width: 20px; flex-shrink: 0; }
    .tc-pos-dots { display: flex; gap: 2px; flex: 1; flex-wrap: wrap; }
    .tc-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .tc-dot-filled { background: var(--win-green); }
    .tc-dot-depth { background: rgba(255,255,255,0.28); border: 1px solid rgba(255,255,255,0.35); }
    .tc-dot-empty { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); }
    .tc-dot-surplus { background: var(--gold); }
    .tc-dot-deficit { background: var(--loss-red); }
    .tc-pos-count { font-size: 0.74rem; width: 28px; text-align: right; flex-shrink: 0; }
    .tc-pos-status-icon { font-size: 0.8rem; width: 14px; flex-shrink: 0; }

    .tc-panic-row { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.2rem; }
    .tc-panic-dot { width: 9px; height: 9px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); }
    .tc-panic-dot.tc-lit { background: var(--loss-red); border-color: var(--loss-red); box-shadow: 0 0 4px rgba(231,76,60,0.6); }

    .tc-chip-row { display: flex; flex-wrap: wrap; gap: 0.25rem; }
    .tc-chip { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.05em; padding: 0.1rem 0.35rem; border-radius: 3px; text-transform: uppercase; }
    .tc-chip-strength { background: rgba(46,204,113,0.15); border: 1px solid rgba(46,204,113,0.4); color: var(--good); }
    .tc-chip-need { background: rgba(231,76,60,0.15); border: 1px solid rgba(231,76,60,0.4); color: var(--bad); }
    .tc-chip-thin { background: rgba(240,165,0,0.15); border: 1px solid rgba(240,165,0,0.4); color: var(--warn); }
    .tc-chip-window { background: rgba(93,173,226,0.12); border: 1px solid rgba(93,173,226,0.3); color: var(--info); }
    .tc-chip-dna { background: rgba(212,175,55,0.12); border: 1px solid rgba(212,175,55,0.3); color: var(--gold); }

    .tc-score-row { display: flex; align-items: center; gap: 0.5rem; }
    .tc-score-label { font-size: 0.78rem; color: var(--silver); opacity: 0.7; width: 60px; flex-shrink: 0; }
    .tc-score-bar-wrap { flex: 1; height: 6px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; }
    .tc-score-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
    .tc-score-val { font-size: 0.8rem; font-weight: 700; width: 32px; text-align: right; flex-shrink: 0; }

    .tc-divider { height: 1px; background: rgba(212,175,55,0.1); margin: 0.25rem 0; }
    .tc-section-hdr { font-family: 'DM Sans', sans-serif; font-size: 0.9rem; color: var(--gold); letter-spacing: 0.12em; border-bottom: 1px solid rgba(212,175,55,0.2); padding-bottom: 0.3rem; margin-bottom: 0.6rem; }
    .tc-summary-bar { display: flex; gap: 1rem; padding: 0.5rem 0.75rem; background: rgba(212,175,55,0.05); border: 1px solid rgba(212,175,55,0.1); border-radius: 6px; margin-bottom: 0.75rem; flex-wrap: wrap; }
    .tc-summary-stat { display: flex; flex-direction: column; align-items: center; }
    .tc-summary-val { font-family: 'DM Sans', sans-serif; font-size: 1.1rem; color: var(--gold); }
    .tc-summary-lbl { font-size: 0.72rem; color: var(--silver); opacity: 0.6; letter-spacing: 0.06em; text-transform: uppercase; }
    .tc-my-team-badge { font-size: 0.72rem; background: var(--gold); color: var(--black); padding: 0.08rem 0.3rem; border-radius: 2px; font-weight: 700; letter-spacing: 0.04em; flex-shrink: 0; }
    .tc-tier-badge { font-size: 0.74rem; font-weight: 700; letter-spacing: 0.08em; padding: 0.15rem 0.4rem; border-radius: 3px; flex-shrink: 0; border: 1px solid; text-transform: uppercase; }
    .tc-filter-bar { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.75rem; }
    .tc-filter-select { background: var(--charcoal); border: 1px solid rgba(212,175,55,0.3); color: var(--white); font-family: 'DM Sans', sans-serif; font-size: 0.72rem; padding: 0.28rem 0.5rem; border-radius: 4px; cursor: pointer; }

    /* Trade Analyzer */
    .tc-ta-3col { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }
    @media(min-width:800px){ .tc-ta-3col { grid-template-columns: 1fr 1fr; gap: 1.25rem; } }
    @media(min-width:1150px){ .tc-ta-3col { grid-template-columns: 1fr 1fr 300px; gap: 1.25rem; } }
    .tc-ta-side { background: var(--off-black); border: 1px solid rgba(212,175,55,0.2); border-radius: 8px; padding: 0.75rem; display: flex; flex-direction: column; gap: 0.5rem; font-size: 0.82rem; }
    .tc-ta-side.tc-side-a { border-color: rgba(93,173,226,0.35); }
    .tc-ta-side.tc-side-b { border-color: rgba(231,76,60,0.35); }
    /* Pull the Trade Center up flush under the league header — reclaim the
       content-frame's top padding so the tab strip + Trade Finder start at the
       top instead of sitting in dead space (owner ruling). Scoped to the trade
       root, so no other tab moves. position:relative anchors the floated tab
       strip on wide screens (see the ≥1281 rule below). */
    .tc-trade-root { position:relative; width:100%; max-width:100%; min-width:0; box-sizing:border-box; padding:0; margin-top:-14px; -webkit-font-smoothing: subpixel-antialiased; text-rendering: optimizeLegibility; }
    /* Trade Center section tabs (Trade Builder / Owner DNA / Trade Log).
       They use the SAME .tc-dhq-modebar chip classes as the finder intent
       buttons (bordered chips, solid gold when active), so the two groups can
       never drift apart visually. Two homes, one visible at a time:
         • .tc-tab-row — in-flow, right-aligned row. Shows on narrow layouts and
           on the Owner DNA / Trade Log views; hidden on the wide desk (where
           the rail owns the tabs) so the Trade Finder keeps the top row.
         • .tc-rail-tabs — first item INSIDE the rail column, stacked above the
           League Teams card as a real flex item — no floating, no overlap. */
    .tc-tab-row { display: flex; justify-content: flex-end; margin: 0 0 8px; }
    .tc-rail-tabs { display: flex; justify-content: flex-end; margin-bottom: 6px; flex: 0 0 auto; }
    @media (min-width: 1281px) {
        .tc-tab-row.rail-owns-tabs { display: none; }
    }
    .tc-trade-root .wr-fade-in { animation: none; transform: none; }
    .tc-trade-root .wr-module-strip { background: rgba(255,255,255,0.038); border-color: rgba(212,175,55,0.22); }
    .tc-trade-root .wr-module-context strong { font-size: 1.05rem; }
    .tc-trade-root .wr-module-context em { color: rgba(207,207,214,0.92); opacity: 1; }

    .wr-sidebar.is-collapsed .wr-sidebar-extra,
    .wr-sidebar.is-collapsed .wr-sidebar-new-badge { display:none !important; }
    .wr-sidebar.is-collapsed .wr-sidebar-brand { justify-content:center !important; padding-left:0 !important; padding-right:0 !important; }
    .wr-sidebar.is-collapsed .wr-sidebar-toggle { width:34px !important; height:30px !important; margin:0 auto 12px !important; }
    .wr-sidebar:not(.is-collapsed) .wr-sidebar-icon { display:none; }
    .wr-sidebar.is-collapsed .wr-sidebar-nav-btn { justify-content:center !important; padding-left:0 !important; padding-right:0 !important; }
    .wr-sidebar.is-collapsed .wr-sidebar-divider { margin-left:18px !important; margin-right:18px !important; }
    .gm-office-shell { width:100%; display:flex; flex-direction:column; gap:14px; }
    .gm-office-kpi-grid { display:grid; grid-template-columns:repeat(4, minmax(0, 1fr)); gap:12px; margin-bottom:22px; }
    .gm-office-section-head { display:flex; align-items:baseline; gap:10px; margin:0 0 12px; flex-wrap:wrap; }
    .gm-office-section-head h2 { margin:0; font-family:var(--font-title); font-size:1.25rem; font-weight:700; letter-spacing:0; }
    .gm-office-section-head .gm-office-section-meta { font-size:0.7rem; color:var(--silver); opacity:0.6; font-family:var(--font-mono); }
    .gm-office-section-head .gm-office-spacer { flex:1; }
    .gm-office-insight-grid { display:grid; grid-template-columns:repeat(2, minmax(0, 1fr)); gap:12px; }
    .gm-office-settings-grid { display:grid; grid-template-columns:1.1fr 0.9fr; gap:var(--card-gap); }
    @media(max-width:1100px){
        .gm-office-kpi-grid { grid-template-columns:repeat(2, minmax(0, 1fr)); }
        .gm-office-insight-grid { grid-template-columns:1fr; }
        .gm-office-settings-grid { grid-template-columns:1fr; }
    }
    @media(max-width:640px){
        .gm-office-kpi-grid { grid-template-columns:1fr; }
        .gm-office-section-head { align-items:flex-start; flex-direction:column; }
        .gm-office-section-head .gm-office-spacer { display:none; }
    }
    @media(max-width:1023px){
        .wr-content-frame { width:100%; padding:10px max(10px, var(--sar)) 36px max(10px, var(--sal)); }
        .wr-main-content { margin-left:0 !important; }
        .wr-sidebar { width:176px !important; }
        .wr-sidebar.is-collapsed .wr-sidebar-label,
        .wr-sidebar.is-collapsed .wr-sidebar-wordmark,
        .wr-sidebar.is-collapsed .wr-sidebar-search,
        .wr-sidebar.is-collapsed .wr-sidebar-extra { display:initial !important; }
        .wr-sidebar.is-collapsed .wr-sidebar-icon { display:none !important; }
        .wr-sidebar.is-collapsed .wr-sidebar-nav-btn { justify-content:flex-start !important; padding-left:20px !important; padding-right:16px !important; }
    }

    /* ══ PHONE TIER (≤767) — safe-area offsets, bottom dock, and touch
       scaffold for the league-shell fixed layer. Scoped to the phone tier so
       the just-shipped 768–1023 tablet tier is untouched (iPad installed-PWA
       has a nonzero top inset too — deliberately left alone). !important
       beats the inline React styles on these elements (js/league-detail.js
       hamburger, .wr-sidebar, .wr-corner-toast, .wr-dhq-bubble). ══ */
    @media(max-width:767px){
        /* Bottom dock height becomes real — --wr-bottom-inset (registry,
           :root above) resolves to dock + home indicator on this tier only. */
        :root { --wr-tab-bar-h: 56px; }

        /* Shell width clamp, belt-and-suspenders. The canonical clamp lives
           in the league shell's emitted style block (league-detail.js) at
           ≤1023; a real-device report (iPhone, 2026-07-09) showed the app
           column stuck at the desktop inline calc(100vw - sidebar) with the
           landing backdrop peeking on the right — i.e. that one emitted rule
           lost on-device while this index.html block demonstrably applied
           (the dock rendered styled). Phones must never depend on a single
           React-emitted rule for shell width, so pin it here too. */
        html, body, #root { max-width:100% !important; }
        .app-container { width:100% !important; max-width:100vw !important; }
        .wr-main-content { margin-left:0 !important; width:100% !important; max-width:100vw !important; }

        .wr-hamburger { top:calc(10px + var(--sat) + var(--wr-dev-banner-height, 0px)) !important; left:calc(10px + var(--sal)) !important; }

        /* Sidebar drawer: the ~800px nav stack overflows a 667px SE in
           portrait (and any phone in landscape) — make the drawer itself the
           scroll container. Bottom padding clears the dock + home
           indicator so "Refresh Data" stays reachable. */
        .wr-sidebar {
            padding-top:calc(16px + var(--sat)) !important;
            padding-bottom:calc(16px + var(--wr-bottom-inset)) !important;
            overflow-y:auto;
            -webkit-overflow-scrolling:touch;
            overscroll-behavior:contain;
        }

        /* ── Bottom dock (PhoneDock, js/league-detail.js) ──
           ONE row, Scout mobile-nav idiom: sliding module strip (every
           sidebar nav item, icon over mono micro-caps label) + the PINNED
           Ask Alex item at the right end behind a 1px gold-line divider.
           Terminal chrome: near-black, 1px gold hairline top, silver
           inactive / gold + 2px top rule active; gold otherwise reserved
           for the Alex glyph ring + divider (structure).
           Height = the STATIC --wr-tab-bar-h (56px; 48px landscape-compact)
           + --sab, so the --wr-bottom-inset plumbing needs no JS.
           z = --wr-z-nav (100): same layer as the sidebar drawer but later
           in the DOM so it paints above it; the Alex sheet (200) covers the
           dock while open — the dock stays mounted beneath it. JS unmounts
           the dock off-phone and while the iOS keyboard is open. */
        .wr-phone-dock {
            display:flex;
            align-items:stretch;
            position:fixed;
            left:0; right:0; bottom:0;
            z-index:var(--wr-z-nav, 100);
            height:calc(var(--wr-tab-bar-h) + var(--sab));
            padding:0 var(--sar) var(--sab) var(--sal);
            background:var(--black, #0a0a0a);
            border-top:1px solid rgba(212,175,55,0.28);
            box-shadow:0 -6px 18px rgba(0,0,0,0.45);
        }
        /* Module strip: one-line momentum scroll, no scrollbar. Edge fade
           masks are DRIVEN BY SCROLL STATE (.has-left/.has-right toggled by
           PhoneDockInner) so a fade only appears where chips are actually
           cut off — a static mask would dim the last chip at full scroll
           and give no "more this way" cue on the left. The mask ends at
           the Ask Alex divider — the pinned item never fades. */
        .wr-dock-strip {
            flex:1 1 auto;
            min-width:0;
            display:flex;
            align-items:stretch;
            overflow-x:auto;
            overflow-y:hidden;
            -webkit-overflow-scrolling:touch;
            overscroll-behavior-x:contain;
            scrollbar-width:none;
            /* Edge breathing room so mid-scroll labels aren't clipped flush at
               x=0 (owner iPhone screenshots 2026-07-12); masks below widen to
               26px so the fade eats this padding, not the chip text. */
            padding-inline:8px;
            scroll-padding-inline:8px;
        }
        .wr-dock-strip.has-right {
            -webkit-mask-image:linear-gradient(90deg, #000 0, #000 calc(100% - 26px), transparent 100%);
            mask-image:linear-gradient(90deg, #000 0, #000 calc(100% - 26px), transparent 100%);
        }
        .wr-dock-strip.has-left {
            -webkit-mask-image:linear-gradient(90deg, transparent 0, #000 26px, #000 100%);
            mask-image:linear-gradient(90deg, transparent 0, #000 26px, #000 100%);
        }
        .wr-dock-strip.has-left.has-right {
            -webkit-mask-image:linear-gradient(90deg, transparent 0, #000 26px, #000 calc(100% - 26px), transparent 100%);
            mask-image:linear-gradient(90deg, transparent 0, #000 26px, #000 calc(100% - 26px), transparent 100%);
        }
        .wr-dock-strip::-webkit-scrollbar { display:none; }
        .wr-dock-chip {
            flex:0 0 auto;
            min-width:56px;
            min-height:44px;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            gap:3px;
            padding:4px 10px 2px;
            margin:0;
            background:transparent;
            border:none;
            border-top:2px solid transparent;
            cursor:pointer;
            color:var(--silver, #8a8f98);
            /* Owner ask (2026-07-12): match the desktop/iPad sidebar nav font
               (var(--font-body)) so all three surfaces read as one menu. */
            font-family:var(--font-body, 'DM Sans', sans-serif);
            font-size:var(--text-micro, 0.6875rem); /* 11px floor — no new sub-11px text */
            font-weight:600;
            letter-spacing:0.05em;
            line-height:1;
            text-transform:none;
            white-space:nowrap;
        }
        /* 20px matches Scout's icon-dominant nav weight + the Alex avatar. */
        .wr-dock-chip svg { width:20px; height:20px; flex-shrink:0; }
        .wr-dock-chip.is-active { color:var(--gold); border-top-color:var(--gold); font-weight:700; }
        .wr-dock-chip:active { background:rgba(212,175,55,0.12); }
        /* Ask Alex — pinned marquee peer item (Scout's AI slot precedent):
           same chip anatomy, slightly wider, gold-line left divider; avatar
           (or ✦ ring) over the ALEX label. Tap opens the Alex chat sheet. */
        .wr-dock-ask {
            flex:0 0 auto;
            min-width:68px;
            min-height:44px;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            gap:3px;
            padding:4px 16px 2px;
            margin:0;
            background:transparent;
            border:none;
            border-top:2px solid transparent;
            border-left:1px solid rgba(212,175,55,0.28);
            cursor:pointer;
            color:var(--silver, #8a8f98);
            font-family:var(--font-body, 'DM Sans', sans-serif);
            font-size:var(--text-micro, 0.6875rem);
            font-weight:600;
            letter-spacing:0.05em;
            line-height:1;
            white-space:nowrap;
        }
        .wr-dock-ask:active { background:rgba(212,175,55,0.12); }
        .wr-dock-ask-glyph {
            width:18px; height:18px; flex-shrink:0;
            display:flex; align-items:center; justify-content:center;
            border:1px solid rgba(212,175,55,0.45);
            border-radius:50%;
            color:var(--gold);
            font-size:0.625rem;
            line-height:1;
        }

        /* League shell content clears the dock (60px was the pre-dock
           clearance; keep it above the dock). Attribute-scoped so the hub
           page's .app-container (js/app.js — no dock there) is untouched. */
        .app-container[data-league-skin-type] { padding-bottom:calc(60px + var(--wr-bottom-inset)) !important; }

        /* Floating elements ride above the dock via the registry offset
           var. (.wr-alex-fab needs no phone override anymore — the FAB
           renders tablet/desktop only; the dock's pinned Ask Alex item
           replaces it here.) Toast sits just above the dock's right end,
           pointing its 👇 at the Ask Alex item. DHQ bubble goes full-width;
           its inline left:80px was desktop-sidebar clearance. */
        .wr-corner-toast { bottom:calc(12px + var(--wr-bottom-inset)) !important; right:12px !important; }
        .wr-dhq-bubble { bottom:calc(12px + var(--wr-bottom-inset)) !important; left:12px !important; right:12px !important; min-width:0 !important; }

        /* iOS zoom-on-focus guard: Safari zooms any focused input under
           16px. Phone tier only (plan D7). */
        input, select, textarea { font-size:16px !important; }

        /* Sub-tab strips: one-line momentum scroll instead of 2–3 wrapped
           44px rows of chrome (Analytics / Trade Center). */
        .wr-module-nav {
            flex-wrap:nowrap;
            overflow-x:auto;
            overflow-y:hidden;
            -webkit-overflow-scrolling:touch;
            scrollbar-width:none;
        }
        .wr-module-nav::-webkit-scrollbar { display:none; }

        /* Touch feedback: kill the gray iOS tap flash, give terminal-gold
           :active states on the nav surfaces instead (inline hover styles
           are mouse-only, so touch needs these). */
        * { -webkit-tap-highlight-color:transparent; }
        .wr-sidebar-nav-btn:active,
        .wr-module-nav button:active,
        .wr-module-nav-item:active { background:rgba(212,175,55,0.14) !important; }

        /* ── Lane H smoke-pass fixes (My Roster / Dashboard / FA / Trade Desk) ── */

        /* Dashboard widget picker: 18 modules render ~9 two-column rows at a
           ~345px panel — the overflow:hidden 90vh panel hid most of them with
           no scroll path. Body scrolls; panel capped in dynamic-viewport units
           so Safari's collapsing URL bar can't clip the confirm button (85vh
           fallback for pre-15.4 iOS). !important beats the inline 90vh. */
        .wr-widget-picker-panel { max-height:85vh !important; max-height:85dvh !important; }
        .wr-widget-picker-body {
            min-height:0;
            overflow-y:auto;
            -webkit-overflow-scrolling:touch;
            overscroll-behavior:contain;
        }

        /* FA detail drawer (fixed right panel, top:0/bottom:0): pad for the
           notch + home indicator — installed-PWA (black-translucent) draws it
           under both. z 200 covers the dock, so --sab (not the dock inset)
           is the right bottom clearance. Close ✕ rides below the notch. */
        .fa-detail-drawer {
            padding-top:calc(20px + var(--sat)) !important;
            padding-bottom:calc(20px + var(--sab)) !important;
            padding-right:calc(20px + var(--sar)) !important;
        }
        .fa-detail-close { top:calc(12px + var(--sat)) !important; }

        /* FA column-picker ◀/▶/× reorder buttons: 32px → 44px targets (plan
           D7 straggler list); glyph size unchanged, hit-padding only. */
        .fa-colpick-btn { min-width:44px !important; min-height:44px !important; }

        /* Trade Desk builder: YOU SEND | YOU GET side-by-side on phone too
           (owner ask 2026-07-12 — was stacked). minmax(0,1fr) keeps the two
           narrow columns from blowing out; tighter gap buys row width. */
        .tc-builder-sides { grid-template-columns:repeat(2, minmax(0,1fr)) !important; gap:8px !important; }
        /* Side-by-side trade builder (owner ask): the pick rows' "via {owner}"
           names had no ellipsis and forced the roster list wider than the
           ~180px column, so it scrolled horizontally and dragged every row
           left. Clip the list and ellipsize the pick name — the value on the
           right stays visible instead of scrolling off. */
        .tc-ta-roster-list-tall { overflow-x: hidden; }
        .tc-ta-pick-name { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* Trade Desk touch bump: intent/partner chips, deal-card actions,
           Why?/Browse toggles, show-more — all ~22-29px tall from the shared
           chip rule (index.html base CSS). Same glyphs, taller targets. */
        .tc-dhq-modebar button,
        .tc-dhq-actions button,
        .tc-dhq-hero-actions button,
        .tc-dhq-browser-controls button,
        .tc-dhq-browser-controls select,
        .tc-dhq-detail-toggle,
        .tc-dhq-show-more { min-height:44px; }
        /* Builder/FAAB remove-X (~10px glyph, padding:0 base rule): pure
           hit-area expansion — padding grows the target, negative margin
           cancels the layout shift. Later-in-sheet equal specificity wins. */
        .tc-ta-remove { padding:12px; margin:-12px; }

        /* Mock Draft setup on phone: the full SetupScreen renders ≤767 now
           (mobile mock drafting) — bump the tap targets that ship at desktop
           density. Media-gated: zero desktop impact. */
        .draft-setup-choice button, .draft-setup-speed button,
        .draft-league-actions button, .draft-setup-secondary > button { min-height: 44px; }

        /* Analytics phone re-pour: the Waiver Economy price map collapses to a
           full-width card PER POSITION at ≤720 — pack it 2-up instead; and the
           shell's desktop padding (inline style, hence !important) tightens. */
        .analytics-mini-table { grid-template-columns: repeat(2, minmax(0,1fr)); }
        .analytics-shell { padding: 10px var(--wr-phone-gutter, 12px) 18px !important; }
        /* Phone gutter normalization (owner ask 2026-07-12): every tab root
           pads its sides with --wr-phone-gutter so swiping between tabs
           doesn't shift the content edge (was 20-28px depending on tab).
           Inline-styled roots (my-team/lineup/compare/trades) consume the
           token in JS; the class-styled roots normalize here. */
        .fa-page { padding-left: var(--wr-phone-gutter, 12px) !important; padding-right: var(--wr-phone-gutter, 12px) !important; }
        .draft-cc-scope { padding-left: var(--wr-phone-gutter, 12px) !important; padding-right: var(--wr-phone-gutter, 12px) !important; }

        /* dvh audit (plan Phase 3): full-height overlay tracks the visual
           viewport so Safari's collapsing URL bar can't clip the bottom.
           Later-in-sheet rule wins where dvh is supported; on pre-15.4 iOS
           the declaration is invalid and the base 88vh (line ~1502) stands.
           Phone-scoped so the tablet/desktop tiers keep the audited vh. */
        .draft-scout-drawer { max-height:88dvh; }

        /* ── Phase 0 phone pattern kit (P2/P4/P6/P7) — brand-new classes,
           never referenced by desktop CSS or markup. Component partners
           live in js/components/wr-primitives.js (HeroCard / AssetRow /
           CardList / FilterPill / FilterSheet / ActionBar). ── */

        /* P2 .wr-seg — one segmented sub-nav idiom for tabs-within-tabs
           surfaces. 4+ items scroll horizontally (scrollbar hidden);
           children keep flex:1 so short sets distribute evenly. */
        .wr-seg {
            display:flex;
            background:#101015;
            border:1px solid rgba(255,255,255,0.08);
            border-radius:8px;
            overflow-x:auto;
            overflow-y:hidden;
            -webkit-overflow-scrolling:touch;
            scrollbar-width:none;
        }
        .wr-seg::-webkit-scrollbar { display:none; }
        .wr-seg > * {
            flex:1 1 0;
            min-width:fit-content;
            text-align:center;
            font-family:var(--font-mono, 'JetBrains Mono', monospace);
            font-size:var(--text-micro, 0.6875rem); /* 11px floor */
            font-weight:600;
            letter-spacing:0.04em;
            text-transform:uppercase;
            white-space:nowrap;
            color:#8B8B96;
            background:transparent;
            border:none;
            border-top:2px solid transparent;
            padding:9px 10px;
            cursor:pointer;
        }
        .wr-seg > .is-on { color:var(--gold); border-top-color:var(--gold); background:var(--surface-2, #1B1B22); }

        /* P4 .wr-kpi-strip — horizontally snapping KPI band (~2.3 tiles
           visible at 390px) replacing stacked 1-col KPI grids. */
        .wr-kpi-strip {
            display:flex;
            gap:8px;
            overflow-x:auto;
            overflow-y:hidden;
            -webkit-overflow-scrolling:touch;
            scroll-snap-type:x mandatory;
            scrollbar-width:none;
        }
        .wr-kpi-strip::-webkit-scrollbar { display:none; }
        .wr-kpi-strip > * {
            flex:none;
            min-width:96px;
            scroll-snap-align:start;
        }

        /* P7 .wr-sticky-table-wrap — the SANCTIONED horizontal-scroll escape
           (body is overflow-x:clip): scoped overflow-x container + sticky
           first column so "Deep Data" demotion never means removal. */
        .wr-sticky-table-wrap {
            overflow-x:auto;
            -webkit-overflow-scrolling:touch;
            overscroll-behavior-x:contain;
            border:1px solid rgba(255,255,255,0.07);
            border-radius:8px;
            scrollbar-width:none;
        }
        .wr-sticky-table-wrap::-webkit-scrollbar { display:none; }
        .wr-sticky-table th:first-child,
        .wr-sticky-table td:first-child,
        .wr-sticky-table .wr-stick-col {
            position:sticky;
            left:0;
            z-index:1;
            background:var(--black, #121217); /* solid — scrolling cells must not ghost through */
            border-right:1px solid rgba(255,255,255,0.08);
        }

        /* P6 .wr-phone-actionbar — fixed live-decision strip riding above
           the dock on --wr-z-actionbar (150: nav 100 < bar < sheet 200).
           WR.ActionBar (wr-primitives.js) unmounts it off-phone and while
           the keyboard is open. */
        .wr-phone-actionbar {
            position:fixed;
            left:10px;
            right:10px;
            bottom:calc(var(--wr-bottom-inset) + 8px);
            z-index:var(--wr-z-actionbar, 150);
            display:flex;
            flex-direction:row;
            align-items:center;
            gap:10px;
            padding:10px 12px;
            background:var(--surface-2, #1B1B22);
            border:1px solid rgba(212,175,55,0.5);
            border-radius:9px;
            font-family:var(--font-mono, 'JetBrains Mono', monospace);
            font-size:0.75rem; /* 12px */
            font-weight:600;
            box-shadow:0 8px 22px rgba(0,0,0,0.45);
        }
    }
    /* Short-viewport phones (landscape): slimmer dock so it doesn't eat a
       375px-tall viewport. Same tier, height-guarded (plan D9). Only
       SE-class (667) and 8-Plus-class (736) iPhones stay <768 wide in
       landscape — everything newer rotates into the tablet tier, where the
       dock and sheets are unmounted anyway. */
    @media(max-width:767px) and (max-height:520px){
        :root { --wr-tab-bar-h: 48px; }
        .wr-dock-chip, .wr-dock-ask { gap:2px; padding-top:2px; }
        /* WR.Sheet landscape full-height lives INSIDE the Sheet component
           (wr-primitives.js maxH branch) so the keyboard-open shrink still
           composes — a CSS !important override here would defeat it. */
    }
    /* Landscape phones of ANY width (SE 667 → Pro Max 932 all pass
       max-height:520px; pointer:coarse keeps short desktop windows and all
       tablets out): the mock-draft cockpit's 760px floor is meaningless in a
       ~390px-tall viewport. The ≤1320px rule above already sets height:auto,
       so this only releases the min-height floor (plan D9). */
    @media(max-height:520px) and (pointer:coarse){
        .mock-cockpit-grid { min-height:0; }
    }
    /* Belt-and-braces: the dock is JS-unmounted off-phone (WR.useViewport),
       but the viewport store debounces ~100ms — never paint it above 767. */
    @media(min-width:768px){
        .wr-phone-dock { display:none !important; }
    }

    /* ── Micro-animations ────────────────────────────────── */
    @keyframes wrFadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
    .wr-fade-in { animation:wrFadeIn 0.25s ease both }
    .wr-fade-in-delay { animation:wrFadeIn 0.3s ease 0.1s both }
    .wr-pulse { box-shadow:0 0 0 2px rgba(212,175,55,0.15) }

    /* ── Annotation callout ──────────────────────────────── */
    .wr-annotation { font-size:0.72rem;font-family: var(--font-body);font-weight:600;letter-spacing:0.02em;padding:3px 8px;border-radius:4px;border-left:2px solid var(--gold);background:rgba(212,175,55,0.06);color:var(--silver);line-height:1.4;margin-top:6px }

    /* ── Tactical glass cards ─────────────────────────────── */
    .wr-glass{background:rgba(10,10,15,0.7);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(212,175,55,0.12);transition:transform .2s,box-shadow .2s}
    .wr-glass:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.4),0 0 0 1px rgba(212,175,55,0.15)}

    /* ── AI scanline effect ───────────────────────────────── */
    .wr-scanline{position:relative;overflow:hidden}
    .wr-scanline::after{content:'';position:absolute;top:-100%;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(212,175,55,0.15),transparent);animation:wrScan 5s linear infinite}
    @keyframes wrScan{0%{top:-2px}100%{top:100%}}

    /* ── Accent classes (static, no animation) ──────────────── */

    /* ══ iPAD / COARSE-POINTER TIER (iPad pass, 2026-07-12) ═══════════════
       Owner ruling: iPad keeps the DESKTOP layout, touch-optimized only.
       ONE block for every width-independent touch rule: (hover:none) AND
       (pointer:coarse) never matches a mouse-driven desktop (the freeze
       gate at 1440×900 asserts fine-pointer), and still matches an iPad
       with a trackpad attached (primary pointer stays touch) — hover/drag
       JS wiring is untouched everywhere, so trackpads keep full behavior.
       Growth is HIT-AREA only (halos / hit-padding): visual density is
       ruled frozen — 30px rows stay 30px. */
    @media (hover:none) and (pointer:coarse){
        /* F1 — sidebar nav scrolls (iPad landscape ≥1024: the ~700px nav
           stack clipped; the phone tier has its own copy at ≤767). */
        .wr-sidebar { overflow-y:auto; overscroll-behavior:contain; }

           of the ≤767 rules; idempotent where both match). */
        .fa-detail-drawer {

            padding-bottom:calc(20px + var(--sab)) !important;
            padding-right:calc(20px + var(--sar)) !important;
        }
        .fa-detail-close { top:calc(12px + var(--sat)) !important; }

        /* ── Hit-area halos (visuals frozen; targets grow to 44px) ──
           Invisible ::after extensions — the in-repo idiom from the draft
           board's phone bump. Pseudo-elements hit-test as their owner, so
           where a halo overlaps a neighboring row the smaller precise
           control wins — desired for the one-tap + add. */
        .tc-dhq-add-btn { position:relative; }
        .tc-dhq-add-btn::after { content:''; position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:44px; height:44px; }
        .tc-dhq-modebar button, .tc-dhq-browser-controls button,
        .tc-dhq-show-more, .tc-dhq-detail-toggle,
        .tc-dhq-actions button, .tc-dhq-hero-actions button,
        .tc-rail-hide, .wr-drop-chip { position:relative; }
        .tc-dhq-modebar button::after, .tc-dhq-browser-controls button::after,
        .tc-dhq-show-more::after, .tc-dhq-detail-toggle::after,
        .tc-dhq-actions button::after, .tc-dhq-hero-actions button::after,
        .tc-rail-hide::after { content:''; position:absolute; left:0; right:0; top:50%; transform:translateY(-50%); height:44px; }
        .wr-drop-chip::after { content:''; position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:44px; height:44px; }
        /* Drag-reorder grips (boards): small visual, full 44pt press target.
           The halo inherits the grip's touch-action:none, so a press that
           starts in it drags instead of scrolling. */
        .wr-drag-grip::after { content:''; position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:44px; height:44px; touch-action:none; }

        /* ── Tap feedback — iPad gets neither hover nor pressed states on
           the desktop surfaces. Gold pressed tint on every CLASSED touch
           surface (the ~25 unclassed inline-styled hover rows are a named
           residual for a future classing pass). !important beats inline
           backgrounds — phone-tier precedent. */
        * { -webkit-tap-highlight-color:transparent; }
        .wr-sidebar-nav-btn:active, .wr-module-nav button:active, .wr-module-nav-item:active,
        button.tc-dhq-asset-row:active, div.tc-dhq-asset-row[tabindex]:active,

        .session-strip-btn:active, .wr-drop-chip:active, .tc-rail-hide:active,
        .fa-hq-mini-card:active, .fa-hq-swap:active, .fa-mkt-row:active,
        .wr-drag-grip:active {
            background:rgba(212,175,55,0.14) !important;

       The ≥768 guard keeps this from out-cascading the phone tier's larger

    @media (hover:none) and (pointer:coarse) and (min-width:768px){
        .wr-sidebar { padding-bottom:calc(16px + var(--sab, 0px)) !important; }

    /* ══════════════════════════════════════════════════════════════
       PHONE-ONLY LAYER (≤767px) — Dynasty HQ readability
       iPad portrait starts at 768px, so nothing in this block can
       affect tablet or desktop rendering. Scout AI lives in the
       ReconAI repo and is untouched by definition.

       Strategy: almost all DHQ type — including React inline styles —
       is rem-based, so scaling the rem root shrinks the entire type
       ramp proportionally in one rule. The rest is density: reclaim
       desktop gutters and let wide data rows scroll instead of crush.
       The classed multi-column grids already stack at their existing
       560-760px breakpoints, so they are not re-declared here.
       Tap targets are left alone (buttons keep px-based 44px minimums,
       unaffected by the rem scale).
       ══════════════════════════════════════════════════════════════ */
    @media (max-width: 767px) {
        /* Global type scale: 16px → 13.5px root (~16% smaller). */
        html { font-size: 13.5px; }
        /* Keep long-form body copy from dipping below comfortable. */
        body { font-size: 14px; }

        /* Frame density: reclaim desktop-sized gutters. */
        .wr-content-frame { padding: 8px 8px 32px; }
        .header { padding: 0.5rem 0.75rem; }
        .wr-module-strip { gap: 6px; margin-bottom: 8px; }
        .analytics-lab-card, .tc-dhq-panel { padding: 10px; }
        .analytics-command-panel { padding: 12px; gap: 10px; }
        .hub-platform-grid { padding: 0.75rem 8px 1.5rem; }

        /* Wide data rows: scroll, don't crush. */
        .league-detail-scroll, .mock-board-scroll, .mock-log-scroll { overflow-x: auto; }

        /* Sidebar drawer: comfortable width on phones (the ≤1023px
           rules already make it off-canvas with a tap-to-close
           overlay; 176px is too cramped for the full nav labels). */
        .wr-sidebar { width: 232px !important; }

        /* ── Layout enforcement ─────────────────────────────────
           The league shell normally gets full-width rules from a
           <style> rendered inside the LeagueDetail component, and
           the roster board sizes its grids from a JS viewport
           reading. Both have failed on real phones (stale webview
           width readings, restored-tab sessions). These static
           rules are the ground truth: on a phone, the content area
           and the roster grids are full-width, period. !important
           beats the inline styles; ≤767px means iPad/desktop never
           see any of this. */
        .wr-main-content { margin-left: 0 !important; width: 100% !important; max-width: 100% !important; }
        .wr-content-frame { width: 100% !important; max-width: 100% !important; }
        .mt-board-grid, .mt-expand-grid { grid-template-columns: 1fr !important; }

        /* Dashboard widget internals: side-by-side splits stack, and the
           6/8-wide KPI & position strips re-wrap into two rows. */
        .fb-split-grid { grid-template-columns: 1fr !important; }
        .fb-kpi-grid { grid-template-columns: repeat(3, 1fr) !important; }
        .fb-pos-grid { grid-template-columns: repeat(4, 1fr) !important; }
        .rp-pos-cols { grid-template-columns: repeat(2, 1fr) !important; }
    }

<script>
// PWA Install Prompt
let _deferredPrompt = null;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  _deferredPrompt = e;
  // Don't show immediately — wait 30 seconds
  setTimeout(() => {
    const banner = document.getElementById('pwa-install');
    if (banner && _deferredPrompt) banner.style.display = 'block';
  }, 30000);
});

document.getElementById('pwa-install-btn')?.addEventListener('click', async () => {
  if (!_deferredPrompt) return;
  _deferredPrompt.prompt();
  const result = await _deferredPrompt.userChoice;
  _deferredPrompt = null;
  document.getElementById('pwa-install').style.display = 'none';
});

document.getElementById('pwa-install-dismiss')?.addEventListener('click', () => {
  document.getElementById('pwa-install').style.display = 'none';
  _deferredPrompt = null;
  localStorage.setItem('pwa_install_dismissed', Date.now());
});

// Don't show if recently dismissed
if (localStorage.getItem('pwa_install_dismissed')) {
  const dismissed = parseInt(localStorage.getItem('pwa_install_dismissed'));
  if (Date.now() - dismissed < 7 * 24 * 60 * 60 * 1000) _deferredPrompt = null; // 7 day cooldown
}

window.addEventListener('appinstalled', () => {
  document.getElementById('pwa-install').style.display = 'none';
  _deferredPrompt = null;
});
</script>
