                                            </div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    )}
                </div>
            </div>
        );
    }

    // League Detail Component
    function LeagueDetail({ league, onBack, sleeperUserId }) {
        const [loading, setLoading] = useState(true);
        const [error, setError] = useState(null);
        const [playersData, setPlayersData] = useState({});
        const [myRoster, setMyRoster] = useState(null);
        const [standings, setStandings] = useState([]);
        const [viewingOwnerId, setViewingOwnerId] = useState(sleeperUserId);
        const [statsData, setStatsData] = useState({});
        const [projectionsData, setProjectionsData] = useState({});
        const [stats2025Data, setStats2025Data] = useState({});
        const [currentLeague, setCurrentLeague] = useState(league);
        const [activeYear, setActiveYear] = useState(league.season);

        useEffect(() => {
            loadLeagueDetails();
        }, [currentLeague]);

        async function loadLeagueDetails() {
            try {
                if (!currentLeague.rosters || !currentLeague.users) {
                    throw new Error('League missing roster or user data');
                }

                const myRosterData = currentLeague.rosters.find(r => r.owner_id === sleeperUserId);
                setMyRoster(myRosterData);

                const standingsData = currentLeague.rosters.map(roster => {
                    const user = currentLeague.users.find(u => u.user_id === roster.owner_id);
                    return {
                        rosterId: roster.roster_id,
                        userId: roster.owner_id,
                        displayName: user?.display_name || user?.username || 'Unknown',
                        avatar: user?.avatar,
                        wins: roster.settings?.wins || 0,
                        losses: roster.settings?.losses || 0,
                        ties: roster.settings?.ties || 0,
                        pointsFor: roster.settings?.fpts || 0,
                        division: roster.settings?.division || 0
                    };
                }).sort((a, b) => {
                    if (b.wins !== a.wins) return b.wins - a.wins;
                    if (a.losses !== b.losses) return a.losses - b.losses;
                    return b.pointsFor - a.pointsFor;
                });

                setStandings(standingsData);

                const [players, stats, projections, s2025] = await Promise.all([
                    fetchAllPlayers(),
                    fetchSeasonStats(currentLeague.season),
                    fetchSeasonProjections(currentLeague.season),
                    fetchSeasonStats(STATS_YEAR)
                ]);
                setPlayersData(players);
                setStatsData(stats);
                setProjectionsData(projections);
                setStats2025Data(s2025);
                setLoading(false);
            } catch (err) {
                console.error('Failed to load league details:', err);
                setError(err.message || 'Failed to load league details');
                setLoading(false);
            }
        }

        async function switchYear(year) {
            if (year === activeYear) return;
            setLoading(true);
            setError(null);
            setActiveYear(year);
            try {
                const targetYear = parseInt(year);
                const currentYear = parseInt(activeYear);
                let targetLeagueId = null;

                if (targetYear < currentYear) {
                    // Going backward: walk previous_league_id chain
                    let leagueId = currentLeague.id;
                    for (let y = currentYear; y > targetYear && leagueId; y--) {
                        const leagueInfo = await fetchLeagueInfo(leagueId);
                        leagueId = leagueInfo?.previous_league_id || null;
                    }
                    targetLeagueId = leagueId;
                } else {
                    // Going forward: get user leagues for target year, then check which one chains back to current league
                    const userLeagues = await fetchUserLeagues(sleeperUserId, year);
                    for (const lg of userLeagues) {
                        // Walk this league's previous_league_id chain to see if it connects to our current league
                        let checkId = lg.previous_league_id;
                        let steps = targetYear - currentYear;
                        while (steps > 1 && checkId) {
                            const info = await fetchLeagueInfo(checkId);
                            checkId = info?.previous_league_id || null;
                            steps--;
                        }
                        if (checkId === currentLeague.id) {
                            targetLeagueId = lg.league_id;
                            break;
                        }
                    }
                    // Fallback: match by name if chain doesn't connect
                    if (!targetLeagueId) {
                        const nameMatch = userLeagues.find(l => l.name === currentLeague.name);
                        targetLeagueId = nameMatch ? nameMatch.league_id : (userLeagues[0] ? userLeagues[0].league_id : null);
                    }
                }

                if (!targetLeagueId) {
                    setError('No leagues found for ' + year);
                    setLoading(false);
                    return;
                }

                const [leagueInfo, rosters, users] = await Promise.all([
                    fetchLeagueInfo(targetLeagueId),
                    fetchLeagueRosters(targetLeagueId),
                    fetchLeagueUsers(targetLeagueId)
                ]);
                setViewingOwnerId(sleeperUserId);
                setCurrentLeague({
                    id: targetLeagueId,
                    name: leagueInfo.name,
                    season: year,
                    scoring_settings: leagueInfo.scoring_settings || {},
                    roster_positions: leagueInfo.roster_positions || [],
                    rosters,
                    users
                });
            } catch (err) {
                console.error('Failed to switch year:', err);
                setError('Failed to load ' + year + ' data');
                setLoading(false);
            }
        }

        function getPlayerName(playerId) {
            const player = playersData[playerId];
            if (!player) return `Player ${playerId}`;
            return player.full_name || `${player.first_name || ''} ${player.last_name || ''}`.trim() || `Player ${playerId}`;
        }

        function getPlayerPosition(playerId) {
            const player = playersData[playerId];
            return player?.position || '??';
        }

        function getPlayerTeam(playerId) {
            const player = playersData[playerId];
            return player?.team || '';
        }

        // Compute fantasy pts using the league's actual scoring_settings weights,
        // applied to raw stat fields — works for both offensive and IDP players.
        // Mirrors the Team Comps page's fantasyPointsFromScoring() approach:
        // always use scoring_settings when available so IDP defensive stats aren't
        // silently zeroed out by Sleeper's pre-calculated pts_half_ppr = 0.
        function calcRawPts(s) {
            if (!s) return null;
            const scoring = currentLeague?.scoring_settings;
            if (scoring) {
                let total = 0;
                for (const [field, weight] of Object.entries(scoring)) {
                    if (typeof weight !== 'number') continue;
                    if (s[field] != null) total += Number(s[field]) * weight;
                }
                return total;
            }
            // Fallback: Sleeper's pre-calculated totals (offensive players only)
            const pre = s.pts_half_ppr ?? s.pts_ppr ?? s.pts_std ?? null;
            return pre !== null ? Number(pre) : null;
        }

        function getPlayerStats(playerId) {
            const player = playersData[playerId];
            // Always show STATS_YEAR totals; fall back to current-season data for historical year views
            const s = stats2025Data[playerId] || statsData[playerId];
            const p = projectionsData[playerId];

            // Years of experience
            const yrs = player?.years_exp != null ? player.years_exp : '-';

            // Fantasy points — uses league scoring_settings for IDP players
            const rawPts = calcRawPts(s);
            const pts = rawPts !== null ? Number(rawPts).toFixed(1) : '-';

            // Games played
            const gp = s?.gp != null ? s.gp : '-';

            // Average points per game
            let avg = '-';
            if (rawPts !== null && s?.gp && s.gp > 0) {
                avg = (rawPts / s.gp).toFixed(1);
            }

            // Projected points — use Sleeper projections when available, otherwise 2025 season totals
            const rawProj = p ? (p.pts_half_ppr ?? p.pts_ppr ?? p.pts_std ?? null) : null;
            const rawPts2025 = calcRawPts(stats2025Data[playerId]);
            const proj = rawProj !== null ? Number(rawProj).toFixed(1) : (rawPts2025 !== null ? Number(rawPts2025).toFixed(1) : '-');

            return { yrs, pts, gp, avg, proj };
        }

        function getPositionColor(pos) {
            const colors = { QB: '#FF6B6B', RB: '#4ECDC4', WR: '#45B7D1', TE: '#F7DC6F', K: '#BB8FCE', DEF: '#85929E' };
            return colors[pos] || 'var(--silver)';
        }

        function fantasyProsUrl(playerId) {
            const player = playersData[playerId];
            if (!player?.full_name) return null;
            const slug = player.full_name
                .toLowerCase()
                .replace(/['\u2019.]/g, '')
                .replace(/[^a-z0-9]+/g, '-')
                .replace(/-+/g, '-')
                .replace(/^-|-$/g, '');
            return `https://www.fantasypros.com/nfl/players/${slug}.php`;
        }

        if (error) {
            return (
                <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', color: 'var(--white)', padding: '2rem', textAlign: 'center' }}>
                    <div style={{ color: '#E74C3C', fontSize: '1.5rem', marginBottom: '1rem' }}>Error Loading League</div>
                    <div style={{ color: 'var(--silver)', marginBottom: '2rem' }}>{error}</div>
                    <button onClick={onBack} style={{ padding: '0.75rem 1.5rem', background: 'var(--gold)', border: 'none', borderRadius: '8px', color: 'var(--black)', fontFamily: 'Oswald, sans-serif', fontSize: '1rem', fontWeight: '700', cursor: 'pointer' }}>← Back to Dashboard</button>
                </div>
            );
        }

        if (loading) {
            return (
                <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', color: 'var(--gold)', gap: '1rem' }}>
                    <div style={{ fontSize: '1.5rem' }}>Loading {currentLeague.name}...</div>
                    <div style={{ fontSize: '0.9rem', color: 'var(--silver)' }}>Fetching player database & stats</div>
                </div>
            );
        }

        // Currently viewed roster
        const viewingRoster = currentLeague.rosters.find(r => r.owner_id === viewingOwnerId) || myRoster;
        const viewingOwner = standings.find(t => t.userId === viewingOwnerId);
        const isViewingMyTeam = viewingOwnerId === sleeperUserId;

        // Stat column style shared by header and rows
        const statColStyle = { width: '42px', textAlign: 'center', fontSize: '0.65rem', flexShrink: 0 };

        // Column header row for stat columns — merged into section labels
        const statLabels = ['YRS', 'PTS', 'GP', 'AVG', 'PROJ'];

        function SectionLabel({ label, color, borderColor, borderWidth }) {
            return (
                <div style={{
                    display: 'flex',
                    alignItems: 'center',
                    marginBottom: '0.5rem',
                    paddingBottom: '0.4rem',
                    borderBottom: `${borderWidth || '1px'} solid ${borderColor || color}`,
                    gap: '0.5rem'
                }}>
                    <span style={{ width: '36px', flexShrink: 0 }}></span>
                    <span style={{ flex: 1, color: color, fontSize: '0.85rem', fontWeight: '700', letterSpacing: '0.08em' }}>{label}</span>
                    {statLabels.map(l => (
                        <span key={l} style={{ ...statColStyle, color: 'var(--gold)', fontWeight: '700', letterSpacing: '0.05em', opacity: 0.8 }}>{l}</span>
                    ))}
                </div>
            );
        }

        // PlayerRow with gold position box, clickable name, 5 stat columns
        function PlayerRow({ playerId, section }) {
            const pos = getPlayerPosition(playerId);
            const stats = getPlayerStats(playerId);
            const team = getPlayerTeam(playerId);
            const fpUrl = fantasyProsUrl(playerId);
            const borderColor = section === 'starter' ? 'var(--gold)' : section === 'ir' ? '#E74C3C' : section === 'taxi' ? '#3498DB' : 'transparent';
            const bgColor = section === 'starter' ? 'rgba(212, 175, 55, 0.05)' : section === 'ir' ? 'rgba(231, 76, 60, 0.05)' : section === 'taxi' ? 'rgba(52, 152, 219, 0.05)' : 'rgba(255, 255, 255, 0.02)';
            return (
                <div style={{
                    display: 'flex',
                    alignItems: 'center',
                    padding: '0.45rem 0.6rem',
                    marginBottom: '0.3rem',
                    background: bgColor,
                    borderLeft: borderColor !== 'transparent' ? `3px solid ${borderColor}` : 'none',
                    borderRadius: '4px',
                    gap: '0.5rem'
                }}>
                    {/* Gold position box */}
                    <span style={{
                        display: 'inline-flex',
                        alignItems: 'center',
                        justifyContent: 'center',
                        width: '36px',
                        flexShrink: 0,
                        fontSize: '0.65rem',
                        fontWeight: '700',
                        color: getPositionColor(pos),
                        border: '1.5px solid var(--gold)',
                        borderRadius: '3px',
                        padding: '2px 0',
                        background: 'rgba(212, 175, 55, 0.08)',
                        letterSpacing: '0.02em'
                    }}>
                        {pos}
                    </span>
                    {/* Player name + team */}
                    <a
                        href={fpUrl || '#'}
                        target="_blank"
                        rel="noopener noreferrer"
                        style={{
                            flex: 1,
                            color: 'var(--white)',
                            fontSize: '0.92rem',
                            overflow: 'hidden',
                            textOverflow: 'ellipsis',
                            whiteSpace: 'nowrap',
                            textDecoration: 'none',
                            transition: 'color 0.2s',
                            minWidth: 0
                        }}
                        onMouseEnter={e => e.target.style.color = 'var(--gold)'}
                        onMouseLeave={e => e.target.style.color = 'var(--white)'}
                    >
                        {getPlayerName(playerId)} <span style={{ fontSize: '0.68rem', color: 'var(--silver)', opacity: 0.5 }}>{team}</span>
                    </a>
                    {/* Stat columns: YRS PTS GP AVG PROJ */}
                    <span style={{ ...statColStyle, color: 'var(--silver)', opacity: 0.7 }}>{stats.yrs}</span>
                    <span style={{ ...statColStyle, color: 'var(--gold)', fontWeight: '700' }}>{stats.pts}</span>
                    <span style={{ ...statColStyle, color: 'var(--silver)', opacity: 0.7 }}>{stats.gp}</span>
                    <span style={{ ...statColStyle, color: 'var(--silver)', opacity: 0.7 }}>{stats.avg}</span>
                    <span style={{ ...statColStyle, color: '#4ECDC4', fontWeight: '600' }}>{stats.proj}</span>
                </div>
            );
        }

        // Reusable roster section renderer
        function RosterSection({ roster }) {
            if (!roster) return <div style={{ textAlign: 'center', color: 'var(--silver)', padding: '2rem' }}>No roster found</div>;
            const starters = roster.starters || [];
            const reserve = roster.reserve || [];
            const taxi = roster.taxi || [];
            const bench = (roster.players || []).filter(p => !starters.includes(p) && !reserve.includes(p) && !taxi.includes(p));

            return (
                <>
                    {starters.length > 0 && (
                        <div style={{ marginBottom: '1.25rem' }}>
                            <SectionLabel label="STARTERS" color="var(--gold)" borderColor="var(--gold)" borderWidth="2px" />
                            {starters.map((id, i) => <PlayerRow key={i} playerId={id} section="starter" />)}
                        </div>
                    )}
                    {bench.length > 0 && (
                        <div style={{ marginBottom: '1.25rem' }}>
                            <SectionLabel label="BENCH" color="var(--silver)" borderColor="rgba(255,255,255,0.15)" />
                            {bench.map((id, i) => <PlayerRow key={i} playerId={id} section="bench" />)}
                        </div>
                    )}
                    {reserve.length > 0 && (
                        <div style={{ marginBottom: '1.25rem' }}>
                            <SectionLabel label="INJURED RESERVE" color="#E74C3C" borderColor="rgba(231,76,60,0.3)" />
                            {reserve.map((id, i) => <PlayerRow key={i} playerId={id} section="ir" />)}
                        </div>
                    )}
                    {taxi.length > 0 && (
                        <div>
                            <SectionLabel label="TAXI SQUAD" color="#3498DB" borderColor="rgba(52,152,219,0.3)" />
                            {taxi.map((id, i) => <PlayerRow key={i} playerId={id} section="taxi" />)}
                        </div>
                    )}
                </>
            );
        }

        // Build divisions
        const divisions = {};
        const hasDivisions = standings.some(t => t.division > 0);
        if (hasDivisions) {
            standings.forEach(team => {
                const div = team.division || 0;
                if (!divisions[div]) divisions[div] = [];
                divisions[div].push(team);
            });
        } else {
            divisions[0] = [...standings];
        }
        const divisionKeys = Object.keys(divisions).sort((a, b) => Number(a) - Number(b));

        // Nav buttons
        const navButtons = [
            { label: 'Dashboard', action: onBack },
            { label: 'Team Comps', url: 'https://skjjcruz.github.io/fantasy-football-owner-dashboard/' },
            { label: 'Matchup', url: `https://sleeper.com/leagues/${currentLeague.id}/matchup` },
            { label: 'Draft War Room', url: 'https://skjjcruz.github.io/Owner-Dashboard--V7/' },
            { label: 'Trade Calculator', action: () => window.location.href = 'trade-calculator.html' },
            { label: 'Free Agent Tracker', action: () => window.location.href = 'free-agency.html' }
        ];

        return (
            <div className="app-container" style={{ paddingBottom: '60px' }}>
                {/* Header */}
                <header className="header" style={{ position: 'relative', marginBottom: '0', paddingBottom: '0.75rem' }}>
                    <div className="header-title">{currentLeague.name}</div>
                    <div style={{ textAlign: 'center', color: 'var(--gold)', fontSize: '1.1rem', fontFamily: 'Oswald, sans-serif', marginTop: '0.25rem' }}>
                        {activeYear} SEASON
                    </div>
                </header>

                {/* Nav Buttons Bar */}
                <div style={{
                    display: 'flex',
                    justifyContent: 'center',
                    gap: '0.35rem',
                    padding: '0.5rem 0.75rem',
                    background: 'var(--off-black)',
                    borderBottom: '1px solid rgba(212, 175, 55, 0.2)',
                    flexWrap: 'wrap'
                }}>
                    {navButtons.map((btn, idx) => (
                        <button
                            key={idx}
                            onClick={() => btn.action ? btn.action() : window.open(btn.url, '_blank')}
                            style={{
                                padding: '0.3rem 0.65rem',
                                background: btn.label === 'Dashboard' ? 'var(--gold)' : 'var(--black)',
                                border: '1.5px solid var(--gold)',
                                borderRadius: '4px',
                                color: btn.label === 'Dashboard' ? 'var(--black)' : 'var(--gold)',
                                fontFamily: 'Oswald, sans-serif',
                                fontSize: '0.68rem',
                                fontWeight: '700',
                                cursor: 'pointer',
                                textTransform: 'uppercase',
                                letterSpacing: '0.05em',
                                transition: 'all 0.2s ease',
                                whiteSpace: 'nowrap'
                            }}
                            onMouseEnter={e => { if (btn.label !== 'Dashboard') { e.target.style.background = 'rgba(212,175,55,0.15)'; }}}
                            onMouseLeave={e => { if (btn.label !== 'Dashboard') { e.target.style.background = 'var(--black)'; }}}
                        >
                            {btn.label}
                        </button>
                    ))}
                </div>

                {/* Year / Stats Toggle Bar */}
                <div style={{
                    display: 'flex',
                    justifyContent: 'center',
                    alignItems: 'center',
                    gap: '0.75rem',
                    padding: '0.45rem 1rem',
                    background: 'var(--black)',
                    borderBottom: '2px solid rgba(212, 175, 55, 0.15)',
                    flexWrap: 'wrap'
                }}>
                    <div style={{
                        display: 'flex',
                        alignItems: 'center',
                        gap: '0.2rem',
                        background: 'var(--off-black)',
                        borderRadius: '6px',
                        padding: '0.15rem',
                        border: '1px solid rgba(212, 175, 55, 0.2)'
                    }}>
                        {['2023', '2024', '2025', '2026'].map(year => (
                            <div
                                key={year}
                                style={{
                                    padding: '0.2rem 0.55rem',
                                    borderRadius: '4px',
                                    fontSize: '0.68rem',
                                    fontWeight: '700',
                                    fontFamily: 'Oswald, sans-serif',
                                    color: year === activeYear ? 'var(--black)' : 'var(--silver)',
                                    background: year === activeYear ? 'var(--gold)' : 'transparent',
                                    cursor: year === activeYear ? 'default' : 'pointer',
                                    opacity: year === activeYear ? 1 : 0.4,
                                    transition: 'all 0.2s'
                                }}
                                onClick={() => switchYear(year)}
                            >
                                {year}
                            </div>
                        ))}
                    </div>
                    <div style={{ color: 'rgba(212,175,55,0.3)', fontSize: '0.8rem' }}>|</div>
                    <div style={{ color: 'var(--silver)', fontSize: '0.68rem', fontFamily: 'Oswald, sans-serif', opacity: 0.7 }}>
                        Half PPR · {standings.length} Teams
                    </div>
                </div>

                {/* 3-Column Layout */}
                <div style={{ padding: '1rem', maxWidth: '1600px', margin: '0 auto' }}>
                    <style dangerouslySetInnerHTML={{ __html: `
                        @media (min-width: 768px) {
                            .league-detail-grid { grid-template-columns: 220px 1fr 260px !important; }
                            .league-detail-grid > div {
                                max-height: calc(100vh - 200px);
                                display: flex;
                                flex-direction: column;
                            }
                            .league-detail-scroll {
                                flex: 1;
                                overflow-y: auto;
                                overflow-x: hidden;
                                min-height: 0;
                            }
                            .league-detail-scroll::-webkit-scrollbar { width: 6px; }
                            .league-detail-scroll::-webkit-scrollbar-track { background: rgba(212,175,55,0.1); border-radius: 3px; }
                            .league-detail-scroll::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 3px; }
                        }
                        @media (min-width: 1200px) {
                            .league-detail-grid { grid-template-columns: 260px 1fr 300px !important; }
                        }
                    `}} />

                    <div className="league-detail-grid" style={{ display: 'grid', gridTemplateColumns: '1fr', gap: '1.25rem' }}>

                        {/* LEFT COLUMN - Clickable Owners */}
                        <div style={{ background: 'var(--black)', border: '2px solid rgba(212, 175, 55, 0.3)', borderRadius: '12px', padding: '1rem' }}>
                            <h3 style={{ color: 'var(--gold)', fontFamily: 'Bebas Neue, cursive', fontSize: '1.4rem', letterSpacing: '0.1em', marginBottom: '0.75rem', textAlign: 'center', paddingBottom: '0.5rem', borderBottom: '1px solid rgba(212, 175, 55, 0.3)', flexShrink: 0 }}>OWNERS</h3>

                            <div className="league-detail-scroll">
                            {standings.map((team, idx) => {
                                const isViewing = team.userId === viewingOwnerId;
                                const isMe = team.userId === sleeperUserId;
                                return (
                                    <div
                                        key={team.rosterId}
                                        onClick={() => setViewingOwnerId(team.userId)}
                                        style={{
                                            display: 'flex',
                                            alignItems: 'center',
                                            gap: '0.5rem',
                                            padding: '0.5rem',
                                            marginBottom: '0.35rem',
                                            background: isViewing ? 'rgba(212, 175, 55, 0.15)' : isMe ? 'rgba(212, 175, 55, 0.06)' : 'transparent',
                                            border: isViewing ? '1.5px solid var(--gold)' : isMe ? '1px solid rgba(212, 175, 55, 0.3)' : '1px solid rgba(255, 255, 255, 0.06)',
                                            borderRadius: '8px',
                                            cursor: 'pointer',
                                            transition: 'all 0.2s ease'
                                        }}
                                    >
                                        <div style={{ width: '20px', color: 'var(--gold)', fontWeight: '700', fontSize: '0.8rem', textAlign: 'center', flexShrink: 0 }}>{idx + 1}</div>
                                        {team.avatar ? (
                                            <img src={`https://sleepercdn.com/avatars/thumbs/${team.avatar}`} alt="" style={{ width: '32px', height: '32px', borderRadius: '50%', border: isViewing ? '2px solid var(--gold)' : '2px solid var(--charcoal)', flexShrink: 0 }} />
                                        ) : (
                                            <div style={{ width: '32px', height: '32px', borderRadius: '50%', background: 'var(--charcoal)', border: isViewing ? '2px solid var(--gold)' : '2px solid rgba(255,255,255,0.1)', flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '0.75rem', color: 'var(--silver)' }}>{team.displayName.charAt(0)}</div>
                                        )}
                                        <div style={{ flex: 1, minWidth: 0 }}>
                                            <div style={{ color: isViewing ? 'var(--gold)' : isMe ? 'var(--gold)' : 'var(--white)', fontSize: '0.88rem', fontWeight: isViewing || isMe ? '700' : '500', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', lineHeight: '1.2' }}>
                                                {team.displayName}{isMe ? ' (You)' : ''}
                                            </div>
                                            <div style={{ color: 'var(--silver)', fontSize: '0.7rem', opacity: 0.7 }}>
                                                {team.wins}-{team.losses}{team.ties > 0 ? `-${team.ties}` : ''} · {team.pointsFor.toFixed(1)} PF
                                            </div>
                                        </div>

    function EarningsModal({ entries, onAdd, onDelete, onClose }) {

        const [form, setForm] = React.useState({ year: '2024', league: '', description: '', amount: '' });

        function handleAdd(e) {
            e.preventDefault();
            if (!form.league.trim()) { setFormError('League name is required.'); return; }
            const amount = parseFloat(form.amount);
            if (isNaN(amount) || amount === 0) { setFormError('Enter a valid amount.'); return; }
            setFormError('');
            onAdd({ id: Date.now().toString(), year: form.year, league: form.league.trim(), description: form.description.trim(), amount });
            setForm(f => ({ ...f, league: '', description: '', amount: '' }));
        }

        return (
            <div className="earnings-modal-overlay" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>

                    <div className="earnings-modal-header">
                        <div className="earnings-modal-title">EARNINGS TRACKER</div>

                            </div>

                            <>
                                <div style={{ display: 'grid', gridTemplateColumns: '3rem 1fr 1fr auto auto', gap: '0.5rem', padding: '0 0 0.4rem', borderBottom: '1px solid rgba(212,175,55,0.2)', marginBottom: '0.25rem' }}>
                                    <div style={{ fontSize: '0.68rem', color: 'var(--silver)', textTransform: 'uppercase', letterSpacing: '0.08em' }}>Year</div>
                                    <div style={{ fontSize: '0.68rem', color: 'var(--silver)', textTransform: 'uppercase', letterSpacing: '0.08em' }}>League</div>
                                    <div style={{ fontSize: '0.68rem', color: 'var(--silver)', textTransform: 'uppercase', letterSpacing: '0.08em' }}>Note</div>
                                    <div style={{ fontSize: '0.68rem', color: 'var(--silver)', textTransform: 'uppercase', letterSpacing: '0.08em', textAlign: 'right' }}>Amount</div>
                                    <div></div>
                                </div>
                                {sorted.map(entry => (
                                    <div key={entry.id} style={{ display: 'grid', gridTemplateColumns: '3rem 1fr 1fr auto auto', gap: '0.5rem', alignItems: 'center', padding: '0.55rem 0', borderBottom: '1px solid rgba(255,255,255,0.05)' }}>
                                        <div className="earnings-entry-year">{entry.year}</div>
                                        <div className="earnings-entry-league">{entry.league}</div>
                                        <div className="earnings-entry-desc">{entry.description || '—'}</div>
                                        <div className="earnings-entry-amount">${parseFloat(entry.amount).toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 })}</div>
                                        <div onClick={() => onDelete(entry.id)} style={{ cursor: 'pointer', color: 'rgba(231,76,60,0.7)', fontSize: '1rem', lineHeight: 1, paddingLeft: '0.25rem' }} title="Delete">×</div>
                                    </div>
                                ))}
                                <div className="earnings-total-row">
                                    <div style={{ fontFamily: 'Bebas Neue, cursive', fontSize: '1rem', color: 'var(--silver)', letterSpacing: '0.12em' }}>TOTAL EARNINGS</div>
                                    <div style={{ fontFamily: 'Bebas Neue, cursive', fontSize: '1.3rem', color: 'var(--win-green)', letterSpacing: '0.05em' }}>
                                        ${total.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 })}

                    <form className="earnings-add-form" onSubmit={handleAdd}>

                        <select className="earnings-input" value={form.year} onChange={e => setForm(f => ({ ...f, year: e.target.value }))}
                            style={{ background: 'rgba(255,255,255,0.05)', color: 'var(--white)' }}>
                            {YEARS.map(y => <option key={y} value={y} style={{ background: '#1a1a1a' }}>{y}</option>)}
                        </select>
                        <input className="earnings-input" placeholder="League name" value={form.league}
                            onChange={e => setForm(f => ({ ...f, league: e.target.value }))} />
                        <input className="earnings-input" placeholder="Note (e.g. Champion)" value={form.description}
                            onChange={e => setForm(f => ({ ...f, description: e.target.value }))} />
                        <input className="earnings-input" placeholder="Amount ($)" type="number" min="0" step="1" value={form.amount}
                            onChange={e => setForm(f => ({ ...f, amount: e.target.value }))} />

                        <button type="submit" style={{ gridColumn: '1 / -1', background: 'var(--gold)', color: 'var(--black)', border: 'none', borderRadius: '6px', padding: '0.55rem', fontFamily: 'Bebas Neue, cursive', fontSize: '1rem', letterSpacing: '0.1em', cursor: 'pointer' }}>

    // Main Dashboard
    function OwnerDashboard() {
        const [showSettings, setShowSettings] = useState(false);

        const [trophiesLoading, setTrophiesLoading] = useState(false);

        // Earnings state
        const [earningsEntries, setEarningsEntries] = useState(() => loadEarnings());
        const [showEarnings, setShowEarnings] = useState(false);

        const totalEarnings = earningsEntries.reduce((sum, e) => sum + (parseFloat(e.amount) || 0), 0);

        function handleAddEarning(entry) {
            const updated = [...earningsEntries, entry];
            setEarningsEntries(updated);
            saveEarnings(updated);
        }

        function handleDeleteEarning(id) {
            const updated = earningsEntries.filter(e => e.id !== id);
            setEarningsEntries(updated);
            saveEarnings(updated);
        }

        // Calendar state
        const [calendarEvents, setCalendarEvents] = useState(() => loadCalendarEvents());
        const [showCalendar, setShowCalendar] = useState(false);

        // Display name state
        const [customDisplayName, setCustomDisplayName] = useState(() => {
            return localStorage.getItem('od_display_name') || '';
        });

        // DM state
        const [showDM, setShowDM] = useState(false);
        const [dmUnread, setDmUnread] = useState(0);

        // Cloud sync — load from Supabase on mount and update state if remote data differs
        useEffect(() => {
            window.OD.loadCalendarEvents(DEFAULT_EVENTS).then(remote => {
                setCalendarEvents(remote);
            }).catch(() => {});
            window.OD.loadEarnings().then(remote => {
                if (remote && remote.length > 0) setEarningsEntries(remote);
            }).catch(() => {});
            window.OD.loadDisplayName().then(name => {
                if (name) { setCustomDisplayName(name); localStorage.setItem('od_display_name', name); }
            }).catch(() => {});
            window.OD.loadDMs().then(msgs => {
                const unread = msgs.filter(m => m.to_username === sleeperUsername && !m.read).length;
                setDmUnread(unread);
            }).catch(() => {});
        }, []);

        // Sync PWA home screen badge with unread DM count
        useEffect(() => {
            if (dmUnread > 0) {
                navigator.setAppBadge?.(dmUnread).catch(() => {});
            } else {
                navigator.clearAppBadge?.().catch(() => {});
            }
        }, [dmUnread]);

        // Poll for new DMs every 30 seconds
        useEffect(() => {
            const poll = setInterval(() => {
                if (showDM) return; // modal handles its own refresh
                window.OD.loadDMs().then(msgs => {
                    const unread = msgs.filter(m => m.to_username === sleeperUsername && !m.read).length;
                    setDmUnread(unread);
                }).catch(() => {});
            }, 30000);
            return () => clearInterval(poll);
        }, [showDM]);
        const [showEventForm, setShowEventForm] = useState(false);
        const [editingEvent, setEditingEvent] = useState(null);
        const [selectedEvent, setSelectedEvent] = useState(null);
        const [prefillDate, setPrefillDate] = useState('');

        const upcomingEvents = getUpcomingEvents(calendarEvents);

        const leagueMates = React.useMemo(() => {
            const seen = new Set();
            // seed with current user's id so we exclude ourselves
            if (sleeperUser?.user_id) seen.add(sleeperUser.user_id);
            const mates = [];
            sleeperLeagues.forEach(league => {
                (league.users || []).forEach(u => {
                    const uid = u.user_id;
                    if (uid && !seen.has(uid)) {
                        seen.add(uid);
                        mates.push(u);
                    }
                });
            });
            return mates.sort((a, b) => (a.display_name || a.username || '').localeCompare(b.display_name || b.username || ''));
        }, [sleeperLeagues, sleeperUser]);

        // News ticker state
        const [newsItems, setNewsItems] = useState([]);

        useEffect(() => {
            fetchNFLNews().then(items => {
                if (items && items.length > 0) setNewsItems(items);
            });
            // Refresh every 10 minutes
            const interval = setInterval(() => {
                fetchNFLNews().then(items => {
                    if (items && items.length > 0) setNewsItems(items);
                });
            }, 10 * 60 * 1000);
            return () => clearInterval(interval);
        }, []);

        function handleSaveEvent(eventData) {
            let updated;
            const existing = calendarEvents.find(e => e.id === eventData.id);
            if (existing) {
                updated = calendarEvents.map(e => e.id === eventData.id ? eventData : e);
            } else {
                updated = [...calendarEvents, eventData];
            }
            setCalendarEvents(updated);
            saveCalendarEvents(updated);
            setShowEventForm(false);
            setEditingEvent(null);
            setSelectedEvent(null);
            setPrefillDate('');
        }

        function handleDeleteEvent(id) {
            if (!confirm('Delete this event?')) return;
            const updated = calendarEvents.filter(e => e.id !== id);
            setCalendarEvents(updated);
            saveCalendarEvents(updated);
            setSelectedEvent(null);
        }

        const AVAILABLE_YEARS = ['2023', '2024', '2025', '2026'];

        useEffect(() => {
            loadSleeperData();
        }, [selectedYear]);

        useEffect(() => {
            if (sleeperUser?.user_id) {
                loadTrophies(sleeperUser.user_id);
            }
        }, [sleeperUser]);

        async function loadTrophies(userId) {
            setTrophiesLoading(true);
            const TROPHY_YEARS = ['2019', '2020', '2021', '2022', '2023', '2024', '2025'];
            const found = [];

            await Promise.all(TROPHY_YEARS.map(async (year) => {
                try {
                    const leagues = await fetchUserLeagues(userId, year);
                    if (!leagues || leagues.length === 0) return;

                    await Promise.all(leagues.map(async (league) => {
                        try {
                            const [bracket, rosters] = await Promise.all([
                                fetchWinnersBracket(league.league_id),
                                fetchLeagueRosters(league.league_id)
                            ]);

                            if (!Array.isArray(bracket) || bracket.length === 0) return;

                            // Find the championship: highest round, any completed game (w is set)
                            const maxRound = Math.max(...bracket.map(m => m.r));
                            const finalGames = bracket.filter(m => m.r === maxRound && m.w != null);
                            if (finalGames.length === 0) return;
                            // Championship is the first (and usually only) final-round game
                            const championship = finalGames[0];

                            // Get owner's roster_id in this league
                            const myRoster = rosters.find(r => r.owner_id === userId);
                            if (!myRoster) return;

                            console.log(`[Trophies] ${year} ${league.name}: champion roster=${championship.w}, my roster=${myRoster.roster_id}`);

                            if (championship.w === myRoster.roster_id) {
                                console.log(`[Trophies] 🏆 Found championship! ${year} - ${league.name}`);
                                found.push({
                                    year: parseInt(year),
                                    league: league.name,
                                    icon: '🏆'
                                });
                            }
                        } catch (e) {
                            console.warn(`[Trophies] Error checking league ${league.name} (${year}):`, e);
                        }
                    }));
                } catch (e) {
                    console.warn(`[Trophies] Error fetching leagues for ${year}:`, e);
                }
            }));

            // Sort newest first
            found.sort((a, b) => b.year - a.year);
            console.log('[Trophies] Final trophies:', found);
            setTrophies(found);
            setTrophiesLoading(false);
        }

        async function loadSleeperData() {
            setLoading(true);
            setError(null);

            try {
                console.log('Fetching Sleeper user...', sleeperUsername);
                const user = await fetchSleeperUser(sleeperUsername);
                setSleeperUser(user);
                console.log('User loaded:', user);

                console.log('Fetching leagues for', selectedYear);
                const leagues = await fetchUserLeagues(user.user_id, selectedYear);
                console.log('Leagues loaded:', leagues);

                const leaguesWithDetails = await Promise.all(
                    leagues.map(async (league) => {
                        try {
                            const [rosters, users] = await Promise.all([
                                fetchLeagueRosters(league.league_id),
                                fetchLeagueUsers(league.league_id)
                            ]);

                            const myRoster = rosters.find(r => r.owner_id === user.user_id);
                            
                            return {
                                id: league.league_id,
                                name: league.name,
                                wins: myRoster?.settings?.wins || 0,
                                losses: myRoster?.settings?.losses || 0,
                                ties: myRoster?.settings?.ties || 0,
                                championships: 0,
                                season: selectedYear,
                                scoring_settings: league.scoring_settings || {},
                                roster_positions: league.roster_positions || [],
                                rosters,
                                users
                            };
                        } catch (e) {
                            console.error(`Failed to load league ${league.name}:`, e);
                            return null;
                        }
                    })
                );

                const validLeagues = leaguesWithDetails.filter(l => l !== null);
                setSleeperLeagues(validLeagues);
                console.log('Leagues with details:', validLeagues);
                setLoading(false);
            } catch (err) {
                console.error('Failed to load Sleeper data:', err);
                setError('Failed to load Sleeper data. Please refresh.');
                setLoading(false);
            }
        }

        // Show league detail if selected
        if (selectedLeague) {
            return <LeagueDetail
                league={selectedLeague}
                onBack={() => setSelectedLeague(null)}
                sleeperUserId={sleeperUser?.user_id}
            />;
        }

                    >

                        <path d="M12 1v6m0 6v6m-5.2-7.8l-4.3-4.2m12.9 0l4.3 4.2M1 12h6m6 0h6m-7.8 5.2l-4.2 4.3m0-12.9l4.2 4.3" stroke="var(--gold)"/>
                    </svg>
                </header>

                <div className="main-layout">

                                    {trophiesLoading ? (
                                        <div style={{ color: 'var(--silver)', fontSize: '0.8rem', opacity: 0.7, padding: '0.5rem' }}>Loading...</div>
                                    ) : trophies.length === 0 ? (
                                        <div style={{ color: 'var(--silver)', fontSize: '0.8rem', opacity: 0.7, padding: '0.5rem' }}>No championships yet</div>
                                    ) : (
                                        trophies.map((trophy, idx) => (
                                            <div key={idx} className="trophy">
                                                <div className="trophy-icon">{trophy.icon}</div>
                                                <div className="trophy-year">{trophy.year}</div>
                                                <div className="trophy-label">{trophy.league}</div>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>

                            <div className="earnings-box desktop-earnings" onClick={() => setShowEarnings(true)} title="Click to manage earnings">
                                <div className="earnings-title">EARNINGS</div>
                                <div className="earnings-amount">
                                    ${totalEarnings.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 })}
                                </div>
                                <div className="earnings-label">Total Winnings</div>
                                <div className="earnings-edit-hint">+ LOG PAYOUT</div>
                            </div>
                        </div>

                        <div className="league-window">
                            <div className="league-window-header" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: '0.5rem' }}>
                                <div style={{ flexShrink: 0 }}><span>⚡</span> SLEEPER LEAGUES</div>
                                <select
                                    value={selectedYear}
                                    onChange={e => setSelectedYear(e.target.value)}
                                    style={{
                                        background: 'var(--charcoal)',
                                        border: '1px solid rgba(212,175,55,0.4)',
                                        borderRadius: '4px',
                                        color: 'var(--white)',
                                        fontFamily: 'Oswald, sans-serif',
                                        fontWeight: '700',
                                        fontSize: '0.72rem',
                                        padding: '0.18rem 0.45rem',
                                        cursor: 'pointer',
                                        outline: 'none',
                                        flexShrink: 0,
                                    }}
                                >
                                    {AVAILABLE_YEARS.map(year => (
                                        <option key={year} value={year}>{year}</option>
                                    ))}
                                </select>
                            </div>

                            <div className="league-window-scroll">
                                {loading ? (
                                    <div style={{ padding: '2rem', textAlign: 'center', color: 'var(--gold)' }}>
                                        Loading leagues...
                                    </div>
                                ) : error ? (
                                    <div style={{ padding: '1rem', textAlign: 'center', color: '#E74C3C', fontSize: '0.85rem' }}>
                                        {error}
                                    </div>
                                ) : sleeperLeagues.length === 0 ? (
                                    <div style={{ padding: '2rem', textAlign: 'center', color: 'var(--silver)', fontSize: '0.85rem' }}>
                                        No leagues found for {selectedYear}
                                    </div>
                                ) : (
                                    sleeperLeagues.map(league => (
                                        <div
                                            key={league.id}
                                            className={`league-item ${activeLeagueId === league.id ? 'active' : ''}`}
                                            onClick={() => {
                                                setActiveLeagueId(league.id);
                                                setSelectedLeague(league);
                                                console.log('League clicked:', league);
                                            }}
                                        >
                                            <div className="league-item-name">
                                                {league.name}{league.championships > 0 && <span style={{ marginLeft:'0.3rem', fontSize:'0.75rem' }}>🏆</span>}
                                            </div>
                                            <div className="league-item-record">
                                                {league.wins}-{league.losses}{league.ties > 0 ? `-${league.ties}` : ''}
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>
                    </div>

                    {/* Right - Earnings (mobile) + Buttons */}
                    <div className="right-column">
                        {/* Mobile-only earnings panel */}
                        <div className="mobile-earnings" onClick={() => setShowEarnings(true)}>
                            <div className="earnings-title">EARNINGS</div>
                            <div className="earnings-amount">
                                ${totalEarnings.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 })}
                            </div>
                            <div className="earnings-label">Total Winnings</div>
                            <div className="earnings-edit-hint">+ LOG PAYOUT</div>
                        </div>

                        <button className="icon-button" onClick={() => { setShowDM(true); setDmUnread(0); }}>
                            <div className="icon-button-icon-container" style={{ position: 'relative' }}>
                                <svg className="icon-button-icon" viewBox="0 0 24 24" fill="none">
                                    <path d="M8 12h8M8 8h8M8 16h5" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/>
                                    <path d="M20 7l-3-3H7L4 7v10l3 3h10l3-3V7z" stroke="currentColor" strokeWidth="2" fill="none"/>
                                </svg>
                                {dmUnread > 0 && <div style={{ position: 'absolute', top: '-4px', right: '-4px', width: '16px', height: '16px', background: 'var(--gold)', borderRadius: '50%', fontSize: '0.6rem', display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'var(--black)', fontWeight: '700' }}>{dmUnread}</div>}
                            </div>
                            <div className="icon-button-label">DM</div>
                        </button>

                        <button className="icon-button" onClick={() => window.open('https://skjjcruz.github.io/fantasy-football-owner-dashboard/', '_blank')}>
                            <div className="icon-button-icon-container">
                                <svg className="icon-button-icon" viewBox="0 0 24 24" fill="none">
                                    <rect x="2" y="6" width="9" height="12" rx="1" stroke="currentColor" strokeWidth="2" fill="none"/>
                                    <rect x="13" y="6" width="9" height="12" rx="1" stroke="currentColor" strokeWidth="2" fill="none"/>
                                    <path d="M5 9h3M5 12h3M5 15h3M16 9h3M16 12h3M16 15h3" stroke="currentColor" strokeWidth="1.5"/>
                                </svg>
                            </div>
                            <div className="icon-button-label">Team<br/>Comps</div>
                        </button>

                        <button className="icon-button" onClick={() => window.location.href = 'trade-calculator.html'}>
                            <div className="icon-button-icon-container">
                                <svg className="icon-button-icon" viewBox="0 0 24 24" fill="none">
                                    <circle cx="8" cy="8" r="6" stroke="currentColor" strokeWidth="2" fill="none"/>
                                    <circle cx="16" cy="16" r="6" stroke="currentColor" strokeWidth="2" fill="none"/>
                                    <path d="M12 8l4 8M12 16l-4-8" stroke="currentColor" strokeWidth="2"/>
                                </svg>
                            </div>
                            <div className="icon-button-label">Trade<br/>Calculator</div>
                        </button>

                        <button className="icon-button" onClick={() => window.location.href = 'free-agency.html'}>
                            <div className="icon-button-icon-container">
                                <svg className="icon-button-icon" viewBox="0 0 24 24" fill="none">
                                    <circle cx="12" cy="8" r="4" stroke="currentColor" strokeWidth="2" fill="none"/>
                                    <path d="M6 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2" stroke="currentColor" strokeWidth="2"/>
                                    <path d="M12 8v4M10 10l2-2 2 2" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/>
                                </svg>
                            </div>
                            <div className="icon-button-label">Free Agency<br/>Tracker</div>
                        </button>

                        <button className="icon-button" onClick={() => window.open('https://skjjcruz.github.io/Owner-Dashboard--V7/', '_blank')}>
                            <div className="icon-button-icon-container">
                                <svg className="icon-button-icon" viewBox="0 0 24 24" fill="none">
                                    <path d="M12 2L4 7v6c0 5.5 3.8 10.7 8 12 4.2-1.3 8-6.5 8-12V7l-8-5z" stroke="currentColor" strokeWidth="2" fill="none"/>
                                    <path d="M12 8v8M8 12h8" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/>
                                </svg>
                            </div>
                            <div className="icon-button-label">2026 Draft<br/>War Room</div>
                        </button>

                        <button className="icon-button" onClick={() => window.open('https://www.leaguesafe.com/dashboard', '_blank')}>
                            <div className="icon-button-icon-container">
                                <svg className="icon-button-icon" viewBox="0 0 24 24" fill="none">
                                    <rect x="3" y="6" width="18" height="12" rx="2" stroke="currentColor" strokeWidth="2" fill="none"/>
                                    <path d="M7 11h10M7 14h6" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/>
                                    <circle cx="17" cy="9" r="1.5" fill="currentColor"/>
                                </svg>
                            </div>
                            <div className="icon-button-label">League<br/>Safe</div>
                        </button>

                    </div>
                </div>

                {/* News Ticker */}
                <div className="news-ticker-container">
                    <div className="news-ticker" style={{ animationDuration: newsItems.length > 0 ? `${Math.max(newsItems.length * 2, 15)}s` : '15s' }}>
                        <span className="news-ticker-label">NFL NEWS</span>
                        {newsItems.length > 0 ? (
                            newsItems.map((item, idx) => (
                                React.createElement(React.Fragment, { key: idx },
                                    React.createElement('a', {
                                        href: item.link,
                                        target: '_blank',
                                        rel: 'noopener noreferrer',
                                        className: 'news-item news-item-link'
                                    }, item.title),
                                    idx < newsItems.length - 1 && React.createElement('span', { className: 'news-separator' })
                                )
                            ))
                        ) : (
                            React.createElement(React.Fragment, null,
                                React.createElement('span', { className: 'news-item' }, 'Loading NFL news...'),
                                React.createElement('span', { className: 'news-separator' })
                            )
                        )}
                    </div>
                </div>

                {showDM && (
                    <DMModal
                        onClose={() => setShowDM(false)}
                        currentUsername={sleeperUsername}
                        leagueMates={leagueMates}
                    />
                )}

                {showSettings && (
                    <SettingsModal
                        onClose={() => setShowSettings(false)}
                        initDisplayName={customDisplayName}
                        onDisplayNameSave={(name) => {
                            setCustomDisplayName(name);
                            window.OD.saveDisplayName(name);
                        }}
                    />
                )}

                {showEarnings && (
                    <EarningsModal
                        entries={earningsEntries}
                        onAdd={handleAddEarning}
                        onDelete={handleDeleteEarning}
                        onClose={() => setShowEarnings(false)}
                    />
                )}

                {/* Calendar Modal */}
                {showCalendar && (
                    <CalendarModal
                        events={calendarEvents}
                        onClose={() => setShowCalendar(false)}
                        onAddEvent={(dateStr) => {
                            setPrefillDate(dateStr);
                            setEditingEvent(null);
                            setShowEventForm(true);
                        }}
                        onEditEvent={(ev) => {
                            setEditingEvent(ev);
                            setShowEventForm(true);
                        }}
                        onDeleteEvent={(id) => handleDeleteEvent(id)}
                        onExport={() => exportCalendarEvents(calendarEvents)}
                        onImportFile={(e) => {
                            const file = e.target.files[0];
                            if (!file) return;
                            const reader = new FileReader();
                            reader.onload = (ev) => {
                                try {
                                    const parsed = JSON.parse(ev.target.result);
                                    const imported = Array.isArray(parsed) ? parsed : parsed.events;
                                    if (!Array.isArray(imported)) throw new Error('Invalid format');
                                    if (confirm(`Restore ${imported.length} events from backup? This will replace your current calendar.`)) {
                                        saveCalendarEvents(imported);
                                        setCalendarEvents(imported);
                                    }
                                } catch (err) {
                                    alert('Import failed: invalid backup file.');
                                }
                                e.target.value = '';
                            };
                            reader.readAsText(file);
                        }}
                    />
                )}

                {/* Event Form Modal */}
                {showEventForm && (
                    <EventFormModal
                        event={editingEvent || (prefillDate ? { date: prefillDate } : null)}
                        onSave={handleSaveEvent}
                        onClose={() => { setShowEventForm(false); setEditingEvent(null); setPrefillDate(''); }}
                    />
                )}

                {/* Event Detail Popup */}
                {selectedEvent && (
                    <EventDetailPopup
                        event={selectedEvent}
                        onClose={() => setSelectedEvent(null)}
                        onEdit={() => {
                            setEditingEvent(selectedEvent);
                            setSelectedEvent(null);
                            setShowEventForm(true);
                        }}
                        onDelete={() => handleDeleteEvent(selectedEvent.id)}
                    />
                )}
            </div>
        );
    }

    ReactDOM.render(<OwnerDashboard />, document.getElementById('root'));
</script>

</body>
</html>
