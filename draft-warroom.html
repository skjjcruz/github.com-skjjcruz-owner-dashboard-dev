<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Draft War Room - Owner Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --dark-gold: #B8941E;
            --black: #0A0A0A;
            --off-black: #1A1A1A;
            --charcoal: #2A2A2A;
            --silver: #C0C0C0;
            --white: #FFFFFF;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Oswald', sans-serif; background: var(--black); color: var(--white); min-height: 100vh; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: rgba(212,175,55,0.05); }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 2px; }

        /* ---- Header ---- */
        .wr-header {
            background: linear-gradient(135deg, var(--off-black) 0%, var(--charcoal) 100%);
            border-bottom: 2px solid var(--gold);
            padding: 0.55rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.7rem;
            flex-wrap: wrap;
            flex-shrink: 0;
        }
        .wr-title { font-family: 'Bebas Neue', cursive; font-size: 1.25rem; color: var(--gold); letter-spacing: 0.1em; flex: 1; white-space: nowrap; }
        .back-btn {
            background: transparent; border: 1.5px solid var(--gold); color: var(--gold);
            font-family: 'Oswald', sans-serif; font-size: 0.7rem; font-weight: 600;
            padding: 0.32rem 0.65rem; border-radius: 4px; cursor: pointer;
            text-transform: uppercase; letter-spacing: 0.06em; flex-shrink: 0;
        }
        .back-btn:hover { background: rgba(212,175,55,0.1); }
        .league-select {
            background: var(--charcoal); border: 1.5px solid rgba(212,175,55,0.4);
            color: var(--white); font-family: 'Oswald', sans-serif; font-size: 0.76rem;
            padding: 0.32rem 0.55rem; border-radius: 4px; cursor: pointer; max-width: 200px;
        }

        /* ---- Grid ---- */
        .wr-grid {
            display: grid;
            grid-template-columns: 1fr 380px 400px;
            height: calc(100vh - 46px);
            overflow: hidden;
            gap: 0.6rem;
            padding: 0.6rem;
            box-sizing: border-box;
        }
        @media (max-width: 900px) { .wr-grid { grid-template-columns: 1fr; height: auto; overflow: visible; } }

        /* ---- Panels ---- */
        .panel { display: flex; flex-direction: column; overflow: hidden; background: rgba(10,10,10,0.85); border: 2px solid rgba(212,175,55,0.2); border-radius: 10px; }
        .panel-header { background: rgba(212,175,55,0.07); border-bottom: 1px solid rgba(212,175,55,0.18); border-radius: 10px 10px 0 0; font-family: 'Bebas Neue', cursive; font-size: 1.3rem; color: var(--gold); letter-spacing: 0.1em; flex-shrink: 0; display: flex; flex-direction: column; }
        .ph-title { display: flex; align-items: center; gap: 0.4rem; padding: 0 0.7rem; height: 50px; overflow: hidden; flex-shrink: 0; white-space: nowrap; }
        .ph-sub { display: flex; align-items: center; gap: 0.2rem; padding: 0 0.5rem; height: 36px; overflow: hidden; border-top: 1px solid rgba(212,175,55,0.1); flex-shrink: 0; }
        .panel-body { flex: 1; overflow-y: auto; padding: 0.4rem 0.45rem; }

        /* ---- Roster Table ---- */
        .roster-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .roster-table thead th { background: rgba(10,10,10,0.97); color: var(--gold); padding: 0.32rem 0.45rem; font-family: 'Bebas Neue', cursive; font-size: 0.72rem; font-weight: 400; letter-spacing: 0.07em; border-bottom: 1px solid rgba(212,175,55,0.18); text-align: right; }
        .roster-table thead th.rth-pos { text-align: center; width: 44px; }
        .roster-table thead th.rth-player { text-align: left; }
        .roster-table thead th.rth-yrs { width: 40px; }
        .roster-table thead th.rth-pts { width: 56px; }
        .roster-table thead th.rth-gp { width: 36px; }
        .roster-table thead th.rth-avg { width: 52px; }
        .roster-table td { padding: 0.27rem 0.45rem; vertical-align: middle; text-align: right; font-size: 0.72rem; font-weight: 600; border: none; }
        .roster-table td.rtd-pos { text-align: center; width: 44px; font-family: 'Bebas Neue', cursive; font-size: 0.68rem; color: var(--gold); background: rgba(212,175,55,0.13); letter-spacing: 0.04em; }
        .roster-table td.rtd-player { text-align: left; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; font-size: 0.82rem; }
        .roster-table td.rtd-player a { color: var(--white); text-decoration: none; }
        .roster-table td.rtd-player a:hover { color: var(--gold); }
        .roster-table td.rtd-num { color: var(--silver); opacity: 0.75; }
        .roster-table td.rtd-pts { color: var(--gold); opacity: 1; }
        .roster-table tr.rt-group td { background: rgba(8,8,8,0.95); color: var(--gold); font-family: 'Bebas Neue', cursive; font-size: 0.75rem; letter-spacing: 0.08em; padding: 0.28rem 0.45rem; border-bottom: 1px solid rgba(212,175,55,0.12); text-align: left; }
        .roster-table tr.rt-group .rt-gw { display: flex; justify-content: space-between; }
        .roster-table tr.rt-sep td { background: rgba(212,175,55,0.07); height: 2px; padding: 0; }
        .roster-table td.ps-starter { background: rgba(6,78,59,0.55); color: #ecfdf5 !important; opacity:1 !important; }
        .roster-table td.ps-ir      { background: rgba(127,29,29,0.55); color: #fee2e2 !important; opacity:1 !important; }
        .roster-table td.ps-taxi    { background: rgba(49,46,129,0.55);  color: #e0e7ff !important; opacity:1 !important; }
        .roster-table tbody tr:not(.rt-group):not(.rt-sep):hover td { background: rgba(212,175,55,0.07); }
        .roster-table tbody tr:not(.rt-group):not(.rt-sep):hover td.rtd-pos { background: rgba(212,175,55,0.22); }

        /* ---- Rookie rows ---- */
        .player-row { display: flex; align-items: center; padding: 0.22rem 0.35rem; margin-bottom: 0.15rem; background: rgba(255,255,255,0.02); border-radius: 4px; gap: 0.35rem; transition: background 0.12s; }
        .player-row:hover { background: rgba(212,175,55,0.06); }
        .pos-badge { display: inline-flex; align-items: center; justify-content: center; width: 34px; flex-shrink: 0; font-size: 0.62rem; font-weight: 700; border: 1.5px solid var(--gold); border-radius: 3px; padding: 2px 0; background: rgba(212,175,55,0.08); letter-spacing: 0.02em; }
        .player-name { flex: 1; min-width: 0; font-size: 0.82rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .player-team { font-size: 0.63rem; color: var(--silver); opacity: 0.5; }
        .filter-btn { background: transparent; border: 1px solid rgba(212,175,55,0.27); color: var(--silver); font-family: 'Oswald', sans-serif; font-size: 0.67rem; font-weight: 600; padding: 0.18rem 0.4rem; border-radius: 3px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.04em; }
        .filter-btn.active { background: var(--gold); border-color: var(--gold); color: var(--black); }
        .search-input { flex: 0 1 90px; min-width: 50px; background: rgba(255,255,255,0.04); border: 1px solid rgba(212,175,55,0.27); color: var(--white); font-family: 'Oswald', sans-serif; font-size: 0.76rem; padding: 0.18rem 0.42rem; border-radius: 3px; }
        .search-input::placeholder { color: rgba(192,192,192,0.33); }
        .search-input:focus { outline: none; border-color: rgba(212,175,55,0.58); }
        .center-msg { text-align: center; color: var(--silver); opacity: 0.5; padding: 2rem 1rem; font-size: 0.78rem; }
        .rk-badge { background: rgba(212,175,55,0.18); color: var(--gold); font-family: 'Bebas Neue', cursive; font-size: 0.6rem; letter-spacing: 0.05em; padding: 1px 4px; border-radius: 3px; flex-shrink: 0; }

        /* ---- AI Scout Panel ---- */
        .ai-mode-btn { padding: 0.22rem 0.6rem; border: 1.5px solid rgba(212,175,55,0.3); background: transparent; color: rgba(255,255,255,0.45); font-family: 'Oswald', sans-serif; font-size: 0.62rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; border-radius: 4px; cursor: pointer; white-space: nowrap; }
        .ai-mode-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(212,175,55,0.08); }
        .ai-mode-btn:hover:not(.active) { border-color: rgba(212,175,55,0.5); color: rgba(212,175,55,0.7); }
        .ai-analyze-btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.38rem 1.1rem; background: linear-gradient(135deg,rgba(212,175,55,0.15),rgba(212,175,55,0.07)); border: 1.5px solid var(--gold); color: var(--gold); font-family: 'Oswald', sans-serif; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; border-radius: 4px; cursor: pointer; transition: all 0.2s; }
        .ai-analyze-btn:hover:not(:disabled) { background: rgba(212,175,55,0.2); box-shadow: 0 0 10px rgba(212,175,55,0.18); }
        .ai-analyze-btn:disabled { opacity: 0.38; cursor: not-allowed; }
        .ai-spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid rgba(212,175,55,0.3); border-top-color: var(--gold); border-radius: 50%; animation: ai-spin 0.75s linear infinite; }
        @keyframes ai-spin { to { transform: rotate(360deg); } }
        .ai-output { background: rgba(212,175,55,0.04); border: 1px solid rgba(212,175,55,0.18); border-radius: 6px; padding: 0.85rem 0.95rem; margin-top: 0.65rem; font-size: 0.75rem; color: var(--silver); line-height: 1.72; }
        .ai-output strong { color: var(--gold); font-weight: 700; }
        .ai-chat-input { width: 100%; background: var(--charcoal); border: 1.5px solid rgba(212,175,55,0.25); color: var(--white); font-family: 'Oswald', sans-serif; font-size: 0.74rem; padding: 0.5rem 0.6rem; border-radius: 5px; resize: vertical; min-height: 58px; margin-bottom: 0.6rem; box-sizing: border-box; }
        .ai-chat-input:focus { outline: none; border-color: var(--gold); }
        .ai-error-msg { color: #E74C3C; font-size: 0.73rem; padding: 0.5rem 0; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="supabase-client.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // ===== AUTH =====
        const AUTH_KEY = 'od_auth_v1';
        const authRaw = localStorage.getItem(AUTH_KEY);
        if (!authRaw) window.location.href = 'login.html';
        let sleeperUsername = '';
        try {
            sleeperUsername = JSON.parse(authRaw).username || '';
        } catch (e) {
            localStorage.removeItem(AUTH_KEY);
            window.location.href = 'login.html';
        }

        // ===== SLEEPER API =====
        const SLEEPER_BASE = 'https://api.sleeper.app/v1';
        async function apiFetch(url) {
            const r = await fetch(url);
            if (!r.ok) throw new Error(`HTTP ${r.status}`);
            return r.json();
        }
        const fetchUser       = u      => apiFetch(`${SLEEPER_BASE}/user/${encodeURIComponent(u)}`);
        const fetchLeagues    = (uid,yr)=> apiFetch(`${SLEEPER_BASE}/user/${uid}/leagues/nfl/${yr}`);
        const fetchRosters    = id     => apiFetch(`${SLEEPER_BASE}/league/${id}/rosters`);
        const fetchLeagueInfo = id     => apiFetch(`${SLEEPER_BASE}/league/${id}`);

        let _playersCache = null;
        async function fetchPlayers() {
            if (_playersCache) return _playersCache;
            _playersCache = await apiFetch(`${SLEEPER_BASE}/players/nfl`);
            return _playersCache;
        }

        let _statsCache = {};
        async function fetchSeasonStats(season) {
            if (_statsCache[season]) return _statsCache[season];
            try { _statsCache[season] = await apiFetch(`${SLEEPER_BASE}/stats/nfl/regular/${season}`); }
            catch (e) { _statsCache[season] = {}; }
            return _statsCache[season];
        }

        const SEASON    = '2026';
        const STATS_YEAR = '2025';
        const AVAILABLE_YEARS = ['2023','2024','2025','2026'];

        const POS_COLORS = { QB:'#FF6B6B', RB:'#4ECDC4', WR:'#45B7D1', TE:'#F7DC6F', K:'#BB8FCE', DEF:'#85929E', LB:'#F0A500', DL:'#E67E22', DB:'#5DADE2', CB:'#5DADE2', S:'#5DADE2' };
        const posColor = p => POS_COLORS[p] || 'var(--silver)';
        const POS_ORDER = { QB:0, RB:1, WR:2, TE:3, K:4, DEF:5, DL:5, LB:6, DB:7 };

        function normPos(pos) {
            if (!pos) return null;
            if (['DB','CB','S','SS','FS'].includes(pos)) return 'DB';
            if (['DL','DE','DT','NT','IDL','EDGE'].includes(pos)) return 'DL';
            if (['LB','OLB','ILB','MLB'].includes(pos)) return 'LB';
            return pos;
        }
        const posOrder = pos => POS_ORDER[normPos(pos)] ?? 9;

        const OFFENSIVE_POS = new Set(['QB','RB','WR','TE','K']);
        const IDP_POS = new Set(['QB','RB','WR','TE','K','LB','OLB','ILB','MLB','DL','DE','DT','NT','IDL','EDGE','DB','CB','S','SS','FS']);

        const POS_FILTERS_OFF = ['ALL','QB','RB','WR','TE'];
        const POS_FILTERS_IDP = ['ALL','QB','RB','WR','TE','LB','DL','DB'];

        const AI_MODES = [
            { id: 'rookies',   label: 'Rookie Targets', desc: 'Best rookies to draft ranked by fit with your roster needs and dynasty timeline' },
            { id: 'fa_chat',   label: 'Ask AI',         desc: 'Ask anything about the draft, rookie rankings, or dynasty strategy' },
        ];

        function renderMarkdown(text) {
            if (!text) return '';
            const esc = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
            return esc
                .replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>')
                .replace(/^### (.+)$/gm, '<div style="font-family:Bebas Neue,cursive;font-size:0.88rem;color:var(--gold);margin:0.75rem 0 0.2rem;letter-spacing:0.08em">$1</div>')
                .replace(/^## (.+)$/gm,  '<div style="font-family:Bebas Neue,cursive;font-size:0.95rem;color:var(--gold);margin:0.9rem 0 0.25rem;letter-spacing:0.1em">$1</div>')
                .replace(/^# (.+)$/gm,   '<div style="font-family:Bebas Neue,cursive;font-size:1.05rem;color:var(--gold);margin:1rem 0 0.3rem;letter-spacing:0.12em">$1</div>')
                .replace(/\n\n/g, '<div style="margin:0.25rem 0"></div>');
        }

        function DraftWarRoom() {
            const [phase, setPhase]   = useState('boot');
            const [errMsg, setErrMsg] = useState('');
            const [userId, setUserId] = useState('');
            const [userAvatar, setUserAvatar] = useState('');
            const [selectedYear, setSelectedYear] = useState(SEASON);
            const [leagues, setLeagues]   = useState([]);
            const [leagueId, setLeagueId] = useState('');
            const [leagueInfo, setLeagueInfo]   = useState(null);
            const [myRoster, setMyRoster]       = useState(null);
            const [allRosters, setAllRosters]   = useState([]);
            const [playersData, setPlayersData] = useState({});
            const [statsData, setStatsData]     = useState({});
            const [leagueLoading, setLeagueLoading] = useState(false);

            const [posFilter, setPosFilter] = useState('ALL');
            const [search, setSearch]       = useState('');

            // AI state
            const [aiMode,      setAiMode]      = useState('rookies');
            const [aiAnalysis,  setAiAnalysis]  = useState(null);
            const [aiLoading,   setAiLoading]   = useState(false);
            const [aiError,     setAiError]     = useState(null);
            const [aiChatInput, setAiChatInput] = useState('');

            const userIdRef = useRef('');
            useEffect(() => { userIdRef.current = userId; }, [userId]);

            useEffect(() => { boot(); }, []);

            useEffect(() => {
                if (!userIdRef.current) return;
                fetchLeagues(userIdRef.current, selectedYear).then(lgs => {
                    setLeagues(lgs || []);
                    if (lgs?.length) setLeagueId(lgs[0].league_id);
                }).catch(() => {});
            }, [selectedYear]);

            async function boot() {
                try {
                    const [user] = await Promise.all([fetchUser(sleeperUsername)]);
                    setUserId(user.user_id);
                    if (user.avatar) setUserAvatar(user.avatar);
                    const lgs = await fetchLeagues(user.user_id, selectedYear);
                    setLeagues(lgs || []);
                    if (lgs && lgs.length > 0) setLeagueId(lgs[0].league_id);
                    setPhase('ready');
                } catch (e) {
                    setErrMsg('Failed to connect to Sleeper. Check your network and try again.');
                    setPhase('error');
                }
            }

            useEffect(() => {
                if (!leagueId || !userId || phase !== 'ready') return;
                loadLeague();
            }, [leagueId, userId, phase]);

            async function loadLeague() {
                setLeagueLoading(true);
                setMyRoster(null); setAllRosters([]); setPlayersData({}); setStatsData({});
                setAiAnalysis(null); setAiError(null);
                try {
                    const [rosters, info, players, stats] = await Promise.all([
                        fetchRosters(leagueId), fetchLeagueInfo(leagueId),
                        fetchPlayers(), fetchSeasonStats(STATS_YEAR)
                    ]);
                    const myR = rosters.find(r => r.owner_id === userId) || null;
                    setMyRoster(myR); setAllRosters(rosters);
                    setLeagueInfo(info); setPlayersData(players); setStatsData(stats);
                } catch (e) {
                    console.error('League load failed:', e);
                } finally {
                    setLeagueLoading(false);
                }
            }

            // Derived
            const isIDP = useMemo(() => {
                const rp = leagueInfo?.roster_positions || [];
                return !rp.includes('DEF');
            }, [leagueInfo]);

            const posFilters = isIDP ? POS_FILTERS_IDP : POS_FILTERS_OFF;
            const relevantPosSet = isIDP ? IDP_POS : OFFENSIVE_POS;

            const takenIds = useMemo(() => new Set(allRosters.flatMap(r => r.players || [])), [allRosters]);

            function calcRawPts(s) {
                if (!s) return null;
                const scoring = leagueInfo?.scoring_settings;
                if (scoring) {
                    let total = 0;
                    for (const [field, weight] of Object.entries(scoring)) {
                        if (typeof weight !== 'number') continue;
                        if (s[field] != null) total += Number(s[field]) * weight;
                    }
                    return total;
                }
                const pre = s.pts_half_ppr ?? s.pts_ppr ?? s.pts_std ?? null;
                return pre !== null ? Number(pre) : null;
            }

            function getPts(id) {
                const s = statsData[id];
                if (!s) return -1;
                const raw = calcRawPts(s);
                return raw !== null ? raw : -1;
            }

            function fpUrl(name) {
                if (!name) return null;
                const slug = name.toLowerCase().replace(/['\u2019.]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,'');
                return `https://www.fantasypros.com/nfl/players/${slug}.php`;
            }

            // My roster grouped
            const myGrouped = useMemo(() => {
                if (!myRoster?.players || !Object.keys(playersData).length) return {};
                const g = {};
                for (const id of myRoster.players) {
                    const p = playersData[id];
                    if (!p) continue;
                    const grp = normPos(p.position) || 'Other';
                    if (!g[grp]) g[grp] = [];
                    g[grp].push({ id, p });
                }
                for (const grp of Object.keys(g)) g[grp].sort((a,b) => getPts(b.id) - getPts(a.id));
                return g;
            }, [myRoster, playersData, statsData]);
            const myGroups = Object.keys(myGrouped).sort((a,b) => posOrder(a) - posOrder(b));

            function rosterStatusClass(id) {
                if (!myRoster) return '';
                if ((myRoster.starters||[]).includes(id)) return 'ps-starter';
                if ((myRoster.reserve||[]).includes(id))  return 'ps-ir';
                if ((myRoster.taxi||[]).includes(id))     return 'ps-taxi';
                return '';
            }

            // Available rookies (not on any roster, years_exp === 0)
            const allRookies = useMemo(() => {
                if (!Object.keys(playersData).length || !allRosters.length) return [];
                return Object.entries(playersData)
                    .filter(([id, p]) =>
                        !takenIds.has(id) &&
                        p.years_exp === 0 &&
                        relevantPosSet.has(p.position) &&
                        (p.team || p.search_rank != null)
                    )
                    .map(([id, p]) => ({
                        id,
                        name: p.full_name || `${p.first_name||''} ${p.last_name||''}`.trim() || id,
                        pos: p.position,
                        norm: normPos(p.position),
                        team: p.team,
                        searchRank: p.search_rank ?? 9999,
                    }))
                    .sort((a,b) => {
                        const posOrd = posOrder(a.pos) - posOrder(b.pos);
                        if (posOrd !== 0) return posOrd;
                        return a.searchRank - b.searchRank;
                    });
            }, [playersData, takenIds, isIDP]);

            const filteredRookies = useMemo(() => {
                return allRookies.filter(r => {
                    let posOk = posFilter === 'ALL' || r.norm === posFilter || r.pos === posFilter;
                    const q = search.toLowerCase();
                    const srchOk = !q || r.name.toLowerCase().includes(q) || (r.team||'').toLowerCase().includes(q);
                    return posOk && srchOk;
                });
            }, [allRookies, posFilter, search]);

            // AI context
            function buildContext() {
                const rosterPositions = (leagueInfo?.roster_positions || []).filter(p => p !== 'BN' && p !== 'IR');
                const myRosterSummary = (myRoster?.players || []).map(id => {
                    const p = playersData[id];
                    if (!p) return null;
                    const s = statsData[id];
                    const rawPts = calcRawPts(s);
                    return {
                        pos: p.position,
                        name: p.full_name || `${p.first_name||''} ${p.last_name||''}`.trim(),
                        team: p.team || 'FA',
                        pts: rawPts ? Number(rawPts).toFixed(1) : null,
                        yrsExp: p.years_exp ?? null,
                        isStarter: (myRoster.starters||[]).includes(id),
                        isTaxi: (myRoster.taxi||[]).includes(id),
                    };
                }).filter(Boolean);

                const availableRookies = allRookies.slice(0, 60).map(r => ({
                    pos: r.pos, name: r.name, team: r.team || 'UFA',
                }));

                return {
                    leagueName: leagueInfo?.name || 'Fantasy League',
                    myOwner: sleeperUsername,
                    faabBudget: 0, startingBudget: 0,
                    myRoster: myRosterSummary, rosterPositions,
                    topFreeAgents: [], availableRookies,
                    question: aiChatInput,
                };
            }

            async function runAnalysis() {
                setAiLoading(true); setAiError(null); setAiAnalysis(null);
                try {
                    const ctx = buildContext();
                    const result = await window.OD.callAI({ type: aiMode, context: ctx });
                    setAiAnalysis(result.analysis);
                } catch(e) {
                    setAiError(e.message);
                } finally {
                    setAiLoading(false);
                }
            }

            // ---- Render states ----
            if (phase === 'boot') return (
                <div style={{ minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', flexDirection:'column', gap:'0.75rem' }}>
                    <div style={{ color:'var(--gold)', fontFamily:'Bebas Neue,cursive', fontSize:'1.4rem', letterSpacing:'0.12em' }}>LOADING DRAFT WAR ROOM</div>
                    <div style={{ color:'var(--silver)', fontSize:'0.75rem', opacity:0.6 }}>Connecting to Sleeper API...</div>
                </div>
            );
            if (phase === 'error') return (
                <div style={{ minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', padding:'2rem' }}>
                    <div style={{ textAlign:'center' }}>
                        <div style={{ color:'#E74C3C', marginBottom:'1rem', fontSize:'0.9rem' }}>{errMsg}</div>
                        <button onClick={() => window.location.href='index.html'}
                            style={{ padding:'0.5rem 1.2rem', background:'var(--gold)', border:'none', borderRadius:'4px', cursor:'pointer', fontFamily:'Oswald,sans-serif', fontWeight:700, fontSize:'0.85rem' }}>
                            &larr; Back to Dashboard
                        </button>
                    </div>
                </div>
            );

            return (
                <div style={{ display:'flex', flexDirection:'column', height:'100vh', overflow:'hidden' }}>

                    {/* HEADER */}
                    <div className="wr-header">
                        <button className="back-btn" onClick={() => window.location.href='index.html'}>&larr; Dashboard</button>
                        <div className="wr-title">&#9965; {selectedYear} DRAFT WAR ROOM</div>
                        <select value={selectedYear} onChange={e => setSelectedYear(e.target.value)}
                            style={{ background:'var(--charcoal)', border:'1px solid rgba(212,175,55,0.4)', borderRadius:'4px', color:'var(--gold)', fontFamily:'Oswald,sans-serif', fontWeight:'700', fontSize:'0.72rem', padding:'0.18rem 0.45rem', cursor:'pointer', outline:'none', flexShrink:0 }}>
                            {AVAILABLE_YEARS.map(y => <option key={y} value={y}>{y}</option>)}
                        </select>
                        <select className="league-select" value={leagueId} onChange={e => setLeagueId(e.target.value)}>
                            {leagues.map(l => <option key={l.league_id} value={l.league_id}>{l.name}</option>)}
                        </select>
                        {userAvatar && <img src={`https://sleepercdn.com/avatars/thumbs/${userAvatar}`} alt="" style={{ width:'28px', height:'28px', borderRadius:'4px', flexShrink:0 }} />}
                    </div>

                    {leagueLoading ? (
                        <div className="center-msg" style={{ paddingTop:'4rem' }}>Loading league data...</div>
                    ) : (
                        <div className="wr-grid">

                            {/* ===== LEFT: MY ROSTER ===== */}
                            <div className="panel">
                                <div className="panel-header">
                                    <div className="ph-title">
                                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                                            <circle cx="12" cy="8" r="4"/><path d="M6 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/>
                                        </svg>
                                        MY ROSTER
                                        {myRoster && (
                                            <span style={{ color:'var(--silver)', fontSize:'1.3rem', marginLeft:'0.4rem' }}>
                                                ({myRoster.settings?.wins||0}-{myRoster.settings?.losses||0})
                                            </span>
                                        )}
                                        {myRoster && (
                                            <span style={{ marginLeft:'auto', color:'var(--silver)', fontSize:'0.58rem', opacity:0.5 }}>
                                                {myRoster.players?.length||0} players
                                            </span>
                                        )}
                                    </div>
                                    <div className="ph-sub"></div>
                                </div>
                                {myGroups.length > 0 && (
                                    <table className="roster-table" style={{flexShrink:0}}>
                                        <thead>
                                            <tr>
                                                <th className="rth-pos">POS</th>
                                                <th className="rth-player">PLAYER</th>
                                                <th className="rth-yrs">YRS</th>
                                                <th className="rth-pts">PTS</th>
                                                <th className="rth-gp">GP</th>
                                                <th className="rth-avg">AVG</th>
                                            </tr>
                                        </thead>
                                    </table>
                                )}
                                <div className="panel-body" style={{padding:0}}>
                                    {myGroups.length === 0 && <div className="center-msg">No roster data</div>}
                                    {myGroups.length > 0 && (
                                        <table className="roster-table">
                                            <colgroup>
                                                <col style={{width:'44px'}}/><col/>
                                                <col style={{width:'40px'}}/><col style={{width:'56px'}}/>
                                                <col style={{width:'36px'}}/><col style={{width:'52px'}}/>
                                            </colgroup>
                                            <tbody>
                                                {myGroups.flatMap(grp => [
                                                    <tr key={`${grp}-hdr`} className="rt-group">
                                                        <td colSpan={6}>
                                                            <div className="rt-gw">
                                                                <span>{grp}</span>
                                                                <span>({myGrouped[grp].length})</span>
                                                            </div>
                                                        </td>
                                                    </tr>,
                                                    ...myGrouped[grp].map(({ id, p }) => {
                                                        const s = statsData[id];
                                                        const rawPts = calcRawPts(s);
                                                        const pts = rawPts !== null ? Number(rawPts).toFixed(1) : '-';
                                                        const gp  = s?.gp ?? '-';
                                                        const avg = (rawPts !== null && s?.gp) ? (rawPts/s.gp).toFixed(1) : '-';
                                                        const yrs = p.years_exp != null ? p.years_exp : '-';
                                                        const pName = p.full_name || `${p.first_name||''} ${p.last_name||''}`.trim() || id;
                                                        const url = fpUrl(pName);
                                                        const sc = rosterStatusClass(id);
                                                        return (
                                                            <tr key={id}>
                                                                <td className="rtd-pos">{p.position||'?'}</td>
                                                                <td className={`rtd-player${sc?' '+sc:''}`}>
                                                                    <a href={url||'#'} target="_blank" rel="noopener noreferrer">
                                                                        {pName}
                                                                        {p.years_exp === 0 && <span style={{marginLeft:'0.3rem', background:'rgba(212,175,55,0.2)', color:'var(--gold)', fontSize:'0.56rem', padding:'1px 3px', borderRadius:'2px', fontFamily:'Bebas Neue,cursive', letterSpacing:'0.04em'}}>RK</span>}
                                                                        <span style={{fontSize:'0.65rem',color:'var(--silver)',opacity:0.55,marginLeft:'0.3rem'}}>{p.team||''}</span>
                                                                    </a>
                                                                </td>
                                                                <td className="rtd-num">{yrs}</td>
                                                                <td className="rtd-num rtd-pts">{pts}</td>
                                                                <td className="rtd-num">{gp}</td>
                                                                <td className="rtd-num">{avg}</td>
                                                            </tr>
                                                        );
                                                    }),
                                                    <tr key={`${grp}-sep`} className="rt-sep"><td colSpan={6}></td></tr>,
                                                ])}
                                            </tbody>
                                        </table>
                                    )}
                                </div>
                            </div>

                            {/* ===== CENTER: AVAILABLE ROOKIES ===== */}
                            <div className="panel">
                                <div className="panel-header">
                                    <div className="ph-title">
                                        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" style={{color:'var(--gold)'}}>
                                            <path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/>
                                        </svg>
                                        AVAILABLE ROOKIES
                                        <span style={{ color:'var(--silver)', fontSize:'0.65rem', opacity:0.55, marginLeft:'auto' }}>{filteredRookies.length}</span>
                                    </div>
                                    <div className="ph-sub">
                                        {posFilters.map(p => (
                                            <button key={p} className={`filter-btn${posFilter===p?' active':''}`}
                                                onClick={() => setPosFilter(p)}>{p}</button>
                                        ))}
                                        <input className="search-input" placeholder="Search..."
                                            value={search} onChange={e => setSearch(e.target.value)} />
                                    </div>
                                </div>
                                <div className="panel-body">
                                    {filteredRookies.length === 0 && (
                                        <div className="center-msg">
                                            {Object.keys(playersData).length === 0 ? 'Loading player data...' : 'No rookies found'}
                                        </div>
                                    )}
                                    {filteredRookies.map((r, idx) => {
                                        const url = fpUrl(r.name);
                                        return (
                                            <div key={r.id} className="player-row">
                                                <span style={{ color:'var(--silver)', opacity:0.4, fontSize:'0.6rem', width:'20px', textAlign:'right', flexShrink:0 }}>{idx+1}</span>
                                                <span className="pos-badge" style={{ color: posColor(r.pos) }}>{r.pos}</span>
                                                <a className="player-name" href={url||'#'} target="_blank" rel="noopener noreferrer"
                                                    style={{ color:'inherit', textDecoration:'none' }}
                                                    onMouseEnter={e=>e.currentTarget.style.color='var(--gold)'}
                                                    onMouseLeave={e=>e.currentTarget.style.color='inherit'}>
                                                    {r.name}
                                                    <span className="player-team"> {r.team||'UFA'}</span>
                                                </a>
                                                <span className="rk-badge">ROOKIE</span>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>

                            {/* ===== RIGHT: AI SCOUT ===== */}
                            <div className="panel">
                                <div className="panel-header">
                                    <div className="ph-title">
                                        <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor" style={{color:'var(--gold)',flexShrink:0}}>
                                            <path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/>
                                        </svg>
                                        AI SCOUT
                                        <span style={{ background:'var(--gold)', color:'var(--black)', fontFamily:'Oswald,sans-serif', fontSize:'0.52rem', fontWeight:700, padding:'0.1rem 0.35rem', borderRadius:'3px', letterSpacing:'0.06em', marginLeft:'0.4rem' }}>BETA</span>
                                    </div>
                                    <div className="ph-sub" style={{ gap:'0.35rem' }}>
                                        {AI_MODES.map(m => (
                                            <button key={m.id} className={`ai-mode-btn${aiMode===m.id?' active':''}`}
                                                onClick={() => setAiMode(m.id)}>{m.label}</button>
                                        ))}
                                    </div>
                                </div>

                                <div className="panel-body" style={{ padding:'0.85rem 0.8rem' }}>
                                    <div style={{ fontSize:'0.68rem', color:'var(--silver)', opacity:0.55, marginBottom:'0.75rem', lineHeight:1.5 }}>
                                        {AI_MODES.find(m => m.id === aiMode)?.desc}
                                    </div>
                                    {aiMode === 'fa_chat' && (
                                        <textarea className="ai-chat-input"
                                            placeholder="e.g. Should I take the best available RB at pick 3 or go WR given my roster needs?"
                                            value={aiChatInput}
                                            onChange={e => setAiChatInput(e.target.value)} />
                                    )}
                                    <button type="button" className="ai-analyze-btn" onClick={runAnalysis}
                                        disabled={aiLoading || (aiMode==='fa_chat' && !aiChatInput.trim()) || !myRoster}>
                                        {aiLoading
                                            ? <><span className="ai-spinner"/>&nbsp;Analyzing...</>
                                            : '✦ Run Analysis'}
                                    </button>
                                    {aiError && <div className="ai-error-msg">⚠ {aiError}</div>}
                                    {aiAnalysis && (
                                        <div className="ai-output"
                                            dangerouslySetInnerHTML={{ __html: renderMarkdown(aiAnalysis) }} />
                                    )}
                                    {!aiAnalysis && !aiLoading && !aiError && (
                                        <div style={{ textAlign:'center', padding:'2.5rem 1rem', color:'var(--silver)', opacity:0.28, fontSize:'0.73rem' }}>
                                            Select a mode and run analysis
                                        </div>
                                    )}
                                </div>
                            </div>

                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<DraftWarRoom />);
    </script>
</body>
</html>
