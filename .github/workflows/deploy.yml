name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # reconai-shared/ is gitignored, so the bundled browser modules must be
      # regenerated from the canonical engine (skjjcruz/DHQ-Shared) at deploy time —
      # otherwise the Pages artifact ships a stale (or missing) copy of
      # supabase-client.js and the other shared modules.
      - name: Checkout DHQ-Shared (canonical engine)
        uses: actions/checkout@v6
        with:
          repository: skjjcruz/DHQ-Shared
          path: dhq-shared-src

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Sync shared modules from DHQ-Shared
        run: DHQ_SHARED_SOURCE="$GITHUB_WORKSPACE/dhq-shared-src" npm run sync:shared

      # Precompile every type="text/babel" entry (index + free-agency + draft-warroom
      # + trade-calculator) to plain JS so production no longer downloads ~3.1MB of
      # @babel/standalone or runs the in-browser JSX transform on cold load.
      - name: Precompile JSX for production (drop in-browser Babel)
        run: node scripts/build-deploy.cjs

      # reconai-shared/ is gitignored, so the bundled browser modules must be
      # regenerated from the canonical dhq-shared source at deploy time — otherwise
      # the Pages artifact ships a stale (or missing) copy of supabase-client.js
      # and the other shared modules. dhq-shared is the neutral shared-engine repo
      # that both War Room and ReconAI vendor; War Room no longer reads ReconAI.
      - name: Checkout dhq-shared (canonical shared engine)
        uses: actions/checkout@v4
        with:
          repository: C2-Football/dhq-shared
          path: shared-src

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Sync shared engine modules
        run: SHARED_SOURCE="$GITHUB_WORKSPACE/shared-src" npm run sync:shared

      # Precompile every type="text/babel" entry (index + free-agency + draft-warroom
      # + trade-calculator) to plain JS so production no longer downloads ~3.1MB of
      # @babel/standalone or runs the in-browser JSX transform on cold load.
      - name: Precompile JSX for production (drop in-browser Babel)
        run: node scripts/build-deploy.cjs

      - name: Build Pages artifact
        run: |
          set -euo pipefail
          mkdir -p pages-artifact
          cp -R \
            index.html admin.html landing.html connect-sleeper.html upgrade.html ai-setup.html login.html reset-password.html gift.html \
            free-agency.html draft-warroom.html trade-calculator.html draft-war-room team-comps \
            js css content reconai-shared icons vendor legal *.js *.json *.webmanifest *.css *.png *.ico *.svg \
            pages-artifact/ 2>/dev/null || true
          # Overlay the precompiled entries + plain-JS modules on top of the raw
          # sources, replacing the JSX files and the index.html that loaded Babel.
          cp -R dist-deploy/. pages-artifact/
          rm -rf pages-artifact/**/.git pages-artifact/**/node_modules pages-artifact/**/supabase pages-artifact/**/tests

      - name: Setup Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: "pages-artifact"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
