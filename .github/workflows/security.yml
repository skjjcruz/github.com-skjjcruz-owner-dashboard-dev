name: Security

on:
  push:
  pull_request:
  schedule:
    # Weekly re-scan so newly-disclosed CVEs surface even without a push
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Fail the build on high/critical advisories. Moderate/low surface via
      # Dependabot PRs rather than blocking CI.
      - run: npm audit --audit-level=high

  secrets:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history so a secret committed in any past commit is caught
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.28.0
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Scan for secrets
        run: gitleaks detect --source . --config .gitleaks.toml --redact --verbose --exit-code 1
