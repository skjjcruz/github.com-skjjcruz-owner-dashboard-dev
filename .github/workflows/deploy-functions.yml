name: Deploy Supabase Edge Functions

on:
  push:
    branches: ["main", "claude/*"]
    paths:
      - "supabase/functions/**"
      - "supabase/migrations/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Set JWT secret
        run: supabase secrets set SUPABASE_JWT_SECRET="${{ secrets.SUPABASE_JWT_SECRET }}" --project-ref sxshiqyxhhifvtfqawbq

      - name: Apply database migrations
        # Applies migration via Supabase Management API.
        # continue-on-error keeps function deploys running even if migration
        # was already applied or the token lacks SQL execution scope.
        # To apply manually: Supabase Dashboard → SQL Editor → paste supabase/migrations/*.sql
        continue-on-error: true
        run: |
          python3 - <<'PYEOF'
          import json, urllib.request, os, sys
          token = os.environ.get('SUPABASE_ACCESS_TOKEN', '')
          if not token:
              print('SUPABASE_ACCESS_TOKEN not set — skipping migration', file=sys.stderr)
              sys.exit(0)
          sql = open('supabase/migrations/20260317000000_app_users_and_subscriptions.sql').read()
          req = urllib.request.Request(
              'https://api.supabase.com/v1/projects/sxshiqyxhhifvtfqawbq/database/query',
              data=json.dumps({'query': sql}).encode(),
              headers={
                  'Authorization': f'Bearer {token}',
                  'Content-Type':  'application/json',
              },
              method='POST',
          )
          try:
              with urllib.request.urlopen(req) as r:
                  print('Migration OK:', r.read().decode()[:200])
          except urllib.error.HTTPError as e:
              body = e.read().decode()
              print('Migration response:', e.code, body, file=sys.stderr)
              sys.exit(1)
          PYEOF

      - name: Deploy get-session-token function
        run: supabase functions deploy get-session-token --project-ref sxshiqyxhhifvtfqawbq

      - name: Deploy set-password function
        run: supabase functions deploy set-password --project-ref sxshiqyxhhifvtfqawbq

      - name: Deploy ai-analyze function
        run: supabase functions deploy ai-analyze --project-ref sxshiqyxhhifvtfqawbq

      - name: Deploy fw-signup function
        run: supabase functions deploy fw-signup --project-ref sxshiqyxhhifvtfqawbq

      - name: Deploy fw-signin function
        run: supabase functions deploy fw-signin --project-ref sxshiqyxhhifvtfqawbq

      - name: Deploy fw-create-checkout function
        run: supabase functions deploy fw-create-checkout --project-ref sxshiqyxhhifvtfqawbq

      - name: Deploy fw-stripe-webhook function
        run: supabase functions deploy fw-stripe-webhook --project-ref sxshiqyxhhifvtfqawbq

      - name: Deploy admin-list-users function
        run: supabase functions deploy admin-list-users --project-ref sxshiqyxhhifvtfqawbq
