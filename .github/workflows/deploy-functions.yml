name: Deploy Supabase Edge Functions

on:
  push:
    branches: ["main"]
    paths:
      - "supabase/functions/**"
      - "supabase/migrations/**"
  workflow_dispatch:

jobs:
  deploy:
    # Edge functions live in the shared production Supabase project — only the
    # canonical repo deploys them. The sandbox mirror (no deploy token) skips
    # instead of failing on every push.
    if: github.repository == 'skjjcruz/github.com-skjjcruz-owner-dashboard-dev'
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v7

      - name: Verify Supabase deploy token
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "SUPABASE_ACCESS_TOKEN repo secret is required for Edge Function deployment." >&2
            exit 1
          fi

      - uses: supabase/setup-cli@v2.0.0
        with:
          version: latest

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Type check Edge Functions
        run: |
          for fn in supabase/functions/*/index.ts; do
            deno check --node-modules-dir=auto "$fn"
          done

      # Idempotent apply of allowlisted migrations through the Management API.
      # Earlier migrations were applied by hand via the dashboard; entries
      # listed here are executed (and recorded) automatically when missing.
      # Only add migrations that are safe to re-run (if not exists / or
      # replace), because the query endpoint does not guarantee atomicity
      # across statements.
      - name: Apply pending database migrations
        run: |
          python3 - <<'PYEOF'
          import json, urllib.request, os, sys

          token = os.environ.get('SUPABASE_ACCESS_TOKEN', '')
          endpoint = 'https://api.supabase.com/v1/projects/sxshiqyxhhifvtfqawbq/database/query'

          pending = {
              '20260610000000': 'supabase/migrations/20260610000000_ai_response_cache.sql',
              '20260610010000': 'supabase/migrations/20260610010000_ai_feedback.sql',
              '20260615000000': 'supabase/migrations/20260615000000_mfl_connection.sql',
          }

          def run_query(query):
              req = urllib.request.Request(
                  endpoint,
                  data=json.dumps({'query': query}).encode(),
                  headers={
                      'Authorization': f'Bearer {token}',
                      'Content-Type': 'application/json',
                      'Accept': 'application/json',
                      'User-Agent': 'ReconAI-WarRoom-GitHub-Actions',
                  },
                  method='POST',
              )
              with urllib.request.urlopen(req) as r:
                  body = r.read().decode()
              return json.loads(body) if body else []

          quoted = ', '.join(f"'{v}'" for v in pending)
          try:
              rows = run_query(
                  f'select version from supabase_migrations.schema_migrations where version in ({quoted})'
              )
          except urllib.error.HTTPError as e:
              print('Could not read schema_migrations:', e.code, e.read().decode()[:300], file=sys.stderr)
              sys.exit(1)
          recorded = {str(row.get('version')) for row in rows if isinstance(row, dict)}

          for version in sorted(pending):
              path = pending[version]
              if version in recorded:
                  print(f'{version} already applied, skipping')
                  continue
              if not os.path.exists(path):
                  print('Migration file missing:', path, file=sys.stderr)
                  sys.exit(1)
              with open(path) as f:
                  sql = f.read()
              name = os.path.basename(path).replace('.sql', '')
              print(f'Applying {version} ({path})...')
              try:
                  run_query(sql)
                  run_query(
                      "insert into supabase_migrations.schema_migrations (version, name) "
                      f"values ('{version}', '{name}') on conflict (version) do nothing"
                  )
              except urllib.error.HTTPError as e:
                  print(f'Failed applying {version}:', e.code, e.read().decode()[:500], file=sys.stderr)
                  sys.exit(1)
              print(f'{version} applied and recorded')
          PYEOF

      - name: Verify database migrations are recorded
        run: |
          python3 - <<'PYEOF'
          import json, urllib.request, os, sys
          token = os.environ.get('SUPABASE_ACCESS_TOKEN', '')
          expected = {
              '20260317000000': 'supabase/migrations/20260317000000_app_users_and_subscriptions.sql',
              '20260503000000': 'supabase/migrations/20260503000000_ai_usage_controls.sql',
              '20260503010000': 'supabase/migrations/20260503010000_tutorial_state.sql',
              '20260503020000': 'supabase/migrations/20260503020000_ai_margin_rollups.sql',
              '20260508000000': 'supabase/migrations/20260508000000_supabase_permission_hardening.sql',
              '20260610000000': 'supabase/migrations/20260610000000_ai_response_cache.sql',
              '20260610010000': 'supabase/migrations/20260610010000_ai_feedback.sql',
              '20260615000000': 'supabase/migrations/20260615000000_mfl_connection.sql',
          }

          for path in expected.values():
              if not os.path.exists(path):
                  print('Migration missing:', path, file=sys.stderr)
                  sys.exit(1)

          quoted_versions = ', '.join(f"'{version}'" for version in expected)
          query = f'select version from supabase_migrations.schema_migrations where version in ({quoted_versions})'
          req = urllib.request.Request(
              'https://api.supabase.com/v1/projects/sxshiqyxhhifvtfqawbq/database/query',
              data=json.dumps({'query': query}).encode(),
              headers={
                  'Authorization': f'Bearer {token}',
                  'Content-Type':  'application/json',
                  'Accept': 'application/json',
                  'User-Agent': 'ReconAI-WarRoom-GitHub-Actions',
              },
              method='POST',
          )
          try:
              with urllib.request.urlopen(req) as r:
                  body = r.read().decode()
          except urllib.error.HTTPError as e:
              body = e.read().decode()
              print('Migration verification response:', e.code, body, file=sys.stderr)
              sys.exit(1)

          try:
              payload = json.loads(body)
          except json.JSONDecodeError:
              print('Migration verification returned non-JSON:', body[:300], file=sys.stderr)
              sys.exit(1)

          found = {str(row.get('version')) for row in payload if isinstance(row, dict)}
          missing = sorted(set(expected) - found)
          if missing:
              print('Migrations not recorded:', ', '.join(missing), file=sys.stderr)
              sys.exit(1)

          print('Recorded migrations:', ', '.join(sorted(found & set(expected))))
          PYEOF

      - name: Deploy get-session-token function
        run: supabase functions deploy get-session-token --project-ref sxshiqyxhhifvtfqawbq --use-api --no-verify-jwt

      - name: Deploy set-password function
        run: supabase functions deploy set-password --project-ref sxshiqyxhhifvtfqawbq --use-api --no-verify-jwt

      - name: Deploy ai-analyze function
        run: supabase functions deploy ai-analyze --project-ref sxshiqyxhhifvtfqawbq --use-api --no-verify-jwt

      - name: Deploy ai-feedback function
        run: supabase functions deploy ai-feedback --project-ref sxshiqyxhhifvtfqawbq --use-api --no-verify-jwt

      - name: Deploy fw-signup function
        run: supabase functions deploy fw-signup --project-ref sxshiqyxhhifvtfqawbq --use-api --no-verify-jwt

      - name: Deploy fw-signin function
        run: supabase functions deploy fw-signin --project-ref sxshiqyxhhifvtfqawbq --use-api --no-verify-jwt

      - name: Deploy fw-oauth-sync function
        run: supabase functions deploy fw-oauth-sync --project-ref sxshiqyxhhifvtfqawbq --use-api --no-verify-jwt

      - name: Deploy fw-profile function
        run: supabase functions deploy fw-profile --project-ref sxshiqyxhhifvtfqawbq --use-api --no-verify-jwt

      - name: Deploy fw-delete-account function
        run: supabase functions deploy fw-delete-account --project-ref sxshiqyxhhifvtfqawbq --use-api --no-verify-jwt

      - name: Deploy fw-create-checkout function
        run: supabase functions deploy fw-create-checkout --project-ref sxshiqyxhhifvtfqawbq --use-api --no-verify-jwt

      - name: Deploy fw-stripe-webhook function
        run: supabase functions deploy fw-stripe-webhook --project-ref sxshiqyxhhifvtfqawbq --use-api --no-verify-jwt

      - name: Deploy fw-request-password-reset function
        run: supabase functions deploy fw-request-password-reset --project-ref sxshiqyxhhifvtfqawbq --use-api --no-verify-jwt

      - name: Deploy fw-confirm-password-reset function
        run: supabase functions deploy fw-confirm-password-reset --project-ref sxshiqyxhhifvtfqawbq --use-api --no-verify-jwt

      - name: Deploy admin-list-users function
        run: supabase functions deploy admin-list-users --project-ref sxshiqyxhhifvtfqawbq --use-api --no-verify-jwt

      - name: Deploy admin-analytics-report function
        run: supabase functions deploy admin-analytics-report --project-ref sxshiqyxhhifvtfqawbq --use-api --no-verify-jwt

      # NOTE: mfl-proxy is deliberately NOT deployed here. Both apps share the
      # sxshiqyxhhifvtfqawbq project, so mfl-proxy has a single owning repo —
      # ReconAI (see SHARED-CODE.md "Backend Ownership"). Deploying it from both
      # repos let the last push win and silently flip the relay's auth behavior.
