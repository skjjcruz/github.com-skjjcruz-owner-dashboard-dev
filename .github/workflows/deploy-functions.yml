name: Deploy Supabase Edge Functions

on:
  push:
    branches: ["main", "claude/*"]
    paths:
      - "supabase/functions/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Set JWT secret
        run: supabase secrets set SUPABASE_JWT_SECRET="$SUPABASE_JWT_SECRET" --project-ref sxshiqyxhhifvtfqawbq
        env:
          SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET }}

      - name: Deploy get-session-token function
        run: supabase functions deploy get-session-token --project-ref sxshiqyxhhifvtfqawbq

      - name: Deploy set-password function
        run: supabase functions deploy set-password --project-ref sxshiqyxhhifvtfqawbq

      - name: Deploy ai-analyze function
        run: supabase functions deploy ai-analyze --project-ref sxshiqyxhhifvtfqawbq

      - name: Deploy fw-signup function
        run: supabase functions deploy fw-signup --project-ref sxshiqyxhhifvtfqawbq

      - name: Deploy fw-signin function
        run: supabase functions deploy fw-signin --project-ref sxshiqyxhhifvtfqawbq

      - name: Deploy fw-create-checkout function
        run: supabase functions deploy fw-create-checkout --project-ref sxshiqyxhhifvtfqawbq

      - name: Deploy fw-stripe-webhook function
        run: supabase functions deploy fw-stripe-webhook --project-ref sxshiqyxhhifvtfqawbq
