name: Deploy Supabase Edge Functions

on:
  push:
    branches: ["main", "claude/*"]
    paths:
      - "supabase/functions/**"
      - "supabase/migrations/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply database migrations
        # Applies all migrations in supabase/migrations/ in filename order.
        # continue-on-error keeps function deploys running even if a migration
        # was already applied or the token lacks SQL execution scope.
        # To apply manually: Supabase Dashboard → SQL Editor → paste each file.
        continue-on-error: true
        run: |
          python3 - <<'PYEOF'
          import json, urllib.request, os, sys, glob
          token = os.environ.get('SUPABASE_ACCESS_TOKEN', '')
          if not token:
              print('SUPABASE_ACCESS_TOKEN not set — skipping migrations', file=sys.stderr)
              sys.exit(0)
          migration_files = sorted(glob.glob('supabase/migrations/*.sql'))
          if not migration_files:
              print('No migration files found')
              sys.exit(0)
          all_ok = True
          for path in migration_files:
              sql = open(path).read()
              print(f'Applying {path}...')
              req = urllib.request.Request(
                  'https://api.supabase.com/v1/projects/sxshiqyxhhifvtfqawbq/database/query',
                  data=json.dumps({'query': sql}).encode(),
                  headers={
                      'Authorization': f'Bearer {token}',
                      'Content-Type':  'application/json',
                  },
                  method='POST',
              )
              try:
                  with urllib.request.urlopen(req) as r:
                      print(f'  OK: {r.read().decode()[:200]}')
              except urllib.error.HTTPError as e:
                  body = e.read().decode()
                  print(f'  Response {e.code}: {body}', file=sys.stderr)
                  if 'already exists' not in body and e.code >= 500:
                      all_ok = False
          if not all_ok:
              sys.exit(1)
          PYEOF

      - name: Deploy get-session-token function
        run: supabase functions deploy get-session-token --project-ref sxshiqyxhhifvtfqawbq

      - name: Deploy set-password function
        run: supabase functions deploy set-password --project-ref sxshiqyxhhifvtfqawbq

      - name: Deploy ai-analyze function
        run: supabase functions deploy ai-analyze --project-ref sxshiqyxhhifvtfqawbq

      - name: Deploy fw-signup function
        run: supabase functions deploy fw-signup --project-ref sxshiqyxhhifvtfqawbq

      - name: Deploy fw-signin function
        run: supabase functions deploy fw-signin --project-ref sxshiqyxhhifvtfqawbq

      - name: Deploy fw-create-checkout function
        run: supabase functions deploy fw-create-checkout --project-ref sxshiqyxhhifvtfqawbq

      - name: Deploy fw-stripe-webhook function
        run: supabase functions deploy fw-stripe-webhook --project-ref sxshiqyxhhifvtfqawbq

      - name: Deploy admin-list-users function
        run: supabase functions deploy admin-list-users --project-ref sxshiqyxhhifvtfqawbq
