name: QA - grant the test account a Pro trial

# Manually-dispatched QA helper: flips the designated QA reset account
# (skjjcruz@netzero.com) to a dhq Pro trial so paid-tier behavior can be
# exercised end-to-end without a real purchase. The SQL is FIXED — no
# dispatch inputs — and only ever touches the QA account, which resets to
# a blank slate on its next sign-up anyway.

on:
  workflow_dispatch:

jobs:
  grant:
    if: github.repository == 'skjjcruz/github.com-skjjcruz-owner-dashboard-dev'
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - name: Grant Pro trial to the QA account
        run: |
          python3 - <<'PYEOF'
          import json, os, sys, urllib.request

          token = os.environ.get('SUPABASE_ACCESS_TOKEN', '')
          if not token:
              print('SUPABASE_ACCESS_TOKEN missing', file=sys.stderr); sys.exit(1)
          endpoint = 'https://api.supabase.com/v1/projects/sxshiqyxhhifvtfqawbq/database/query'

          def q(sql):
              req = urllib.request.Request(
                  endpoint,
                  data=json.dumps({'query': sql}).encode(),
                  headers={
                      'Authorization': f'Bearer {token}',
                      'Content-Type': 'application/json',
                      'Accept': 'application/json',
                      'User-Agent': 'ReconAI-WarRoom-GitHub-Actions',
                  },
                  method='POST')
              with urllib.request.urlopen(req) as resp:
                  return json.loads(resp.read().decode())

          rows = q("""
              update public.subscriptions s
              set product_slug = 'dhq', tier = 'pro', status = 'trialing',
                  billing_period = 'monthly',
                  current_period_end = now() + interval '5 days',
                  updated_at = now()
              where s.user_id = (select id from public.app_users where email = 'skjjcruz@netzero.com')
              returning s.product_slug, s.tier, s.status, s.current_period_end;
          """)
          print(json.dumps(rows, indent=2, default=str))
          if not rows:
              print('No subscription row updated — sign the QA account up first.', file=sys.stderr)
              sys.exit(1)
          PYEOF
