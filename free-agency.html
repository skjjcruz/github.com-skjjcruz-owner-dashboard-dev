            // ---- Main render ----
            return (
                <div style={{ display:'flex', flexDirection:'column', height:'100vh', overflow:'hidden' }}>

                    {/* HEADER */}
                    <div className="tracker-header" style={{ flexDirection:'column', gap:'0.3rem', padding:'0.4rem 1rem' }}>
                        <div style={{ display:'flex', alignItems:'center', gap:'0.7rem', width:'100%', flexWrap:'wrap' }}>
                            <button className="back-btn" onClick={() => window.location.href='index.html'}>&larr; Dashboard</button>
                            <div className="tracker-title" style={{ fontSize:'1.35rem' }}>&#9881; WAIVER WAR ROOM</div>
                            <select
                                value={selectedYear}
                                onChange={e => setSelectedYear(e.target.value)}
                                style={{ background:'var(--charcoal)', border:'1px solid rgba(212,175,55,0.4)', borderRadius:'4px', color:'var(--gold)', fontFamily:'Inter,sans-serif', fontWeight:'700', fontSize:'0.72rem', padding:'0.18rem 0.45rem', cursor:'pointer', outline:'none', flexShrink:0 }}
                            >
                                {AVAILABLE_YEARS.map(y => <option key={y} value={y}>{y}</option>)}
                            </select>
                            <select className="league-select" value={leagueId} onChange={e => setLeagueId(e.target.value)}>
                                {leagues.map(l => <option key={l.league_id} value={l.league_id}>{l.name}</option>)}
                            </select>
                            <button className="back-btn" onClick={() => window.open('team-comps/', '_blank')}>Team Comp</button>
                        </div>
                        {/* FAAB Gauge Bar */}
                        {leagueInfo && startingBudget > 0 && (
                            <div style={{ display:'flex', alignItems:'center', gap:'0.5rem', width:'100%' }}>
                                <span style={{ fontFamily:'Inter,sans-serif', fontSize:'0.68rem', color:'var(--gold)', letterSpacing:'0.06em', flexShrink:0 }}>FAAB</span>
                                <div style={{ flex:1, height:'10px', background:'rgba(255,255,255,0.06)', borderRadius:'5px', overflow:'hidden', border:'1px solid rgba(212,175,55,0.2)' }}>
                                    <div style={{
                                        width: `${Math.max(0, Math.min(100, (finalBalance / startingBudget) * 100))}%`,
                                        height:'100%',
                                        background: finalBalance < startingBudget * 0.1 ? '#E74C3C' : finalBalance < startingBudget * 0.25 ? '#F0A500' : 'linear-gradient(90deg, #D4AF37, #2ECC71)',
                                        borderRadius:'5px',
                                        transition:'width 0.3s'
                                    }} />
                                </div>
                                <span style={{ fontFamily:'monospace', fontSize:'0.7rem', color: remColor(finalBalance), fontWeight:700, flexShrink:0 }}>
                                    ${finalBalance.toLocaleString()} / ${startingBudget.toLocaleString()}
                                </span>
                            </div>
                        )}
                    </div>

                    {leagueLoading ? (
                        <div className="center-msg" style={{ paddingTop:'4rem' }}>Loading league data...</div>
                    ) : (
                        <div className="tracker-grid">

                            {/* ===== LEFT: YOUR NEEDS ===== */}
                            <div className="panel roster-panel">
                                <div className="panel-header">
                                    <div className="ph-title">
                                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                                            <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
                                        </svg>
                                        YOUR NEEDS
                                        {myRoster && (
                                            <span style={{ color:'var(--silver)', fontSize:'1.3rem', marginLeft:'0.4rem' }}>
                                                ({myRoster.settings?.wins || 0}-{myRoster.settings?.losses || 0}{(myRoster.settings?.ties || 0) > 0 ? `-${myRoster.settings.ties}` : ''})
                                            </span>
                                        )}
                                        {userAvatar && (
                                            <img
                                                src={`https://sleepercdn.com/avatars/thumbs/${userAvatar}`}
                                                alt=""
                                                style={{ width:'30px', height:'30px', borderRadius:'5px', flexShrink:0, marginLeft:'0.3rem' }}
                                            />
                                        )}
                                        {myRoster && (
                                            <span style={{ marginLeft:'auto', color:'var(--silver)', fontSize:'0.58rem', opacity:0.5 }}>
                                                {myRoster.players?.length || 0} players
                                            </span>
                                        )}
                                    </div>
                                    <div className="ph-sub"></div>
                                </div>
                                <div className="panel-body" style={{padding:'0.5rem 0.6rem'}}>
                                    {myGroups.length === 0 && <div className="center-msg">No roster data</div>}
                                    {myGroups.length > 0 && (() => {
                                        // Compute position requirements from league roster_positions
                                        const rp = leagueInfo?.roster_positions || [];
                                        const posReqs = {};
                                        rp.forEach(p => {
                                            const n = normPos(p);
                                            if (n && n !== 'BN' && n !== 'IR' && n !== 'TAXI') {
                                                posReqs[n] = (posReqs[n] || 0) + 1;
                                            }
                                        });
                                        // FLEX counts toward RB/WR/TE
                                        const flexCount = rp.filter(p => p === 'FLEX').length;
                                        const sfCount = rp.filter(p => p === 'SUPER_FLEX' || p === 'SUPERFLEX').length;

                                        // Peak age thresholds
                                        const peakAge = { QB: 33, RB: 26, WR: 29, TE: 30, K: 36, DEF: 99, DL: 30, LB: 29, DB: 29 };

                                        // Grade calculation
                                        function getGrade(grp) {
                                            const count = (myGrouped[grp] || []).length;
                                            const needed = posReqs[grp] || 0;
                                            // Include FLEX eligibility for RB/WR/TE
                                            const flexEligible = ['RB','WR','TE'].includes(grp);
                                            const effectiveNeed = needed + (flexEligible ? Math.ceil(flexCount / 3) : 0) + (['QB'].includes(grp) ? sfCount : 0);
                                            const surplus = count - effectiveNeed;
                                            // Check starter quality (avg PPG of top starters)
                                            const starters = (myGrouped[grp] || []).slice(0, Math.max(effectiveNeed, 1));
                                            const avgPpg = starters.reduce((sum, { id }) => {
                                                const s = statsData[id];
                                                const raw = calcRawPts(s);
                                                const gp = s?.gp || 1;
                                                return sum + (raw ? raw / gp : 0);
                                            }, 0) / (starters.length || 1);

                                            if (surplus >= 2 && avgPpg > 12) return { grade: 'A', color: '#2ECC71' };
                                            if (surplus >= 1 && avgPpg > 8)  return { grade: 'B', color: '#2ECC71' };
                                            if (surplus >= 0 && avgPpg > 5)  return { grade: 'C', color: '#D4AF37' };
                                            if (surplus >= -1)               return { grade: 'D', color: '#E67E22' };
                                            return { grade: 'F', color: '#E74C3C' };
                                        }

                                        // Aging risks
                                        const agingPlayers = [];
                                        Object.entries(myGrouped).forEach(([grp, players]) => {
                                            players.forEach(({ id, p }) => {
                                                const age = p.age || (p.birth_date ? Math.floor((Date.now() - new Date(p.birth_date).getTime()) / 31557600000) : null);
                                                const threshold = peakAge[grp] || 30;
                                                if (age && age > threshold) {
                                                    agingPlayers.push({ id, p, age, grp, overBy: age - threshold });
                                                }
                                            });
                                        });
                                        agingPlayers.sort((a, b) => b.overBy - a.overBy);

                                        // Upgrade opportunities: weakest starter vs best FA
                                        const upgrades = [];
                                        Object.entries(myGrouped).forEach(([grp, players]) => {
                                            const { grade } = getGrade(grp);
                                            if (grade === 'A' || grade === 'B') return;
                                            const worst = players[players.length - 1];
                                            if (!worst) return;
                                            const worstS = statsData[worst.id];
                                            const worstRaw = calcRawPts(worstS);
                                            const worstAvg = (worstRaw && worstS?.gp) ? worstRaw / worstS.gp : 0;
                                            // Find best FA at this position
                                            const bestFA = freeAgents.find(fa => fa.norm === grp || fa.pos === grp);
                                            if (!bestFA) return;
                                            const bestS = statsData[bestFA.id];
                                            const bestRaw = calcRawPts(bestS);
                                            const bestAvg = (bestRaw && bestS?.gp) ? bestRaw / bestS.gp : 0;
                                            if (bestAvg > worstAvg) {
                                                upgrades.push({
                                                    grp, grade,
                                                    worstName: worst.p.full_name || `${worst.p.first_name||''} ${worst.p.last_name||''}`.trim(),
                                                    worstAvg: worstAvg.toFixed(1),
                                                    bestFA,
                                                    bestAvg: bestAvg.toFixed(1),
                                                    diff: (bestAvg - worstAvg).toFixed(1)
                                                });
                                            }
                                        });

                                        return (
                                            <>
                                                {/* FAAB Budget Bar */}
                                                <div style={{ marginBottom:'0.7rem', padding:'0.5rem', background:'rgba(212,175,55,0.05)', borderRadius:'6px', border:'1px solid rgba(212,175,55,0.15)' }}>
                                                    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'0.3rem' }}>
                                                        <span style={{ fontFamily:'Inter,sans-serif', fontSize:'0.78rem', color:'var(--gold)', letterSpacing:'0.08em' }}>FAAB BUDGET</span>
                                                        <span style={{ fontFamily:'monospace', fontSize:'0.82rem', color: remColor(finalBalance), fontWeight:700 }}>
                                                            ${finalBalance.toLocaleString()} / ${startingBudget.toLocaleString()}
                                                        </span>
                                                    </div>
                                                    <div style={{ height:'14px', background:'rgba(255,255,255,0.06)', borderRadius:'7px', overflow:'hidden', border:'1px solid rgba(212,175,55,0.15)' }}>
                                                        <div style={{
                                                            width: `${Math.max(0, Math.min(100, (finalBalance / startingBudget) * 100))}%`,
                                                            height:'100%',
                                                            background: finalBalance < startingBudget * 0.1 ? '#E74C3C' : finalBalance < startingBudget * 0.25 ? '#F0A500' : 'linear-gradient(90deg, #D4AF37, #2ECC71)',
                                                            borderRadius:'7px',
                                                            transition:'width 0.3s'
                                                        }} />
                                                    </div>
                                                    <div style={{ display:'flex', justifyContent:'space-between', marginTop:'0.2rem', fontSize:'0.6rem', color:'var(--silver)', opacity:0.5 }}>
                                                        <span>{startingBudget > 0 ? Math.round((finalBalance / startingBudget) * 100) : 0}% remaining</span>
                                                        <span>{targets.length} bid{targets.length !== 1 ? 's' : ''} placed</span>
                                                    </div>
                                                </div>

                                                {/* Position Grades */}
                                                <div style={{ marginBottom:'0.7rem' }}>
                                                    <div style={{ fontFamily:'Inter,sans-serif', fontSize:'0.82rem', color:'var(--gold)', letterSpacing:'0.1em', marginBottom:'0.35rem', borderBottom:'1px solid rgba(212,175,55,0.15)', paddingBottom:'0.2rem' }}>
                                                        POSITION GRADES
                                                    </div>
                                                    {myGroups.map(grp => {
                                                        const { grade, color } = getGrade(grp);
                                                        const count = (myGrouped[grp] || []).length;
                                                        const needed = posReqs[grp] || 0;
                                                        return (
                                                            <div key={grp} style={{ display:'flex', alignItems:'center', gap:'0.4rem', padding:'0.22rem 0.1rem', borderBottom:'1px solid rgba(255,255,255,0.03)' }}>
                                                                <span style={{
                                                                    fontFamily:'Inter,sans-serif', fontSize:'1.1rem', fontWeight:700,
                                                                    color: color, width:'22px', textAlign:'center', flexShrink:0
                                                                }}>{grade}</span>
                                                                <span style={{ fontFamily:'Inter,sans-serif', fontSize:'0.76rem', color:'var(--gold)', width:'28px', flexShrink:0 }}>{grp}</span>
                                                                <span style={{ fontSize:'0.68rem', color:'var(--silver)', opacity:0.7, flex:1 }}>
                                                                    {count} rostered {needed > 0 ? `(need ${needed} starter${needed > 1 ? 's' : ''})` : ''}
                                                                </span>
                                                                <span style={{
                                                                    fontSize:'0.58rem', padding:'0.1rem 0.35rem', borderRadius:'3px',
                                                                    background: grade === 'A' || grade === 'B' ? 'rgba(46,204,113,0.12)' : grade === 'C' ? 'rgba(212,175,55,0.12)' : 'rgba(231,76,60,0.12)',
                                                                    color: color, fontWeight:600
                                                                }}>
                                                                    {grade === 'A' ? 'SURPLUS' : grade === 'B' ? 'SOLID' : grade === 'C' ? 'ADEQUATE' : grade === 'D' ? 'THIN' : 'CRITICAL'}
                                                                </span>
                                                            </div>
                                                        );
                                                    })}
                                                </div>

                                                {/* Aging Risks */}
                                                {agingPlayers.length > 0 && (
                                                    <div style={{ marginBottom:'0.7rem' }}>
                                                        <div style={{ fontFamily:'Inter,sans-serif', fontSize:'0.82rem', color:'#E74C3C', letterSpacing:'0.1em', marginBottom:'0.35rem', borderBottom:'1px solid rgba(231,76,60,0.15)', paddingBottom:'0.2rem' }}>
                                                            &#9888; AGING RISKS
                                                        </div>
                                                        {agingPlayers.slice(0, 8).map(({ id, p, age, grp, overBy }) => {
                                                            const pName = p.full_name || `${p.first_name||''} ${p.last_name||''}`.trim();
                                                            return (
                                                                <div key={id} style={{ display:'flex', alignItems:'center', gap:'0.35rem', padding:'0.18rem 0.1rem', borderBottom:'1px solid rgba(255,255,255,0.03)' }}>
                                                                    <span style={{ fontSize:'0.72rem', color: overBy >= 3 ? '#E74C3C' : '#E67E22', flexShrink:0 }}>&#9888;</span>
                                                                    <span className="pos-badge" style={{ color: posColor(grp), width:'26px', fontSize:'0.55rem' }}>{grp}</span>
                                                                    <a href="#" onClick={e => { e.preventDefault(); if (window.WR?.openPlayerCard) window.WR.openPlayerCard(id); else if (window.openFWPlayerModal) openFWPlayerModal(id, playersData, statsData);}}
                                                                       style={{ flex:1, fontSize:'0.72rem', color:'var(--white)', textDecoration:'none', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}
                                                                       onMouseEnter={e => e.currentTarget.style.color='var(--gold)'}
                                                                       onMouseLeave={e => e.currentTarget.style.color='var(--white)'}>
                                                                        {pName}
                                                                        <span style={{ color:'var(--silver)', opacity:0.5, marginLeft:'3px', fontSize:'0.6rem' }}>{p.team||''}</span>
                                                                    </a>
                                                                    <span style={{ fontSize:'0.65rem', color: overBy >= 3 ? '#E74C3C' : '#E67E22', fontWeight:600, flexShrink:0 }}>
                                                                        Age {age}
                                                                    </span>
                                                                    <span style={{ fontSize:'0.55rem', color:'var(--silver)', opacity:0.5, flexShrink:0 }}>
                                                                        (+{overBy}yr)
                                                                    </span>
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                )}

                                                {/* Upgrade Available */}
                                                {upgrades.length > 0 && (
                                                    <div style={{ marginBottom:'0.5rem' }}>
                                                        <div style={{ fontFamily:'Inter,sans-serif', fontSize:'0.82rem', color:'#2ECC71', letterSpacing:'0.1em', marginBottom:'0.35rem', borderBottom:'1px solid rgba(46,204,113,0.15)', paddingBottom:'0.2rem' }}>
                                                            &#8593; UPGRADE AVAILABLE
                                                        </div>
                                                        {upgrades.map(u => (
                                                            <div key={u.grp} style={{ padding:'0.3rem 0.15rem', marginBottom:'0.25rem', background:'rgba(46,204,113,0.04)', borderRadius:'4px', border:'1px solid rgba(46,204,113,0.1)' }}>
                                                                <div style={{ display:'flex', alignItems:'center', gap:'0.3rem', marginBottom:'0.15rem' }}>
                                                                    <span className="pos-badge" style={{ color: posColor(u.grp), width:'26px', fontSize:'0.55rem' }}>{u.grp}</span>
                                                                    <span style={{ fontSize:'0.65rem', color:'var(--silver)', opacity:0.6 }}>Grade:</span>
                                                                    <span style={{ fontSize:'0.72rem', fontWeight:700, color: u.grade === 'D' ? '#E67E22' : '#E74C3C' }}>{u.grade}</span>
                                                                </div>
                                                                <div style={{ fontSize:'0.65rem', color:'var(--silver)', opacity:0.7, paddingLeft:'0.2rem' }}>
                                                                    <span style={{ color:'#E74C3C' }}>{u.worstName}</span>
                                                                    <span style={{ opacity:0.5 }}> ({u.worstAvg} PPG)</span>
                                                                    <span style={{ color:'var(--gold)', margin:'0 0.25rem' }}>&#8594;</span>
                                                                    <span style={{ color:'#2ECC71', cursor:'pointer' }} onClick={() => { setQuickPlayer(u.bestFA); setQuickCost(''); }}>
                                                                        {u.bestFA.name}
                                                                    </span>
                                                                    <span style={{ opacity:0.5 }}> ({u.bestAvg} PPG)</span>
                                                                    <span style={{ color:'#2ECC71', fontWeight:700, marginLeft:'0.3rem' }}>+{u.diff}</span>
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                )}
                                            </>
                                        );
                                    })()}
                                </div>
                            </div>

                            {/* ===== CENTER: SMART TARGETS ===== */}
                            <div className="panel">
                                <div className="panel-header">
                                    <div className="ph-title">
                                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                                            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                                        </svg>
                                        SMART TARGETS
                                        <span style={{ color:'var(--silver)', fontSize:'0.65rem', opacity:0.55, marginLeft:'auto' }}>{filteredFAs.length}</span>
                                    </div>
                                    <div className="ph-sub">
                                        {posFilters.map(p => (
                                            <button key={p} className={`filter-btn${posFilter===p?' active':''}`}
                                                onClick={() => setPosFilter(p)}>{p}</button>
                                        ))}
                                        <input className="search-input" placeholder="Search..."
                                            value={search} onChange={e => setSearch(e.target.value)} />
                                    </div>
                                </div>

                                {/* Quick-add bar */}
                                {quickPlayer && (
                                    <div className="quick-add-bar">
                                        <form onSubmit={handleQuickAdd} style={{ display:'flex', alignItems:'center', gap:'0.4rem' }}>
                                            <span style={{ flex:1, color:'var(--gold)', fontSize:'0.73rem',
                                                           overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
                                                + <strong>{quickPlayer.name}</strong>
                                                <span style={{ color:'var(--silver)', opacity:0.55 }}> ({quickPlayer.norm||quickPlayer.pos})</span>
                                            </span>
                                            <input className="t-input" style={{ width:'68px' }} type="number"
                                                placeholder="Bid $" value={quickCost}
                                                onChange={e => setQuickCost(e.target.value)} autoFocus min="0" />
                                            <button type="submit" className="t-submit">Add</button>
                                            <button type="button" onClick={() => setQuickPlayer(null)}
                                                style={{ background:'transparent', border:'none', color:'var(--silver)',
                                                         cursor:'pointer', fontSize:'1.1rem', lineHeight:1 }}>&times;</button>
                                        </form>
                                    </div>
                                )}

                                <StatHeader addBtn={true} />

                                <div className="panel-body">
                                    {/* --- CURATED SECTIONS --- */}
                                    {posFilter === 'ALL' && !search && myGroups.length > 0 && freeAgents.length > 0 && (() => {
                                        // Compute weak positions
                                        const rp = leagueInfo?.roster_positions || [];
                                        const posReqs = {};
                                        rp.forEach(p => { const n = normPos(p); if (n && n !== 'BN' && n !== 'IR' && n !== 'TAXI') posReqs[n] = (posReqs[n] || 0) + 1; });
                                        const flexCount = rp.filter(p => p === 'FLEX').length;
                                        const sfCount = rp.filter(p => p === 'SUPER_FLEX' || p === 'SUPERFLEX').length;

                                        const weakPositions = [];
                                        myGroups.forEach(grp => {
                                            const count = (myGrouped[grp] || []).length;
                                            const needed = (posReqs[grp] || 0) + (['RB','WR','TE'].includes(grp) ? Math.ceil(flexCount / 3) : 0) + (grp === 'QB' ? sfCount : 0);
                                            const starters = (myGrouped[grp] || []).slice(0, Math.max(needed, 1));
                                            const avgPpg = starters.reduce((sum, { id }) => {
                                                const s = statsData[id]; const raw = calcRawPts(s); const gp = s?.gp || 1;
                                                return sum + (raw ? raw / gp : 0);
                                            }, 0) / (starters.length || 1);
                                            const surplus = count - needed;
                                            if (surplus < 1 || avgPpg < 8) weakPositions.push({ grp, needed, count, avgPpg, severity: surplus < 0 ? 2 : surplus === 0 ? 1 : 0 });
                                        });
                                        weakPositions.sort((a, b) => b.severity - a.severity || a.avgPpg - b.avgPpg);
                                        const weakPosSet = new Set(weakPositions.map(w => w.grp));

                                        // Recommended FAs at weak positions
                                        const recommended = [];
                                        const seenRec = new Set();
                                        weakPositions.forEach(({ grp }) => {
                                            freeAgents.filter(fa => fa.norm === grp || fa.pos === grp).slice(0, 3).forEach(fa => {
                                                if (!seenRec.has(fa.id) && recommended.length < 8) {
                                                    const s = statsData[fa.id]; const raw = calcRawPts(s); const gp = s?.gp || 1;
                                                    const ppg = raw ? (raw / gp).toFixed(1) : '0.0';
                                                    const p = playersData[fa.id];
                                                    const age = p?.age || (p?.birth_date ? Math.floor((Date.now() - new Date(p.birth_date).getTime()) / 31557600000) : null);
                                                    recommended.push({ ...fa, ppg, age, reason: `Fills ${grp} need` + (parseFloat(ppg) > 10 ? ' - elite PPG' : '') });
                                                    seenRec.add(fa.id);
                                                }
                                            });
                                        });

                                        // Competition alert: count other teams that also need each weak position
                                        const competition = weakPositions.map(({ grp, needed }) => {
                                            let teamsNeeding = 0;
                                            allRosters.forEach(r => {
                                                if (r.owner_id === userId) return;
                                                const rPlayers = (r.players || []).filter(id => {
                                                    const p = playersData[id];
                                                    return p && (normPos(p.position) === grp);
                                                });
                                                if (rPlayers.length < needed) teamsNeeding++;
                                            });
                                            return { grp, teamsNeeding, totalTeams: allRosters.length - 1 };
                                        }).filter(c => c.teamsNeeding > 0);

                                        // Dynasty stashes: young players with low experience
                                        const stashes = freeAgents.filter(fa => {
                                            const p = playersData[fa.id];
                                            if (!p) return false;
                                            const age = p.age || (p.birth_date ? Math.floor((Date.now() - new Date(p.birth_date).getTime()) / 31557600000) : null);
                                            return age && age <= 25 && (p.years_exp != null && p.years_exp <= 2);

                                    <div className="panel-body" style={{ padding:'0.85rem 0.8rem' }}>
                                        <div style={{ fontSize:'0.68rem', color:'var(--silver)', opacity:0.55, marginBottom:'0.75rem', lineHeight:1.5 }}>
                                            {FA_AI_MODES.find(m => m.id === aiMode)?.desc}
                                        </div>
                                        {aiMode === 'fa_chat' && (
                                            <textarea className="ai-chat-input"
                                                placeholder="e.g. Should I spend big on a WR or wait for the market to drop? My roster is thin at RB..."
                                                value={aiChatInput}
                                                onChange={e => setAiChatInput(e.target.value)} />
                                        )}
                                        <button type="button" className="ai-analyze-btn" onClick={runFAAnalysis}
                                            disabled={aiLoading || (aiMode === 'fa_chat' && !aiChatInput.trim()) || !leagueId}>
                                            {aiLoading
                                                ? <><span className="ai-spinner"/>&nbsp;Analyzing...</>
                                                : '✦ Run Analysis'}
                                        </button>
                                        {aiError && <div className="ai-error-msg">⚠ {aiError}</div>}
                                        {aiAnalysis && (
                                            <div className="ai-output"
                                                dangerouslySetInnerHTML={{ __html: renderMarkdown(aiAnalysis) }} />
                                        )}
                                        {!aiAnalysis && !aiLoading && !aiError && (
                                            <div style={{ textAlign:'center', padding:'2.5rem 1rem',
                                                          color:'var(--silver)', opacity:0.28, fontSize:'0.73rem' }}>
                                                Select a mode and run analysis
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>

                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<FreeAgencyTracker />);
    </script>
<footer style="text-align:center;padding:16px;font-size:12px;color:#666;border-top:1px solid #1a1a1a;margin-top:32px;">&copy; 2026 skjjcruz. All rights reserved.</footer>
