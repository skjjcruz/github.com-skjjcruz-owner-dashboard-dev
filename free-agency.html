<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>Waiver War Room - Dynasty HQ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --dark-gold: #B8941E;
            --black: #0A0A0A;
            --off-black: #1A1A1A;
            --charcoal: #2A2A2A;
            --silver: #C0C0C0;
            --white: #FFFFFF;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--black);
            color: var(--white);
            min-height: 100vh;
            overflow-x: hidden;
        }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: rgba(212,175,55,0.05); }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 2px; }

        /* ---- Header ---- */
        .tracker-header {
            background: linear-gradient(135deg, var(--off-black) 0%, var(--charcoal) 100%);
            border-bottom: 2px solid var(--gold);
            padding: 0.55rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.7rem;
            flex-wrap: wrap;
            flex-shrink: 0;
        }
        .tracker-title {
            font-family: 'Inter', sans-serif;
            font-size: 1.25rem;
            color: var(--gold);
            letter-spacing: 0.1em;
            flex: 1;
            white-space: nowrap;
        }
        .back-btn {
            background: transparent;
            border: 1.5px solid var(--gold);
            color: var(--gold);
            font-family: 'Inter', sans-serif;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 0.32rem 0.65rem;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            flex-shrink: 0;
        }
        .back-btn:hover { background: rgba(212,175,55,0.1); }
        .league-select {
            background: var(--charcoal);
            border: 1.5px solid rgba(212,175,55,0.4);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            font-size: 0.76rem;
            padding: 0.32rem 0.55rem;
            border-radius: 4px;
            cursor: pointer;
            max-width: 200px;
        }
        .header-user {
            color: var(--silver);
            font-size: 0.63rem;
            opacity: 0.5;
            white-space: nowrap;
        }

        /* ---- Three-column grid ---- */
        .tracker-grid {
            display: grid;
            grid-template-columns: 1fr 437px 1fr;
            height: calc(100vh - 46px);
            overflow: hidden;
            gap: 0.6rem;
            padding: 0.6rem;
            box-sizing: border-box;
        }
        @media (max-width: 900px) {
            .tracker-grid { grid-template-columns: 1fr; height: auto; overflow: visible; }
        }

        /* ---- Panels ---- */
        .panel {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: rgba(10,10,10,0.85);
            border: 2px solid rgba(212,175,55,0.2);
            border-radius: 10px;
        }
        .panel-header {
            background: rgba(212,175,55,0.07);
            border-bottom: 1px solid rgba(212,175,55,0.18);
            border-radius: 10px 10px 0 0;
            font-family: 'Inter', sans-serif;
            font-size: 1.3rem;
            color: var(--gold);
            letter-spacing: 0.1em;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
        }
        .ph-title {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0 0.7rem;
            height: 50px;
            overflow: hidden;
            flex-shrink: 0;
            white-space: nowrap;
        }
        /* Second row of each panel-header — fixed height for cross-column alignment */
        .ph-sub {
            display: flex;
            align-items: center;
            gap: 0.2rem;
            padding: 0 0.5rem;
            height: 36px;
            overflow: hidden;
            border-top: 1px solid rgba(212,175,55,0.1);
            flex-shrink: 0;
        }
        .panel-body {
            flex: 1;
            overflow-y: auto;
            padding: 0.4rem 0.45rem;
        }

        /* ---- Stats column header row ---- */
        .stat-col-hdr {
            display: flex;
            align-items: center;
            padding: 0.18rem 0.85rem;
            gap: 0.35rem;
            border-bottom: 1px solid rgba(212,175,55,0.1);
            flex-shrink: 0;
        }
        .stat-lbl {
            font-family: 'Inter', sans-serif;
            font-size: 0.72rem;
            color: var(--gold);
            letter-spacing: 0.07em;
            opacity: 0.7;
            text-align: right;
            flex-shrink: 0;
        }

        /* ---- Position badge ---- */
        .pos-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 34px;
            flex-shrink: 0;
            font-size: 0.62rem;
            font-weight: 700;
            border: 1.5px solid var(--gold);
            border-radius: 3px;
            padding: 2px 0;
            background: rgba(212,175,55,0.08);
            letter-spacing: 0.02em;
        }

        /* ---- Player rows (compact) ---- */
        .player-row {
            display: flex;
            align-items: center;
            padding: 0.22rem 0.3rem;
            margin-bottom: 0.15rem;
            background: rgba(255,255,255,0.02);
            border-radius: 4px;
            gap: 0.35rem;
            transition: background 0.12s;
        }
        .player-row:hover { background: rgba(212,175,55,0.06); }
        .player-name {
            flex: 0 0 160px;
            width: 160px;
            font-size: 1.1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: inherit;
            text-decoration: none;
            display: block;
        }
        .player-team {
            font-size: 0.68rem;
            color: var(--silver);
            opacity: 0.5;
        }
        /* Stat cell */
        .sc {
            font-size: 0.72rem;
            font-weight: 600;
            text-align: right;
            flex-shrink: 0;
        }
        .pos-group-label {
            font-family: 'Inter', sans-serif;
            font-size: 0.76rem;
            color: var(--gold);
            letter-spacing: 0.1em;
            padding: 0.38rem 0 0.14rem;
            opacity: 0.72;
        }

        /* ---- Center: filter buttons + search (inside .ph-sub) ---- */
        .filter-btn {
            background: transparent;
            border: 1px solid rgba(212,175,55,0.27);
            color: var(--silver);
            font-family: 'Inter', sans-serif;
            font-size: 0.67rem;
            font-weight: 600;
            padding: 0.18rem 0.4rem;
            border-radius: 3px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            transition: all 0.1s;
        }
        .filter-btn.active { background: var(--gold); border-color: var(--gold); color: var(--black); }
        .search-input {
            flex: 0 1 90px;
            min-width: 50px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(212,175,55,0.27);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            font-size: 0.76rem;
            padding: 0.18rem 0.42rem;
            border-radius: 3px;
        }
        .search-input::placeholder { color: rgba(192,192,192,0.33); }
        .search-input:focus { outline: none; border-color: rgba(212,175,55,0.58); }
        .add-circle {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: 1px solid rgba(212,175,55,0.52);
            background: transparent;
            color: var(--gold);
            font-size: 1.05rem;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            cursor: pointer;
            transition: all 0.1s;
        }
        .add-circle:hover { background: var(--gold); color: var(--black); }

        /* ---- Quick-add bar ---- */
        .quick-add-bar {
            padding: 0.4rem 0.5rem;
            background: rgba(212,175,55,0.07);
            border-bottom: 1px solid rgba(212,175,55,0.26);
            flex-shrink: 0;
        }

        /* ---- Roster Table (My Roster panel) ---- */
        .roster-table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }
        .roster-table thead th {
            position: static;
            background: rgba(10,10,10,0.97);
            color: var(--gold);
            padding: 0.32rem 0.45rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.72rem;
            font-weight: 400;
            letter-spacing: 0.07em;
            border-bottom: 1px solid rgba(212,175,55,0.18);
            text-align: right;
        }
        .roster-table thead th.rth-pos    { text-align: center; width: 44px; }
        .roster-table thead th.rth-player { text-align: left; }
        .roster-table thead th.rth-yrs    { width: 40px; }
        .roster-table thead th.rth-pts    { width: 56px; }
        .roster-table thead th.rth-gp     { width: 36px; }
        .roster-table thead th.rth-avg    { width: 52px; }
        .roster-table thead th.rth-proj   { width: 48px; opacity: 0.6; }
        .roster-table td {
            padding: 0.27rem 0.45rem;
            vertical-align: middle;
            text-align: right;
            font-size: 0.72rem;
            font-weight: 600;
            border: none;
        }
        .roster-table td.rtd-pos {
            text-align: center;
            width: 44px;
            font-family: 'Inter', sans-serif;
            font-size: 0.68rem;
            font-weight: 400;
            color: var(--gold);
            background: rgba(212,175,55,0.13);
            letter-spacing: 0.04em;
        }
        .roster-table td.rtd-player {
            text-align: left;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            font-size: 0.82rem;
        }
        .roster-table td.rtd-player a {
            color: var(--white);
            text-decoration: none;
        }
        .roster-table td.rtd-player a:hover { color: var(--gold); }
        .roster-table td.rtd-num  { color: var(--silver); opacity: 0.75; }
        .roster-table td.rtd-pts  { color: var(--gold); opacity: 1; }
        .roster-table td.rtd-proj { color: var(--silver); opacity: 0.5; }
        /* Group header row */
        .roster-table tr.rt-group td {
            background: rgba(8,8,8,0.95);
            color: var(--gold);
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 0.08em;
            padding: 0.28rem 0.45rem;
            border-bottom: 1px solid rgba(212,175,55,0.12);
            text-align: left;
            opacity: 1;
        }
        .roster-table tr.rt-group .rt-gw {
            display: flex;
            justify-content: space-between;
        }
        /* Separator row */
        .roster-table tr.rt-sep td {
            background: rgba(212,175,55,0.07);
            height: 2px;
            padding: 0;
        }
        /* Status colors on player cell */
        .roster-table td.ps-starter { background: rgba(6,78,59,0.55);   color: #ecfdf5 !important; opacity:1 !important; }
        .roster-table td.ps-ir      { background: rgba(127,29,29,0.55); color: #fee2e2 !important; opacity:1 !important; }
        .roster-table td.ps-taxi    { background: rgba(49,46,129,0.55);  color: #e0e7ff !important; opacity:1 !important; }
        /* Row hover */
        .roster-table tbody tr:not(.rt-group):not(.rt-sep):hover td { background: rgba(212,175,55,0.07); }
        .roster-table tbody tr:not(.rt-group):not(.rt-sep):hover td.rtd-pos { background: rgba(212,175,55,0.22); }

        /* ---- Right: FA Targets ---- */
        .budget-input-inline {
            background: transparent;
            border: none;
            border-bottom: 1.5px solid var(--gold);
            color: var(--gold);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            width: 90px;
            text-align: right;
        }
        .budget-input-inline:focus { outline: none; }
        .t-input {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(212,175,55,0.2);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            font-size: 0.68rem;
            padding: 0.25rem 0.35rem;
            border-radius: 3px;
            min-width: 0;
        }
        .t-input::placeholder { color: rgba(192,192,192,0.28); }
        .t-input:focus { outline: none; border-color: rgba(212,175,55,0.52); }
        .t-submit {
            background: var(--gold);
            border: none;
            color: var(--black);
            font-family: 'Inter', sans-serif;
            font-size: 0.66rem;
            font-weight: 700;
            padding: 0.25rem 0.52rem;
            border-radius: 3px;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
        }

        /* ---- Targets rows (div-based, shares player-row layout) ---- */
        .del-btn {
            background: transparent;
            border: none;
            color: rgba(231,76,60,0.52);
            cursor: pointer;
            font-size: 0.82rem;
            padding: 0 0.12rem;
            line-height: 1;
        }
        .del-btn:hover { color: #E74C3C; }

        /* ---- States ---- */
        .center-msg { text-align: center; color: var(--silver); opacity: 0.5; padding: 2rem 1rem; font-size: 0.78rem; }

        /* ---- Mobile two-panel side-by-side (phone only, ≤768px) ---- */
        @media (max-width: 768px) {
            .tracker-grid {
                grid-template-columns: 1fr 1fr !important;
                height: calc(100vh - 46px) !important;
                gap: 0.22rem !important;
                padding: 0.22rem !important;
            }
            /* Hide My Roster on phone — FA list + Targets only */
            .roster-panel { display: none !important; }
            /* Compact header */
            .panel-header .ph-title {
                font-size: 0.75rem;
                height: 32px;
                padding: 0 0.4rem;
                gap: 0.25rem;
            }
            .ph-sub {
                height: 28px;
                padding: 0 0.3rem;
                gap: 0.15rem;
                overflow-x: auto;
                scrollbar-width: none;
            }
            .ph-sub::-webkit-scrollbar { display: none; }
            .filter-btn { font-size: 0.52rem; padding: 0.1rem 0.22rem; }
            .search-input { font-size: 0.6rem; padding: 0.1rem 0.28rem; }
            /* Compact rows */
            .player-row { padding: 0.14rem 0.18rem; gap: 0.18rem; margin-bottom: 0.1rem; }
            .pos-badge { width: 22px; font-size: 0.5rem; padding: 1px 0; }
            /* Name fills remaining space instead of fixed 160px */
            .player-name {
                flex: 1 !important;
                width: auto !important;
                min-width: 0 !important;
                font-size: 0.65rem !important;
            }
            .player-team { display: none; }
            .sc { font-size: 0.6rem; }
            .stat-col-hdr { padding: 0.12rem 0.4rem; gap: 0.18rem; }
            .stat-lbl { font-size: 0.55rem; }
            /* Hide non-essential stat columns */
            .mob-hide { display: none !important; }
            /* Tighten quick-add bar */
            .quick-add-bar { padding: 0.25rem 0.3rem; }
            .add-circle { width: 20px; height: 20px; font-size: 0.85rem; }
            /* Targets panel: FA$ column also hidden */
            .mob-hide-fa { display: none !important; }
        }

        /* ---- Panel tab switcher ---- */
        .fa-tab-btn {
            background: transparent;
            border: 1.5px solid rgba(212,175,55,0.3);
            color: rgba(255,255,255,0.45);
            font-family: 'Inter', sans-serif;
            font-size: 0.62rem;
            font-weight: 600;
            padding: 0.18rem 0.5rem;
            border-radius: 3px;
            cursor: pointer;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .fa-tab-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(212,175,55,0.08); }
        .fa-tab-btn:hover:not(.active) { border-color: rgba(212,175,55,0.5); color: rgba(212,175,55,0.7); }

        /* ---- AI Scout (right panel) ---- */
        .ai-mode-btn { padding: 0.2rem 0.55rem; border: 1.5px solid rgba(212,175,55,0.3); background: transparent; color: rgba(255,255,255,0.45); font-family: 'Inter', sans-serif; font-size: 0.6rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; border-radius: 4px; cursor: pointer; white-space: nowrap; }
        .ai-mode-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(212,175,55,0.08); }
        .ai-mode-btn:hover:not(.active) { border-color: rgba(212,175,55,0.5); color: rgba(212,175,55,0.7); }
        .ai-analyze-btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.38rem 1rem; background: linear-gradient(135deg,rgba(212,175,55,0.15),rgba(212,175,55,0.07)); border: 1.5px solid var(--gold); color: var(--gold); font-family: 'Inter', sans-serif; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; border-radius: 4px; cursor: pointer; transition: all 0.2s; }
        .ai-analyze-btn:hover:not(:disabled) { background: rgba(212,175,55,0.2); box-shadow: 0 0 10px rgba(212,175,55,0.18); }
        .ai-analyze-btn:disabled { opacity: 0.38; cursor: not-allowed; }
        .ai-spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid rgba(212,175,55,0.3); border-top-color: var(--gold); border-radius: 50%; animation: ai-spin 0.75s linear infinite; }
        @keyframes ai-spin { to { transform: rotate(360deg); } }
        .ai-output { background: rgba(212,175,55,0.04); border: 1px solid rgba(212,175,55,0.18); border-radius: 6px; padding: 0.85rem 0.95rem; margin-top: 0.65rem; font-size: 0.75rem; color: var(--silver); line-height: 1.72; }
        .ai-output strong { color: var(--gold); font-weight: 700; }
        .ai-chat-input { width: 100%; background: var(--charcoal); border: 1.5px solid rgba(212,175,55,0.25); color: var(--white); font-family: 'Inter', sans-serif; font-size: 0.74rem; padding: 0.5rem 0.6rem; border-radius: 5px; resize: vertical; min-height: 58px; margin-bottom: 0.6rem; box-sizing: border-box; }
        .ai-chat-input:focus { outline: none; border-color: var(--gold); }
        .ai-error-msg { color: #E74C3C; font-size: 0.73rem; padding: 0.5rem 0; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="js/shared/shared-loader.js?v=20260502b"></script>
    <script>
    WRShared.loadMany([
      'app-config.js',
      'constants.js',
      'utils.js',
      'sleeper-api.js',
      'supabase-client.js',
      'pick-value-model.js',
      'dhq-core.js',
      'dhq-engine.js',
      'dhq-ai.js',
      'ai-dispatch.js',
      'player-modal.js',
      'rookie-data.js',
    ]);
    </script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // ===== DEV MODE =====
        const DEV_MODE = new URLSearchParams(window.location.search).has('dev') || window.location.hostname.includes('sandbox');
        if (DEV_MODE) {
            console.log('%c[DEV MODE] All features unlocked, auth bypassed','color:#D4AF37;font-weight:bold;font-size:14px');
            const b = document.createElement('div');
            b.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:#D4AF37;color:#000;font-size:11px;font-weight:700;text-align:center;padding:3px;letter-spacing:.05em;font-family:monospace';
            b.textContent = '⚡ SANDBOX — changes here do not affect production';
            document.body.prepend(b);
        }

        // ===== AUTH =====
        const AUTH_KEY = 'od_auth_v1';
        const authRaw = localStorage.getItem(AUTH_KEY);
        const isAuthed = !!authRaw;
        if (!isAuthed && !DEV_MODE) window.location.href = 'login.html';
        let sleeperUsername = '';
        if (DEV_MODE) {
            sleeperUsername = new URLSearchParams(window.location.search).get('user') || 'jcc100218';
        }
        try {
            if (authRaw && !sleeperUsername) {
                sleeperUsername = JSON.parse(authRaw).username || '';
            }
        } catch (e) {
            localStorage.removeItem(AUTH_KEY);
            if (!DEV_MODE) window.location.href = 'login.html';
        }

        // ===== SLEEPER API =====
        const FA_SLEEPER = 'https://api.sleeper.app/v1';
        async function apiFetch(url) {
            const r = await fetch(url);
            if (!r.ok) throw new Error(`HTTP ${r.status}`);
            return r.json();
        }
        const fetchUser       = u       => apiFetch(`${FA_SLEEPER}/user/${encodeURIComponent(u)}`);
        const fetchLeagues    = (uid,yr) => apiFetch(`${FA_SLEEPER}/user/${uid}/leagues/nfl/${yr}`);
        const fetchRosters    = id      => apiFetch(`${FA_SLEEPER}/league/${id}/rosters`);
        const fetchLeagueInfo = id      => apiFetch(`${FA_SLEEPER}/league/${id}`);

        let _wrPlayersCache = null;
        async function fetchPlayers() {
            if (_wrPlayersCache) return _wrPlayersCache;
            _wrPlayersCache = await apiFetch(`${FA_SLEEPER}/players/nfl`);
            return _wrPlayersCache;
        }

        let _wrStatsCache = {};
        async function fetchSeasonStats(season) {
            if (_wrStatsCache[season]) return _wrStatsCache[season];
            try {
                _wrStatsCache[season] = await apiFetch(`${FA_SLEEPER}/stats/nfl/regular/${season}`);
            } catch (e) {
                console.warn('Stats fetch failed for', season, e);
                _wrStatsCache[season] = {};
            }
            return _wrStatsCache[season];
        }

        // ===== CONSTANTS =====
        // Current league year; stats pulled from the prior completed season
        const SEASON         = '2026';
        const AVAILABLE_YEARS = ['2023', '2024', '2025', '2026'];
        const STATS_YEAR  = '2025';
        const FA_KEY        = id => `od_fa_targets_v1_${id}`;
        const FA_LEAGUE_KEY = 'od_fa_league_id';

        const POS_COLORS = {
            QB:'#FF6B6B', RB:'#4ECDC4', WR:'#45B7D1', TE:'#F7DC6F',
            K:'#BB8FCE',  DEF:'#85929E', LB:'#F0A500', DL:'#E67E22',
            DB:'#5DADE2', CB:'#5DADE2', S:'#5DADE2', SS:'#5DADE2', FS:'#5DADE2',
            DE:'#E67E22', DT:'#E67E22', NT:'#E67E22', OLB:'#F0A500',
            ILB:'#F0A500', MLB:'#F0A500'
        };
        const posColor = p => POS_COLORS[p] || 'var(--silver)';

        function normPos(pos) {
            if (!pos) return null;
            if (['DB','CB','S','SS','FS'].includes(pos)) return 'DB';
            if (['DL','DE','DT','NT','IDL','EDGE'].includes(pos)) return 'DL';
            if (['LB','OLB','ILB','MLB'].includes(pos)) return 'LB';
            return pos;
        }
        const FA_POS_ORDER = { QB:0, RB:1, WR:2, TE:3, K:4, DEF:5, DL:5, LB:6, DB:7 };
        const posOrder  = pos => FA_POS_ORDER[normPos(pos)] ?? 9;

        // Base sets — overridden per-league below
        const IDP_POS_FILTERS = ['ALL','RK','QB','RB','WR','TE','K','LB','DL','DB'];
        const DEF_POS_FILTERS = ['ALL','RK','QB','RB','WR','TE','K','DEF'];
        const IDP_RELEVANT = new Set([
            'QB','RB','WR','TE','K',
            'LB','OLB','ILB','MLB',
            'DL','DE','DT','NT','IDL','EDGE',
            'DB','CB','S','SS','FS'
        ]);
        const DEF_RELEVANT = new Set(['QB','RB','WR','TE','K','DEF']);

        // Shared stat column widths (px)
        const SW = { yrs:24, pts:34, gp:22, avg:32, proj:38 };

        // ===== TARGET STORAGE =====
        // Persistence handled by supabase-client.js (window.OD.*) with localStorage fallback.
        function loadTargets(leagueId) {
            // Returns cached localStorage value synchronously so UI renders instantly.
            // The caller should also call window.OD.loadTargets(leagueId) for the cloud version.
            try {
                const raw = localStorage.getItem(FA_KEY(leagueId));
                return raw ? JSON.parse(raw) : { startingBudget: 1000, targets: [] };
            } catch { return { startingBudget: 1000, targets: [] }; }
        }
        function saveTargets(leagueId, data) {
            window.OD.saveTargets(leagueId, data);
        }

        // ===== APP =====
        function FreeAgencyTracker() {
            const [phase, setPhase]   = useState('boot');
            const [errMsg, setErrMsg] = useState('');
            const [userId, setUserId] = useState('');
            const [userAvatar, setUserAvatar] = useState('');
            const [nflWeek, setNflWeek]       = useState(null);
            const [projStats, setProjStats]   = useState({});
            const projInFlight = useRef(new Set());
            const [selectedYear, setSelectedYear] = useState(SEASON);
            const [leagues, setLeagues]   = useState([]);
            const [leagueId, setLeagueId] = useState('');

            const [leagueInfo, setLeagueInfo]     = useState(null);
            const [myRoster, setMyRoster]         = useState(null);
            const [allRosters, setAllRosters]     = useState([]);
            const [playersData, setPlayersData]   = useState({});
            const [statsData, setStatsData]       = useState({});
            const [leagueLoading, setLeagueLoading] = useState(false);

            const [posFilter, setPosFilter] = useState('ALL');
            const [search, setSearch]       = useState('');

            const [targets, setTargets]               = useState([]);
            const targetsLoadedRef = useRef(null); // tracks leagueId for which targets are ready to save
            const [startingBudget, setStartingBudget] = useState(1000);
            const [editingBudget, setEditingBudget]   = useState(false);
            const [budgetDraft, setBudgetDraft]       = useState('1000');

            const [fPos, setFPos]   = useState('');
            const [fName, setFName] = useState('');
            const [fCost, setFCost] = useState('');

            const [quickPlayer, setQuickPlayer]   = useState(null);
            const [quickCost, setQuickCost]       = useState('');
            const [dropTarget, setDropTarget]     = useState(false);
            const [editingCostId, setEditingCostId] = useState(null);
            const [editingCostVal, setEditingCostVal] = useState('');

            // ---- Bootstrap ----
            useEffect(() => { boot(); }, []);
            const userIdRef = useRef('');
            useEffect(() => { userIdRef.current = userId; }, [userId]);
            // Only re-fetch leagues when user explicitly changes the year (not on boot)
            useEffect(() => {
                if (!userIdRef.current) return;
                fetchLeagues(userIdRef.current, selectedYear).then(lgs => {
                    setLeagues(lgs || []);
                    if (lgs?.length) {
                        const saved = localStorage.getItem(FA_LEAGUE_KEY);
                        const match = saved && lgs.find(l => l.league_id === saved);
                        setLeagueId(match ? saved : lgs[0].league_id);
                    }
                }).catch(() => {});
            }, [selectedYear]);

            async function boot() {
                try {
                    const [user, nflState] = await Promise.all([
                        fetchUser(sleeperUsername),
                        apiFetch('https://api.sleeper.app/v1/state/nfl'),
                    ]);
                    setUserId(user.user_id);
                    if (user.avatar) setUserAvatar(user.avatar);
                    setNflWeek(Number(nflState?.week) || 1);
                    const lgs = await fetchLeagues(user.user_id, selectedYear);
                    setLeagues(lgs || []);
                    if (lgs && lgs.length > 0) {
                        const saved = localStorage.getItem(FA_LEAGUE_KEY);
                        const match = saved && lgs.find(l => l.league_id === saved);
                        setLeagueId(match ? saved : lgs[0].league_id);
                    }
                    setPhase('ready');
                } catch (e) {
                    setErrMsg('Failed to connect to Sleeper. Check your network and try again.');
                    setPhase('error');
                }
            }

            useEffect(() => {
                if (!leagueId || !userId || phase !== 'ready') return;
                loadLeague();
            }, [leagueId, userId, phase]);

            async function loadLeague() {
                setLeagueLoading(true);
                setMyRoster(null);
                setAllRosters([]);
                setPlayersData({});
                setStatsData({});
                setPosFilter('ALL');
                setSearch('');
                try {
                    // Fetch rosters, league info, and 2025 season stats in parallel
                    const [rosters, info, stats] = await Promise.all([
                        fetchRosters(leagueId),
                        fetchLeagueInfo(leagueId),
                        fetchSeasonStats(STATS_YEAR)
                    ]);
                    const myR = rosters.find(r => r.owner_id === userId) || null;
                    setMyRoster(myR);
                    setAllRosters(rosters);
                    setLeagueInfo(info);
                    // Load player names in background — large payload, non-blocking
                    fetchPlayers().then(p => { setPlayersData(p); if (window.S) window.S.players = p; }).catch(() => {});
                    setStatsData(stats);

                    // Bridge data for dhqContext() — enables full league format, quality gates, team mode
                    if (!window.S) window.S = {};
                    window.S.players = _wrPlayersCache || {};
                    window.S.rosters = rosters || [];
                    window.S.leagues = [{ league_id: leagueId, name: info?.name, scoring_settings: info?.scoring_settings, roster_positions: info?.roster_positions, settings: info?.settings }];
                    window.S.currentLeagueId = leagueId;
                    window.S.season = info?.season || SEASON;
                    window.S.myRosterId = myR?.roster_id;
                    window.S.playerStats = {};
                    for (const [pid, s] of Object.entries(stats || {})) {
                        const scoring = info?.scoring_settings || {};
                        const pts = typeof calcPoints === 'function' ? calcPoints(s, scoring) : (s.pts_half_ppr ?? null);
                        const gp = s.gp || s.gms_active || 0;
                        window.S.playerStats[pid] = { prevTotal: pts ? Math.round(pts * 10) / 10 : 0, prevAvg: gp > 0 ? Math.round(pts / gp * 10) / 10 : 0 };
                    }

                    // Load targets: start from cache, then merge cloud data.
                    // Clear the ref first so the save effect won't fire with stale data.
                    targetsLoadedRef.current = null;
                    const saved = loadTargets(leagueId);
                    setTargets(saved.targets || []);

                    // Use total FAAB budget for the season as starting point
                    const totalBudget = info?.settings?.waiver_budget || 0;
                    if (totalBudget > 0) {
                        const budgetToUse = saved.startingBudget !== 1000
                            ? saved.startingBudget
                            : totalBudget;
                        setStartingBudget(budgetToUse);
                        setBudgetDraft(String(budgetToUse));
                    } else {
                        setStartingBudget(saved.startingBudget || 1000);
                        setBudgetDraft(String(saved.startingBudget || 1000));
                    }

                    // Capture leagueId for the async closure
                    const loadedLeagueId = leagueId;

                    // Async cloud load — overwrites local cache if remote has data
                    window.OD.loadTargets(leagueId).then(remote => {
                        if (remote && remote.targets && remote.targets.length > 0) {
                            setTargets(remote.targets);
                            setStartingBudget(remote.startingBudget || 1000);
                            setBudgetDraft(String(remote.startingBudget || 1000));
                        }
                    }).catch(() => {}).finally(() => {
                        // Mark targets as ready to save only after cloud load resolves
                        targetsLoadedRef.current = loadedLeagueId;
                    });
                } catch (e) {
                    console.error('League load failed:', e);
                    setErrMsg('Failed to load league data. Check your connection and try again.');
                    setPhase('error');
                } finally {
                    setLeagueLoading(false);
                }
            }

            useEffect(() => {
                // Only save after targets have been loaded for THIS league —
                // prevents overwriting saved data with stale state when leagueId changes.
                if (!leagueId || targetsLoadedRef.current !== leagueId) return;
                saveTargets(leagueId, { startingBudget, targets });
            }, [targets, startingBudget, leagueId]);

            // Persist the selected leagueId so the correct league is restored after a page reload.
            useEffect(() => {
                if (leagueId) localStorage.setItem(FA_LEAGUE_KEY, leagueId);
            }, [leagueId]);

            // ---- Helpers ----

            // Compute fantasy pts using the league's actual scoring_settings weights,
            // applied to raw stat fields — works for both offensive and IDP players.
            // Mirrors the Team Comps page's fantasyPointsFromScoring() approach:
            // always use scoring_settings when available so IDP defensive stats aren't
            // silently zeroed out by Sleeper's pre-calculated pts_half_ppr = 0.
            function calcRawPts(s) {
                if (!s) return null;
                const scoring = leagueInfo?.scoring_settings;
                if (scoring) {
                    let total = 0;
                    for (const [field, weight] of Object.entries(scoring)) {
                        if (typeof weight !== 'number') continue;
                        if (s[field] != null) total += Number(s[field]) * weight;
                    }
                    return total;
                }
                // Fallback: Sleeper's pre-calculated totals (offensive players only)
                const pre = s.pts_half_ppr ?? s.pts_ppr ?? s.pts_std ?? null;
                return pre !== null ? Number(pre) : null;
            }

            // Raw pts for sorting (returns -1 when no data so players with data sort above those without)
            function getPts(id) {
                const s = statsData[id];
                if (!s) return -1;
                const raw = calcRawPts(s);
                return raw !== null ? raw : -1;
            }

            function getStats(playerId) {
                const player = playersData[playerId];
                const s = statsData[playerId];
                const yrs = player?.years_exp != null ? player.years_exp : '-';
                const rawPts = calcRawPts(s);
                const pts = rawPts !== null ? Number(rawPts).toFixed(1) : '-';
                const gp  = s?.gp != null ? s.gp : '-';
                const avg = (rawPts !== null && s?.gp && s.gp > 0)
                    ? (rawPts / s.gp).toFixed(1) : '-';
                return { yrs, pts, gp, avg };
            }

            function rosterStatusClass(id) {
                if (!myRoster) return '';
                if ((myRoster.starters || []).includes(id)) return 'ps-starter';
                if ((myRoster.reserve  || []).includes(id)) return 'ps-ir';
                if ((myRoster.taxi     || []).includes(id)) return 'ps-taxi';
                return '';
            }

            function getProj(pid) {
                const p = String(pid);
                if (!nflWeek || !leagueInfo) return '';
                const cached = projStats[p];
                if (cached !== undefined) {
                    if (cached === null) return '—';
                    const pts = calcRawPts(cached);
                    return pts ? Number(pts).toFixed(1) : '0.0';
                }
                if (!projInFlight.current.has(p)) {
                    projInFlight.current.add(p);
                    apiFetch(`${FA_SLEEPER}/projections/nfl/player/${p}?season_type=regular&season=${SEASON}&week=${nflWeek}`)
                        .then(data => {
                            const stats = data?.stats && typeof data.stats === 'object' ? data.stats : data;
                            setProjStats(prev => ({ ...prev, [p]: (stats && typeof stats === 'object') ? stats : null }));
                        })
                        .catch(() => setProjStats(prev => ({ ...prev, [p]: null })))
                        .finally(() => projInFlight.current.delete(p));
                }
                return '…';
            }

            // ---- Derived data ----
            const takenIds = useMemo(() =>
                new Set(allRosters.flatMap(r => r.players || [])),
                [allRosters]
            );

            // Detect league type from roster_positions: DEF = team defense, otherwise IDP
            const isIDP = useMemo(() => {
                const rp = leagueInfo?.roster_positions || [];
                return !rp.includes('DEF');
            }, [leagueInfo]);

            const posFilters    = isIDP ? IDP_POS_FILTERS : DEF_POS_FILTERS;
            const relevantPosSet = isIDP ? IDP_RELEVANT    : DEF_RELEVANT;

            // Section color lookup: playerId → { border, bg }
            const sectionMap = useMemo(() => {
                const map = new Map();
                if (!myRoster) return map;
                const starterSet = new Set(myRoster.starters || []);
                const reserveSet = new Set(myRoster.reserve  || []);
                const taxiSet    = new Set(myRoster.taxi     || []);
                for (const id of myRoster.players || []) {
                    if      (starterSet.has(id)) map.set(id, { border:'var(--gold)', bg:'rgba(212,175,55,0.05)'  });
                    else if (reserveSet.has(id)) map.set(id, { border:'#E74C3C',     bg:'rgba(231,76,60,0.05)'   });
                    else if (taxiSet.has(id))    map.set(id, { border:'#3498DB',     bg:'rgba(52,152,219,0.05)'  });
                    else                         map.set(id, { border:null,          bg:'rgba(255,255,255,0.02)' });
                }
                return map;
            }, [myRoster]);

            // Position-grouped roster for layout
            const myGrouped = useMemo(() => {
                if (!myRoster?.players || !Object.keys(playersData).length) return {};
                const g = {};
                for (const id of myRoster.players) {
                    const p = playersData[id];
                    if (!p) continue;
                    const grp = normPos(p.position) || 'Other';
                    if (!g[grp]) g[grp] = [];
                    g[grp].push({ id, p });
                }
                for (const grp of Object.keys(g)) {
                    g[grp].sort((a, b) => getPts(b.id) - getPts(a.id));
                }
                return g;
            }, [myRoster, playersData, statsData]);
            const myGroups = Object.keys(myGrouped).sort((a, b) => posOrder(a) - posOrder(b));

            const freeAgents = useMemo(() => {
                if (!Object.keys(playersData).length || !allRosters.length) return [];
                return Object.entries(playersData)
                    .filter(([id, p]) =>
                        !takenIds.has(id) &&
                        p.active === true &&
                        p.status !== 'Inactive' &&
                        p.status !== 'Retired' &&
                        relevantPosSet.has(p.position)
                    )
                    .map(([id, p]) => ({
                        id,
                        name: p.full_name || `${p.first_name||''} ${p.last_name||''}`.trim() || id,
                        pos: p.position,
                        norm: normPos(p.position),
                        team: p.team,
                        yrsExp: p.years_exp ?? null
                    }))
                    .sort((a, b) => {
                        const posOrd = posOrder(a.pos) - posOrder(b.pos);
                        if (posOrd !== 0) return posOrd;
                        // Within the same position group, highest pts first
                        return getPts(b.id) - getPts(a.id);
                    });
            }, [playersData, takenIds, statsData, isIDP]);

            const filteredFAs = useMemo(() => {
                const list = freeAgents.filter(fa => {
                    let posOk;
                    if (posFilter === 'ALL')       posOk = true;
                    else if (posFilter === 'RK')   posOk = fa.yrsExp === 0;
                    else                           posOk = fa.norm === posFilter || fa.pos === posFilter;
                    const q      = search.toLowerCase();
                    const srchOk = !q || fa.name.toLowerCase().includes(q) || (fa.team||'').toLowerCase().includes(q);
                    return posOk && srchOk;
                });
                // ALL and RK views: rank purely by total points, no position grouping
                if (posFilter === 'ALL' || posFilter === 'RK') {
                    list.sort((a, b) => getPts(b.id) - getPts(a.id));
                }
                return list;
            }, [freeAgents, posFilter, search, statsData]);

            const targetRows = useMemo(() => {
                let bal = startingBudget;
                return targets.map(t => {
                    const before = bal;
                    const after  = before - t.cost;
                    bal = after;
                    return { ...t, faDollar: before, remaining: after };
                });
            }, [targets, startingBudget]);

            const finalBalance = targetRows.length > 0
                ? targetRows[targetRows.length - 1].remaining
                : startingBudget;

            // ---- Handlers ----
            function addTarget(pos, name, cost, playerId) {
                const c = parseInt(cost);
                if (!name.trim() || isNaN(c) || c < 0) return;
                setTargets(prev => [...prev, {
                    id: Date.now().toString(),
                    pos: (pos || '?').toUpperCase(),
                    name: name.trim(),
                    cost: c,
                    playerId: playerId || null
                }]);
            }
            function deleteTarget(id) { setTargets(prev => prev.filter(t => t.id !== id)); }
            function updateTargetCost(id, val) {
                const c = parseInt(val);
                if (isNaN(c) || c < 0) return;
                setTargets(prev => prev.map(t => t.id === id ? { ...t, cost: c } : t));
            }
            function handleFormAdd(e) {
                e.preventDefault();
                addTarget(fPos, fName, fCost);
                setFPos(''); setFName(''); setFCost('');
            }
            function handleQuickAdd(e) {
                e.preventDefault();
                if (!quickPlayer) return;
                addTarget(quickPlayer.norm || quickPlayer.pos, quickPlayer.name, quickCost, quickPlayer.id);
                setQuickPlayer(null); setQuickCost('');
            }
            function commitBudget() {
                const v = parseInt(budgetDraft);
                if (!isNaN(v) && v >= 0) setStartingBudget(v);
                setEditingBudget(false);
            }
            function remColor(val) {
                if (val < 0) return '#E74C3C';
                if (val < startingBudget * 0.1)  return '#E67E22';
                if (val < startingBudget * 0.25) return '#F0A500';
                return '#2ECC71';
            }

            // ---- AI Scout state ----
            const [faTab,       setFaTab]       = useState('targets'); // 'targets' | 'ai'
            const [aiMode,      setAiMode]      = useState('fa_targets');
            const [aiAnalysis,  setAiAnalysis]  = useState(null);
            const [aiLoading,   setAiLoading]   = useState(false);
            const [aiError,     setAiError]     = useState(null);
            const [aiChatInput, setAiChatInput] = useState('');

            const FA_AI_MODES = [
                { id: 'fa_targets', label: 'FA Pickups',   desc: 'Recommend free agents based on your roster needs and remaining FAAB' },
                { id: 'rookies',    label: 'Rookies',      desc: 'Rookie draft targets ranked by fit with your roster needs' },
                { id: 'fa_chat',    label: 'Ask AI',       desc: 'Ask anything about free agency, rookies, or roster building' },
            ];

            function renderMarkdown(text) {
                if (!text) return '';
                const esc = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
                return esc
                    .replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>')
                    .replace(/^### (.+)$/gm, '<div style="font-family:Inter,sans-serif;font-size:0.88rem;color:var(--gold);margin:0.75rem 0 0.2rem;letter-spacing:0.08em">$1</div>')
                    .replace(/^## (.+)$/gm,  '<div style="font-family:Inter,sans-serif;font-size:0.95rem;color:var(--gold);margin:0.9rem 0 0.25rem;letter-spacing:0.1em">$1</div>')
                    .replace(/^# (.+)$/gm,   '<div style="font-family:Inter,sans-serif;font-size:1.05rem;color:var(--gold);margin:1rem 0 0.3rem;letter-spacing:0.12em">$1</div>')
                    .replace(/\n\n/g, '<div style="margin:0.25rem 0"></div>');
            }

            function buildFAContext() {
                const leagueName = leagueInfo?.name || 'Fantasy League';
                const rosterPositions = leagueInfo?.roster_positions || [];

                // Team assessment for mode-aware AI recommendations
                const teamAssess = typeof window.assessTeamFromGlobal === 'function'
                    ? window.assessTeamFromGlobal(myRoster?.roster_id) : null;

                const myRosterSummary = (myRoster?.players || []).map(id => {
                    const p = playersData[id];
                    if (!p) return null;
                    const s = statsData[id];
                    const rawPts = calcRawPts(s);
                    return {
                        pos: p.position,
                        name: p.full_name || `${p.first_name||''} ${p.last_name||''}`.trim(),
                        team: p.team || 'FA',
                        pts: rawPts ? Number(rawPts).toFixed(1) : null,
                        gp: s?.gp || null,
                        avg: (rawPts && s?.gp) ? (rawPts / s.gp).toFixed(1) : null,
                        age: p.age ?? null,
                        yrsExp: p.years_exp ?? null,
                        dhq: window.App?.LI?.playerScores?.[id] || 0,
                        isStarter: (myRoster.starters || []).includes(id),
                        isTaxi: (myRoster.taxi || []).includes(id),
                    };
                }).filter(Boolean);

                const topFAs = freeAgents
                    .filter(fa => {
                        const p = playersData[fa.id];
                        return p && p.active === true && p.status !== 'Inactive' && p.status !== 'Retired';
                    })
                    .slice(0, 60)
                    .map(fa => {
                        const p = playersData[fa.id];
                        const s = statsData[fa.id];
                        const rawPts = calcRawPts(s);
                        return {
                            pos: fa.pos, name: fa.name, team: fa.team,
                            pts: rawPts ? Number(rawPts).toFixed(1) : null,
                            gp: s?.gp || null,
                            avg: (rawPts && s?.gp) ? (rawPts / s.gp).toFixed(1) : null,
                            age: p?.age ?? null,
                            dhq: window.App?.LI?.playerScores?.[fa.id] || 0,
                            yrsExp: fa.yrsExp, isRookie: fa.yrsExp === 0,
                        };
                    });

                const availableRookies = freeAgents.filter(fa => fa.yrsExp === 0).slice(0, 50).map(fa => ({
                    pos: fa.pos, name: fa.name, team: fa.team || 'UFA',
                }));

                return {
                    leagueName, myOwner: sleeperUsername,
                    faabBudget: finalBalance, startingBudget,
                    faabMinBid: leagueInfo?.settings?.waiver_budget_min || 0,
                    myRoster: myRosterSummary, rosterPositions,
                    // League format fields for AI context
                    scoringSettings: leagueInfo?.scoring_settings || {},
                    scoring_settings: leagueInfo?.scoring_settings || {},
                    // Team mode fields for AI context
                    teamTier: teamAssess?.tier || '',
                    teamWindow: teamAssess?.window || '',
                    healthScore: teamAssess?.healthScore || 0,
                    tier: teamAssess?.tier || '',
                    tradeWindow: teamAssess?.window || '',
                    topFreeAgents: topFAs, availableRookies,
                    question: aiChatInput,
                };
            }

            async function runFAAnalysis() {
                setAiLoading(true); setAiError(null); setAiAnalysis(null);
                try {
                    const ctx = buildFAContext();
                    const dhqEnrichment = (typeof dhqContext === 'function') ? dhqContext(false) : null;
                    const enrichedCtx = dhqEnrichment ? { ...ctx, _dhqContext: dhqEnrichment } : ctx;
                    const result = await window.OD.callAI({ type: aiMode, context: enrichedCtx });
                    setAiAnalysis(result.analysis);
                } catch(e) {
                    setAiError(e.message);
                } finally {
                    setAiLoading(false);
                }
            }

            // ---- Boot/error states ----
            if (phase === 'boot') return (
                <div style={{ minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', flexDirection:'column', gap:'0.75rem' }}>
                    <div style={{ color:'var(--gold)', fontFamily:'Inter,sans-serif', fontSize:'1.4rem', letterSpacing:'0.12em' }}>LOADING WAIVER WAR ROOM</div>
                    <div style={{ color:'var(--silver)', fontSize:'0.75rem', opacity:0.6 }}>Connecting to Sleeper API...</div>
                </div>
            );
            if (phase === 'error') return (

            function StatHeader({ addBtn }) {

                    <div className="stat-col-hdr">

                        <span style={{ flex:'1', minWidth:0 }}></span>
                        <span className="stat-lbl mob-hide" style={{ width:`${SW.yrs}px` }}>YRS</span>
                        <span className="stat-lbl" style={{ width:`${SW.pts}px` }}>PTS</span>
                        <span className="stat-lbl mob-hide" style={{ width:`${SW.gp}px` }}>GP</span>
                        <span className="stat-lbl mob-hide" style={{ width:`${SW.avg}px` }}>AVG</span>
                        <span className="stat-lbl mob-hide" style={{ width:`${SW.proj}px`, opacity:0.5 }}>PROJ</span>
                        {addBtn && <span style={{ width:'20px' }}></span>}
                    </div>
