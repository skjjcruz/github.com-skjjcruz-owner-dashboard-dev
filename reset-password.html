<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://unpkg.com https://cdnjs.cloudflare.com https://skjjcruz.github.io https://browser.sentry-cdn.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self' https://hovnqztlbsgsywrbidbh.supabase.co https://api.sleeper.app https://api.myfantasyleague.com https://*.myfantasyleague.com https://lm-api-reads.fantasy.espn.com https://fantasysports.yahooapis.com https://*.sentry.io; worker-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; object-src 'none';">
  <title>Reset Password - Dynasty HQ</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #D4AF37;
      --dark-gold: #B8941E;
      --black: #08080B;
      --panel: #1B1B22;
      --line: rgba(212, 175, 55, 0.28);
      --white: #F5F2EA;
      --silver: #BDB8AD;
      --danger: #E74C3C;
      --success: #2ECC71;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, sans-serif;
      background: radial-gradient(circle at 50% 0%, rgba(212, 175, 55, 0.14), transparent 38%), var(--black);
      color: var(--white);
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .panel {
      width: min(440px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 28px;
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.45);
    }
    .brand {
      font-family: Rajdhani, Inter, sans-serif;
      color: var(--gold);
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin: 0 0 6px;
    }
    .subtitle {
      color: var(--silver);
      margin: 0 0 24px;
      line-height: 1.45;
    }
    label {
      display: block;
      color: var(--gold);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin: 16px 0 8px;
    }
    input {
      width: 100%;
      min-height: 46px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 6px;
      background: #090909;
      color: var(--white);
      font: inherit;
      padding: 0 12px;
    }
    input:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.12);
    }
    button, .link {
      width: 100%;
      min-height: 46px;
      border: 0;
      border-radius: 6px;
      background: linear-gradient(135deg, var(--gold), var(--dark-gold));
      color: var(--black);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font: inherit;
      font-weight: 800;
      letter-spacing: 0.04em;
      margin-top: 22px;
      text-decoration: none;
      text-transform: uppercase;
    }
    button:disabled { cursor: wait; opacity: 0.65; }
    .alert {
      display: none;
      border-radius: 6px;
      line-height: 1.45;
      margin: 0 0 16px;
      padding: 12px;
    }
    .alert.show { display: block; }
    .alert-error {
      color: #ffd8d4;
      background: rgba(231, 76, 60, 0.14);
      border: 1px solid rgba(231, 76, 60, 0.42);
    }
    .alert-success {
      color: #dcffe9;
      background: rgba(46, 204, 113, 0.12);
      border: 1px solid rgba(46, 204, 113, 0.38);
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <main class="panel">
    <h1 class="brand">Dynasty HQ</h1>
    <p class="subtitle">Choose a new password for your account.</p>
    <div id="alert" class="alert"></div>
    <form id="resetForm">
      <label for="password">New Password</label>
      <input id="password" type="password" autocomplete="new-password" minlength="8" required>
      <label for="confirm">Confirm Password</label>
      <input id="confirm" type="password" autocomplete="new-password" minlength="8" required>
      <button id="submitBtn" type="submit">Reset Password</button>
    </form>
    <a id="doneLink" class="link hidden" href="landing.html">Return to Sign In</a>
  </main>

  <script>
    const FW_API_BASE = 'https://hovnqztlbsgsywrbidbh.supabase.co/functions/v1';
    const token = new URLSearchParams(window.location.search).get('token') || '';
    const form = document.getElementById('resetForm');
    const alertEl = document.getElementById('alert');
    const doneLink = document.getElementById('doneLink');
    const submitBtn = document.getElementById('submitBtn');

    function showAlert(type, message) {
      alertEl.className = 'alert alert-' + type + ' show';
      alertEl.textContent = message;
    }

    if (!token) {
      form.classList.add('hidden');
      showAlert('error', 'This reset link is missing a token. Request a new password reset link.');
      doneLink.classList.remove('hidden');
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      if (password.length < 8) { showAlert('error', 'Password must be at least 8 characters.'); return; }
      if (password !== confirm) { showAlert('error', 'Passwords do not match.'); return; }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Resetting...';
      try {
        const res = await fetch(`${FW_API_BASE}/fw-confirm-password-reset`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || 'Password reset failed.');
        form.classList.add('hidden');
        showAlert('success', 'Password reset. You can sign in with the new password.');
        doneLink.classList.remove('hidden');
      } catch (err) {
        showAlert('error', err.message || 'Password reset failed.');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Reset Password';
      }
    });
  </script>
</body>
</html>
