# gitleaks configuration
# Extends the upstream default ruleset, then allowlists known-safe public
# values so CI fails only on genuine secret leaks.
#
# IMPORTANT: the `jwt` rule is intentionally left ENABLED. The Supabase
# anon/publishable key is a JWT and is safe to ship in client code (it is
# protected by Row-Level Security); it is allowlisted below by its unique
# signature. The Supabase service_role key is ALSO a JWT but must NEVER reach
# the browser — keeping the rule active means a service_role leak still fails CI.

[extend]
useDefault = true

[allowlist]
description = "Known-safe public values (Supabase anon key, cache-key strings)"
regexes = [
  # Supabase anon (publishable) key, prod project ref sxshiqyxhhifvtfqawbq —
  # public by design. Anchored on the token's unique HMAC signature, so any
  # other JWT (e.g. a leaked service_role key) will NOT be allowlisted.
  '''zJi9W986ZLaANiZN6pt6ReFwaQU6yPeidsERIWo2ibI''',
  # Supabase anon key for the dev project ref hovnqztlbsgsywrbidbh — present in
  # older commits (the repo briefly targeted dev). Also public by design.
  '''WFz9TkCpjQpzJS_mb7b4G_58m71brqoGQC5jp2IVC1o''',
  # localStorage cache-key prefix misdetected as a generic API key
  '''wr_compare_h2h_v3_''',
]
