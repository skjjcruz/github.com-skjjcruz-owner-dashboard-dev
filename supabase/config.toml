# Supabase project config.
#
# Why this file exists: every edge function in this project authenticates
# INTERNALLY — it validates the app's own session tokens (resolveAISession /
# getSessionToken), checks an admin token, verifies a Stripe signature, or is a
# pre-auth/proxy endpoint (sign-in, sign-up, token issuer, MFL relay). The app
# issues CUSTOM JWTs, so Supabase's gateway-level JWT verification would reject
# every authenticated call before it reached the function.
#
# `supabase functions deploy <name>` defaults to verify_jwt = TRUE. Deploying any
# of these functions WITHOUT this config (or without --no-verify-jwt) flips the
# gateway on and breaks auth platform-wide. Pinning verify_jwt = false here makes
# the correct setting declarative so a plain `functions deploy` can't regress it.
project_id = "sxshiqyxhhifvtfqawbq"

[functions.ai-analyze]
verify_jwt = false

[functions.ai-feedback]
verify_jwt = false

[functions.admin-analytics-report]
verify_jwt = false

[functions.admin-list-users]
verify_jwt = false

[functions.fw-confirm-password-reset]
verify_jwt = false

[functions.fw-create-checkout]
verify_jwt = false

[functions.fw-profile]
verify_jwt = false

[functions.fw-refresh-session]
verify_jwt = false

[functions.fw-request-password-reset]
verify_jwt = false

[functions.fw-signin]
verify_jwt = false

[functions.fw-signup]
verify_jwt = false

[functions.fw-revenuecat-webhook]
verify_jwt = false

[functions.fw-stripe-webhook]
verify_jwt = false

[functions.get-session-token]
verify_jwt = false

[functions.mfl-proxy]
verify_jwt = false

[functions.set-password]
verify_jwt = false
