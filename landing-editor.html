<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynasty HQ Landing Editor</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box}
    :root{--bg:#080808;--panel:#111;--panel2:#181818;--line:rgba(255,255,255,.12);--text:#f5f5f5;--muted:rgba(255,255,255,.62);--gold:#d4af37;--green:#34d399;--red:#f87171}
    body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,system-ui,sans-serif}
    button,input,textarea{font:inherit}
    .shell{display:grid;grid-template-columns:minmax(360px,520px) 1fr;min-height:100vh}
    .editor{border-right:1px solid var(--line);background:var(--panel);display:flex;flex-direction:column;min-width:0}
    .topbar{padding:18px 20px;border-bottom:1px solid var(--line);display:grid;gap:12px}
    .title-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
    h1{font-size:18px;margin:0;color:var(--gold);letter-spacing:0;font-weight:800}
    .status{font-size:12px;color:var(--muted);white-space:nowrap}
    .status.saved{color:var(--green)}
    .status.error{color:var(--red)}
    .actions{display:flex;gap:8px;flex-wrap:wrap}
    .btn{border:1px solid var(--line);background:var(--panel2);color:var(--text);border-radius:8px;padding:9px 12px;font-weight:700;font-size:13px;cursor:pointer}
    .btn.primary{background:var(--gold);border-color:var(--gold);color:#090909}
    .btn:disabled{opacity:.45;cursor:not-allowed}
    .tabs{display:flex;gap:6px;overflow:auto;padding-bottom:2px}
    .tab{border:1px solid var(--line);background:#0c0c0c;color:var(--muted);border-radius:999px;padding:7px 10px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
    .tab.active{background:rgba(212,175,55,.12);border-color:rgba(212,175,55,.55);color:var(--gold)}
    .filter{width:100%;border:1px solid var(--line);border-radius:8px;background:#0b0b0b;color:var(--text);padding:10px 12px;outline:none}
    .fields{padding:14px 16px 28px;overflow:auto;display:grid;gap:12px}
    .field{border:1px solid var(--line);border-radius:10px;background:#0d0d0d;padding:12px;display:grid;gap:7px}
    .field.active{border-color:rgba(212,175,55,.82);box-shadow:0 0 0 2px rgba(212,175,55,.18);background:#141105}
    .field label{font-size:12px;color:var(--gold);font-weight:800}
    .path{font-size:11px;color:var(--muted);word-break:break-word}
    .field input,.field textarea{width:100%;border:1px solid rgba(255,255,255,.14);border-radius:8px;background:#050505;color:var(--text);padding:10px 11px;outline:none}
    .field textarea{min-height:86px;resize:vertical;line-height:1.45}
    .preview{background:#050505;min-width:0}
    .preview-note{position:fixed;right:16px;top:14px;z-index:2;background:rgba(8,8,8,.88);border:1px solid rgba(212,175,55,.35);color:var(--gold);border-radius:999px;padding:8px 12px;font-size:12px;font-weight:800;pointer-events:none}
    iframe{width:100%;height:100vh;border:0;background:#fff;display:block}
    .empty{padding:20px;color:var(--muted);line-height:1.5}
    @media(max-width:900px){.shell{grid-template-columns:1fr}.preview{display:none}.editor{border-right:0}}
  </style>
</head>
<body>
  <main class="shell">
    <section class="editor">
      <div class="topbar">
        <div class="title-row">
          <h1>Landing Editor</h1>
          <span class="status" id="status">Loading...</span>
        </div>
        <div class="actions">
          <button class="btn primary" id="saveBtn" type="button">Save</button>
          <button class="btn" id="reloadBtn" type="button">Reload</button>
          <button class="btn" id="previewBtn" type="button">Refresh preview</button>
        </div>
        <div class="tabs" id="tabs"></div>
        <input class="filter" id="filter" type="search" placeholder="Filter fields">
      </div>
      <div class="fields" id="fields"></div>
    </section>
    <section class="preview">
      <div class="preview-note">Hover or click the page to edit copy</div>
      <iframe id="preview" title="Landing preview"></iframe>
    </section>
  </main>
  <script src="js/landing-editor.js"></script>
</body>
</html>
